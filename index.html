};

const fbApp = initializeApp(firebaseConfig);
const fbAuth = getAuth(fbApp);
const fbDb = getFirestore(fbApp);

// NOTE: keep init safe (no stray template/return statements at top-level)


async function saveMyPoints(points, streak) {
  try {
    const user = fbAuth.currentUser;
    if (!user) return false;

    const userId = user.uid;
    const userRef = doc(fbDb, "users", userId);

    // Keeping existing nested stats structure: { stats: {cur,best,pts,lc,lf} }
    await setDoc(
      userRef,
      {
        stats: {
          cur: streak, // streak is STATS.cur
          best: STATS.best ?? 0,
          pts: points,
          lc: STATS.lc ?? null,
          lf: STATS.lf ?? null,
        }
      },
      { merge: true }
    );

    return true;
  } catch (e) {
    console.warn("saveMyPoints failed", e);
    return false;
  }
}

async function loadMyPoints(user) {
  try {
    const userId = user.uid;
    const userRef = doc(fbDb, "users", userId);
    const snap = await getDoc(userRef);
    if (!snap.exists()) {
      return true;
    }




    const data = snap.data() || {};
    const stats = data.stats || {};

    // Existing app uses STATS.cur (streak) and STATS.pts (points)
    STATS.cur = typeof stats.cur === "number" ? stats.cur : 0;
    STATS.best = typeof stats.best === "number" ? stats.best : STATS.best ?? 0;
    STATS.pts = typeof stats.pts === "number" ? stats.pts : 0;
    STATS.lc = stats.lc ?? null;
    STATS.lf = stats.lf ?? null;

    // Update UI elements immediately
    const sv1 = document.getElementById("sv1");
    const sv2 = document.getElementById("sv2");
    if (sv1) sv1.textContent = STATS.cur;
    if (sv2) sv2.textContent = STATS.pts;

    // Update fill/progress too
    updateUI();

    return true;
  } catch (e) {
    console.warn("loadMyPoints failed", e);
    return false;
  }
}

function initFirebase() {
  // Wire #btn-signin click to Google popup sign-in
  const btn = document.getElementById("btn-signin");
  if (btn) {
    btn.onclick = async () => {
      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(fbAuth, provider);
      } catch (e) {
        console.warn("signInWithPopup failed", e);
        showToast(e?.message || "فشل تسجيل الدخول");
      }
    };
  }

  // Listen auth state changes and load points/streak
  onAuthStateChanged(fbAuth, (user) => {
    const nameEl = document.getElementById("authName");
    const btn = document.getElementById("btn-signin");

    if (user) {
      const firstName = (user.displayName || "").trim().split(/\s+/)[0];
      if (nameEl) nameEl.textContent = (user.displayName || user.email || "").split('@')[0];
      if (btn) btn.textContent = firstName ? `خروج (${firstName})` : "Sign Out";

      // Allow sign-out by clicking again
      if (btn) {
btn.onclick = () => {
          fbAuth.signOut().then(() => {
            Object.keys(localStorage).forEach(k => {
              if (k.startsWith('sc:')) localStorage.removeItem(k);
            });
            STATS = {cur:0, best:0, pts:0, lc:null, lf:null};
            DONE = {};
            if (window.__sc_unsubPoints) {
              try { window.__sc_unsubPoints(); } catch(e) {}
              window.__sc_unsubPoints = null;
            }
            document.getElementById('sv1').textContent = '0';
            document.getElementById('sv2').textContent = '0';
            document.getElementById('sv3').textContent = '0';
            document.getElementById('pfill').style.width = '0%';
            document.getElementById('ptxt').textContent = '٠/٠ مهمة';
            document.getElementById('ppts').textContent = '٠ نقطة اليوم';
            document.getElementById('panels').innerHTML = 
              [0,1,2,3,4,5,6].map(renderPanel).join('');
            switchDay(todayJD());
            showToast("تم تسجيل الخروج");
          });
        };
      }

      // Real-time sync to guarantee cross-device updates
      const userRef = doc(fbDb, "users", user.uid);
      if (window.__sc_unsubPoints) {
        try {
          window.__sc_unsubPoints();
        } catch {}
      }
      window.__sc_unsubPoints = onSnapshot(userRef, (snap) => {
        const data = snap.data() || {};
        const stats = data.stats || {};

        // Update local JS stats
        STATS.pts = typeof stats.pts === "number" ? stats.pts : 0;
        STATS.cur = typeof stats.cur === "number" ? stats.cur : 0;
        STATS.best = typeof stats.best === "number" ? stats.best : STATS.best ?? 0;
        STATS.lc = stats.lc ?? null;
        STATS.lf = stats.lf ?? null;

        // Update UI immediately
        const sv1 = document.getElementById("sv1");
        const sv2 = document.getElementById("sv2");
        if (sv1) sv1.textContent = STATS.cur;
        if (sv2) sv2.textContent = STATS.pts;

        updateUI();
      });
    } else {
      if (nameEl) nameEl.textContent = "";
      if (btn) btn.textContent = "Sign In";
      if (window.__sc_unsubPoints) {
        try {
          window.__sc_unsubPoints();
        } catch {}
        window.__sc_unsubPoints = null;
      }

      // Restore sign-in behavior
      if (btn) {
        btn.onclick = async () => {
          try {
            const provider = new GoogleAuthProvider();
            await signInWithPopup(fbAuth, provider);
          } catch (e) {
            console.warn("signInWithPopup failed", e);
            showToast(e?.message || "فشل تسجيل الدخول");
          }
        };
      }
    }
  });
}

const DKEYS=['sun','mon','tue','wed','thu','fri','sat'];
const DSHORT=['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
const PMETA={Fajr:{ar:'الفجر',ic:'🌙',pts:15},Dhuhr:{ar:'الظهر',ic:'☀️',pts:10},Asr:{ar:'العصر',ic:'🌤️',pts:10},Maghrib:{ar:'المغرب',ic:'🌅',pts:10},Isha:{ar:'العشاء',ic:'🌙',pts:10}};
const FALLBK={Fajr:'03:15',Dhuhr:'11:43',Asr:'15:18',Maghrib:'18:29',Isha:'20:09'};
let PRYT={...FALLBK};
const p2=n=>String(n).padStart(2,'0');
const KUWAIT_TZ = 'Asia/Kuwait';
function getKuwaitDateParts(){
  try{
    const parts = new Intl.DateTimeFormat('en-GB',{timeZone:KUWAIT_TZ,year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'}).formatToParts(new Date());
    const result = {};
    parts.forEach(p=>{ if(p.type !== 'literal') result[p.type] = p.value; });
    return result;
  }catch(e){
    const d=new Date();
    return {year:`${d.getFullYear()}`,month:p2(d.getMonth()+1),day:p2(d.getDate()),weekday:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]};
  }
}
const todayStr=()=>{const d=getKuwaitDateParts(); return `${d.year}-${d.month}-${d.day}`};
const todayJD=()=>{const weekday=getKuwaitDateParts().weekday; return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].indexOf(weekday);};
// تنظيف سلسلة الوقت: استخراج الشكل HH:MM من أي نص يعود من الـ API
function cleanTimeStr(s){if(!s)return'';const m=s.match(/\d{1,2}:\d{2}/);return m?m[0]:s}
function dateOff(n){const d=new Date();d.setDate(d.getDate()+n);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}
function fmt24(t){const s=cleanTimeStr(t);if(!s)return '';const[h,m]=s.split(':').map(Number);const pm=h>=12;const dh=h>12?h-12:(h===0?12:h);return `${dh}:${p2(m)} ${pm?'م':'ص'}`}
function toMin(s){if(!s)return 0;const s0=cleanTimeStr(s);if(s.includes('ص')||s.includes('م')){const pm=s.includes('م');const[h,m]=s0.split(':').map(Number);let hr=h;if(pm&&h!==12)hr+=12;if(!pm&&h===12)hr=0;return hr*60+(m||0)}const[h,m]=s0.split(':').map(Number);return h*60+(m||0)}
function floatPts(x,y,n){const e=document.createElement('div');e.className='floatpts';e.textContent=`+${n}⭐`;e.style.cssText=`left:${x}px;top:${y}px`;document.body.appendChild(e);setTimeout(()=>e.remove(),900)}
let toastTmr;
function showToast(msg,ms=3500){const t=document.getElementById('toast');t.textContent=msg;t.className='show';clearTimeout(toastTmr);toastTmr=setTimeout(()=>t.className='',ms)}

// التعديل الأول: تصحيح نظام الحفظ عشان يشتغل على المتصفح العادي ويحفظ النقط
async function sGet(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}}
async function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

async function loadStats(){
  if(typeof fbAuth!=='undefined'&&fbAuth&&fbAuth.currentUser){
    try{
      const uid=fbAuth.currentUser.uid;
      const snap=await getDoc(doc(fbDb,'users',uid));
      if(snap.exists()&&snap.data().stats) return snap.data().stats;
    }catch(e){}
  }
  return(await sGet('sc:stats'))||{cur:0,best:0,pts:0,lc:null,lf:null}
}

  if(typeof fbAuth!=='undefined'&&fbAuth&&fbAuth.currentUser){
    cloudSaveStats(s);
  }else{
    await sSet('sc:stats',s);
  }

// ⏱️ The Next Prayer Real-Time Countdown Engine
function startNextPrayerCountdown(timings) {
    if (window.prayerInterval) clearInterval(window.prayerInterval);

    window.prayerInterval = setInterval(() => {
        const now = new Date();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();

        const parseToMinutes = (t) => {
            const [h, m] = t.split(':').map(Number);
            return h * 60 + m;
        };

        const prayerKeys = [
            { name: 'الفجر', time: timings.Fajr },
            { name: 'الشروق', time: timings.Sunrise },
            { name: 'الظهر', time: timings.Dhuhr },
            { name: 'العصر', time: timings.Asr },
            { name: 'المغرب', time: timings.Maghrib },
            { name: 'العشاء', time: timings.Isha }
        ];

        let nextPrayerName = 'الفجر';
        let nextPrayerTime = timings.Fajr;
        let found = false;

        for (let p of prayerKeys) {
            if (currentMinutes < parseToMinutes(p.time)) {
                nextPrayerName = p.name;
                nextPrayerTime = p.time;
                found = true;
                break;
            }
        }

        if (!found) {
            nextPrayerName = 'الفجر';
            nextPrayerTime = timings.Fajr;
        }

        let targetMinutes = parseToMinutes(nextPrayerTime);
        let diffMinutes = targetMinutes - currentMinutes;
        if (diffMinutes < 0) {
            diffMinutes += 24 * 60;
        }

        const hoursLeft = Math.floor(diffMinutes / 60);
        const minsLeft = diffMinutes % 60;
        const secsLeft = 59 - now.getSeconds();
        const countdownStr = `${hoursLeft}:${String(minsLeft).padStart(2, '0')}:${String(secsLeft).padStart(2, '0')}`;

        const setIf = (id, val) => {
            const el = document.getElementById(id);
            if (el) el.innerText = val || '';
        };

        setIf('next-prayer-title', `المتبقي لأذان ${nextPrayerName}`);
        setIf('next-prayer-countdown', countdownStr);
    }, 1000);
}

let AUTO_FREE_TIME = {};

function minutesToHM(m){const h=Math.floor(m/60);const mm=m%60;return `${p2(h)}:${p2(mm)}`}

function computeAutoFreeTime(){
  for(let jd=0;jd<7;jd++){
    // ignore free/sleep tasks and exceptions when computing auto free-time
    const tasks=getAllTasks(jd)
      .filter(t=>{
        const cat=t[2]; const isEx=t[9];
        return cat!=='free' && cat!=='sleep' && !isEx;
      })
      .map(t=>({id:t[0],min:toMin(t[10]||t[1])}))
      .filter(x=>!isNaN(x.min))
      .sort((a,b)=>a.min-b.min);
    const startDay=8*60,endDay=22*60;
    const durations=[60,45,30,15];
    const buffers=[30,15,0];
    let chosen=null;
    for(const dur of durations){
      for(const buf of buffers){
        let prev=startDay;
        for(const tt of tasks){
          const avail=tt.min - buf - prev;
          if(avail>=dur){chosen={start:prev+buf,dur};break}
          prev=tt.min+buf;
        }
        if(!chosen && endDay - prev >= dur) chosen={start:prev,dur};
        if(chosen) break;
      }
      if(chosen) break;
    }
    if(chosen){AUTO_FREE_TIME[jd]=[{t:minutesToHM(chosen.start),d:`وقت حر — ${chosen.dur} دقيقة`}];}else{AUTO_FREE_TIME[jd]=[]}
  }
}

}
function getReqTasks(jd){return[...buildPTasks(jd),...(SCHED[jd]?.ts||[])].filter(t=>!t[9]&&t[6]>0)}
function getAllTasks(jd){
  const d=SCHED[jd];if(!d)return[];
  const af=AUTO_FREE_TIME[jd]||[];
  const frees=(af.length?af:(FREE_TIME[jd]||[])).map((f,i)=>[`fr-${jd}-${i}`,f.t,'free','🎮','وقت حر',f.d,0,null,null,false]);
  return[...buildPTasks(jd),...d.ts,...frees].sort((a,b)=>toMin(a[10]||a[1])-toMin(b[10]||b[1]));
}
async function checkNewDay(){
  if(STATS.lc===TODAY)return;
  if(STATS.lf&&STATS.lf!==dateOff(-1)&&STATS.lf!==TODAY)STATS.cur=0;
  STATS.lc=TODAY;
  await saveStats(STATS);
}
function updateUI(){
  const req=getReqTasks(todayJD());
  const done=req.filter(t=>DONE[t[0]]);
  const ptsT=done.reduce((s,t)=>s+t[6],0);
  const pct=req.length?Math.round(done.length/req.length*100):0;
  document.getElementById('sv1').textContent=STATS.cur;
  document.getElementById('sv2').textContent=STATS.pts;
  document.getElementById('sv3').textContent=STATS.best;
  document.getElementById('ptxt').textContent=`${done.length}/${req.length} مهمة (${pct}%)`;
  document.getElementById('ppts').textContent=`${ptsT} نقطة اليوم`;
  document.getElementById('pfill').style.width=pct+'%';
}
async function checkTask(id,pts,ev){
  if(DONE[id])return;
  DONE[id]=true;
  await saveDD(TODAY,DONE);
  STATS.pts+=pts;
  // Sync streak+points to cloud (if user signed in)
  try{ await saveMyPoints(STATS.pts, STATS.cur); }catch{}
  const card=document.getElementById('c-'+id);
  if(card){
    card.classList.add('done');
    const btn=card.querySelector('.cbtn:not(.done)');
    if(btn){btn.className='cbtn done';btn.innerHTML='✅<span style="font-size:.7rem;color:var(--gr)">تم</span>';btn.onclick=null}
  }
  document.getElementById('pp-'+id)?.classList.add('done');
  if(ev){const r=ev.currentTarget.getBoundingClientRect();floatPts(r.left+r.width/2-20,r.top-10,pts)}
  const req=getReqTasks(todayJD());
  if(req.every(t=>DONE[t[0]])&&STATS.lf!==TODAY){
    STATS.cur=STATS.lf===dateOff(-1)?STATS.cur+1:1;
    STATS.lf=TODAY;
    STATS.best=Math.max(STATS.best,STATS.cur);
    await saveStats(STATS);
    setTimeout(()=>showToast(`🎉 يوم كامل!\nاستريك: ${STATS.cur} يوم 🔥\nنقاطك: ${STATS.pts} ⭐`),400);
  }else{await saveStats(STATS)}
  updateUI();
}
function toggleAlts(id) {
  document.getElementById('al-' + id)?.classList.toggle('open');
}

function renderCard(task, isToday) {
  const [id, arTime, cat, ico, name, desc, pts, alts, hw, isEx] = task;
  const done = DONE[id] || false;

  if (cat === 'free') {
    return (
      '<div class="tc" data-c="free">' +
      '<div class="tctime">' + arTime + '</div>' +
      '<div class="tcico">' + ico + '</div>' +
      '<div class="tcbody">' +
      '<div class="tcname" style="color:#6366f1">' + name + '</div>' +
      '<div class="tcdesc">' + desc + '</div>' +
      '</div></div>'
    );
  }

  let act = '';
  if (isEx) {
    act = '<div class="excbadge">🔓 استثناء</div>';
  } else if (isToday) {
    if (done) {
      act = '<div class="cbtn done">✅<span style="font-size:.7rem;color:var(--gr)">تم</span></div>';
    } else {
      act = '<button class="cbtn" data-action="confirm" data-id="' +
        id +
        '" data-pts="' +
        pts +
        '">تأكيد ✓<span class="ptslbl">+' +
        pts +
        '⭐</span></button>';
    }
  }

  if (done) {
    act = '<div class="cbtn done">✅</div>';
  } else if (!act) {
    act = '<div class="ptsbdg">' + pts + '⭐</div>';
  }

  const altH = alts
    ? '<button class="altbtn" data-action="alts" data-id="' +
      id +
      '">🔄 بدائل (' +
      alts.length +
      ')</button>' +
      '<div class="altlist" id="al-' +
      id +
      '">' +
      alts
        .map((a) =>
          '<div class="altitem" role="button" tabindex="0" data-alt="' +
          String(a).replace(/"/g, '"') +
          '">' +
          a +
          '</div>'
        )
        .join('') +
      '</div>'
    : '';

  const hwH = hw ? '<div class="hwtag">⏰ ' + hw + '</div>' : '';

  return (
    '<div class="tc' + (done ? ' done' : '') + (isEx ? ' excx' : '') + '" data-c="' + cat + '" id="c-' + id + '">' +
    '<div class="tctime">' + arTime + '</div>' +
    '<div class="tcico">' + ico + '</div>' +
    '<div class="tcbody">' +
    '<div class="tcname">' + name + '</div>' +
    '<div class="tcdesc">' + desc + '</div>' +
    hwH +
    altH +
    '</div>' +
    act +
    '</div>'
  );
}


function renderPanel(jd){
  const d=SCHED[jd];if(!d)return'';
  const k=DKEYS[jd];const isToday=jd===todayJD();
  const tasks=getAllTasks(jd);
  const gbLabel=d.gm?`<div class="gbx ${d.gm==='upper'?'gbu':'gbl'}">${d.gm==='upper'?'Upper Body 💪':'Lower Body 🦵'}</div>`:`<div class="gbx gbr">يوم راحة 💤</div>`;
  // Build prayer pills; on Friday replace Dhuhr pill with Jum'ah if present in schedule
  const prayerOrder=['Fajr','Dhuhr','Asr','Maghrib','Isha'];
  const pillsArr=[];
  const schedList=d.ts||[];
  const jumahTask=schedList.find(t=>t[2]==='prayer' && (t[4]?.includes('جمعة')||t[0].includes('fri-jm')));
  for(const pk of prayerOrder){
    if(pk==='Dhuhr' && jd===5){
      if(jumahTask){
        const pid=jumahTask[0];
        const done=DONE[pid]&&isToday;
        pillsArr.push(`<div class="ppill${done?' done':''}" id="pp-${pid}"><div class="pnam">${jumahTask[4]}</div><div class="ptim">${fmt24(jumahTask[1]||jumahTask[10]||FALLBK.Dhuhr)}</div></div>`);
      }
      continue;
    }
    const pm=PMETA[pk];
    if(!pm) continue;
    const pid=`pr-${k}-${pk}`;
    const done=DONE[pid]&&isToday;
    pillsArr.push(`<div class="ppill${done?' done':''}" id="pp-${pid}"><div class="pnam">${pm.ar}</div><div class="ptim">${fmt24(PRYT[pk]||FALLBK[pk])}</div></div>`);
  }
  const pills=pillsArr.join('');
  return `<div class="pan" id="pan-${k}">
    <div class="dh"><div><div class="dhn">${d.n}</div><div class="dhm">فجر ${fmt24(PRYT.Fajr||FALLBK.Fajr)} ← صحيان ${d.wk} · نوم ${d.bd}</div></div>${gbLabel}</div>
    <div class="prow">${pills}</div>
    <div class="tl">${tasks.map(t=>renderCard(t,isToday)).join('')}</div>
  </div>`;
}
function renderTabs(){
  const c=document.getElementById('tabrow');c.innerHTML='';
  [0,1,2,3,4,5,6].forEach(j=>{
    const isT=j===todayJD(),isG=!!SCHED[j]?.gm;
    const b=document.createElement('button');
    b.className=`tab${isT?' tod':''}`;b.id=`tb-${DKEYS[j]}`;
    b.innerHTML=(isG?'<div class="gdot"></div>':'')+DSHORT[j];
    b.onclick=()=>switchDay(j);c.appendChild(b);
  });
}
function switchDay(jd){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('act'));
  const tb=document.getElementById(`tb-${DKEYS[jd]}`);
  if(tb){tb.classList.add('act');tb.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})}
  document.querySelectorAll('.pan').forEach(p=>p.classList.remove('act'));
  document.getElementById(`pan-${DKEYS[jd]}`)?.classList.add('act');
  updateUI();
}

// التعديل الثاني: فتح التطبيق فوراً وبعدين جلب مواقيت الصلاة في الخلفية علشان ميهنجش
async function init(){
  checkStorageAvailable();
  await loadLocation();
  await fetchServerTime();
  // موقع الجهاز تم تجاوز استخدامه — الآن نستخدم Aladhan لمدينة الكويت افتراضياً
  STATS=await loadStats();
  DONE=await loadDD(TODAY);
  await checkNewDay();
  computeAutoFreeTime();
  renderTabs();
  document.getElementById('panels').innerHTML=[0,1,2,3,4,5,6].map(renderPanel).join('');
  switchDay(todayJD());
  document.getElementById('ld').style.display='none';
  document.getElementById('app').style.display='block';
  // fallback: إذا بقيت شاشة التحميل ظاهرة لسبب ما، افتح التطبيق بعد 7 ثواني
  setTimeout(()=>{
    const ld=document.getElementById('ld');
    if(ld && ld.style.display!== 'none'){
      ld.style.display='none';
      document.getElementById('app').style.display='block';
      showToast('تم فتح التطبيق — بعض البيانات قد تتأخر');
    }
  },7000);
  fetchPrayers().then(() => {
    computeAutoFreeTime();
    document.getElementById('panels').innerHTML=[0,1,2,3,4,5,6].map(renderPanel).join('');
    switchDay(todayJD());
  });

  // UI button handlers
  document.getElementById('panels').addEventListener('click',function(ev){
  const btn=ev.target.closest('[data-action]');if(!btn)return;
  const action=btn.dataset.action,id=btn.dataset.id,pts=parseInt(btn.dataset.pts||'0',10);
  if(action==='confirm')checkTask(id,pts,null);

  else if(action==='alts')toggleAlts(id);
});
  document.getElementById('btn-export')?.addEventListener('click',exportBackup);
  document.getElementById('btn-import')?.addEventListener('click',()=>document.getElementById('file-import').click());
  document.getElementById('file-import')?.addEventListener('change',e=>{const f=e.target.files[0];if(f)importBackupFile(f)});
  document.getElementById('btn-update-prayers')?.addEventListener('click',()=>{fetchPrayers().then(()=>{document.getElementById('panels').innerHTML=[0,1,2,3,4,5,6].map(renderPanel).join('');switchDay(todayJD());showToast('تم تحديث المواقيت')})});
  // init firebase auth (silent if already signed in)
  initFirebase();
  // Using Aladhan by default; provider/method UI removed
  scheduleDailyRefresh();
}

// Hard guarantee: if init didn’t run (or crashed), still reveal the main landmark after a short delay
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    const ld = document.getElementById('ld');
    const app = document.getElementById('app');
    if (ld && app) {
      ld.style.display = 'none';
      app.style.display = 'block';
    }
  }, 5000);
});

// Kick off init once
window.addEventListener('DOMContentLoaded', init);

</script>
