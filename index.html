// ===== Helpers / Time =====
const KUWAIT_TZ = 'Asia/Kuwait';
const p2 = (n)=>String(n).padStart(2,'0');

function getKuwaitNowMinutes(){
  try{
    const parts = new Intl.DateTimeFormat('en-GB',{timeZone:KUWAIT_TZ,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date());
    const out={};
    parts.forEach(p=>{if(p.type!=='literal') out[p.type]=p.value});
    const h=parseInt(out.hour||'0',10);
    const m=parseInt(out.minute||'0',10);
    return h*60+m;
  }catch{
    const d=new Date();
    return d.getHours()*60+d.getMinutes();
  }
}

function getKuwaitDateParts(){
  try{
    const parts=new Intl.DateTimeFormat('en-GB',{timeZone:KUWAIT_TZ,year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'}).formatToParts(new Date());
    const out={};
    parts.forEach(p=>{ if(p.type!=='literal') out[p.type]=p.value; });
    return out;
  }catch{
    const d=new Date();
    return {year:`${d.getFullYear()}`,month:p2(d.getMonth()+1),day:p2(d.getDate()),weekday:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]};
  }
}

const DKEYS=['sun','mon','tue','wed','thu','fri','sat'];
const DSHORT=['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];

function todayStr(){
  const d=getKuwaitDateParts();
  return `${d.year}-${d.month}-${d.day}`;
}

function todayJD(){
  const weekday=getKuwaitDateParts().weekday;
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].indexOf(weekday);
}

const TODAY=todayStr();

function cleanTimeStr(s){
  if(!s) return '';
  const m=String(s).match(/\d{1,2}:\d{2}/);
  return m?m[0]:String(s);
}

function fmt24(t){
  const s=cleanTimeStr(t);
  if(!s) return '';
  const [h,m]=s.split(':').map(Number);
  const pm=h>=12;
  const dh=h>12?h-12:(h===0?12:h);
  return `${dh}:${p2(m)} ${pm?'م':'ص'}`;
}

function toMin(s){
  if(!s) return 0;
  const s0=cleanTimeStr(s);
  const raw=String(s);
  if(raw.includes('ص')||raw.includes('م')){
    const pm=raw.includes('م');
    const [h,m]=s0.split(':').map(Number);
    let hr=h;
    if(pm&&h!==12) hr+=12;
    if(!pm&&h===12) hr=0;
    return hr*60+(m||0);
  }
  const [h,m]=s0.split(':').map(Number);
  return h*60+(m||0);
}

function taskIsPassed(task){
  const currentMin = getKuwaitNowMinutes();
  const t24 = task[10] || task[1];
  const taskMin = toMin(t24);

  if (isPrayerTask(task)) {
    let pk = task[0].split('-')[2];
    if (task[0].includes('fri-jm')) pk = 'Dhuhr';

    // صلاة الفجر تنتهي تماماً بدخول وقت الشروق الفعلي
    if (pk === 'Fajr') return currentMin >= toMin(PRYT.Sunrise || FALLBK.Sunrise);
    if (pk === 'Dhuhr') return currentMin >= toMin(PRYT.Asr || FALLBK.Asr);
    if (pk === 'Asr') return currentMin >= toMin(PRYT.Maghrib || FALLBK.Maghrib);
    if (pk === 'Maghrib') return currentMin >= toMin(PRYT.Isha || FALLBK.Isha);
    if (pk === 'Isha') return false; 
    return currentMin > taskMin;
  }

  return currentMin > (taskMin + 180);
}

function isPrayerTask(task){
  return task[2]==='prayer';
}

function floatPts(x,y,n){
  const e=document.createElement('div');
  e.className='floatpts';
  e.textContent=`+${n}⭐`;
  e.style.cssText=`left:${x}px;top:${y}px`;
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),900);
}

let toastTmr;
function showToast(msg,ms=3500){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg;
  t.className='show';
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.className='',ms);
}

// ===== Schedule =====

function buildPTasks(jd){
  const k=DKEYS[jd];
  return Object.entries(PMETA).filter(([pk])=>!(jd===5 && pk==='Dhuhr')).map(([pk,pm])=>{
    const t24=PRYT[pk]||FALLBK[pk];
    const desc=pk==='Fajr'?`${fmt24(t24)} · ارجع نام بعدها ✓`:`وقت الصلاة: ${fmt24(t24)}`;
    return [`pr-${k}-${pk}`,fmt24(t24),'prayer',pm.ic,pm.ar,desc,pm.pts,null,null,false,t24];
  });
}

function getAllTasks(jd){
  const d=SCHED[jd];
  if(!d) return [];
  const frees=(FREE_TIME[jd]||[]).map((f,i)=>[`fr-${jd}-${i}`,f.t,'free','🎮','وقت حر',f.d,0,null,null,false]);
  return [...buildPTasks(jd),...d.ts,...frees].sort((a,b)=>toMin(a[10]||a[1])-toMin(b[10]||b[1]));
}

function getReqTasks(jd){
  return [...buildPTasks(jd),...(SCHED[jd]?.ts||[])].filter(t=>!t[9] && t[6]>0);
}

const LS={
  stats:'sc:stats',
  done:(dt)=>`sc:day:${dt}:done`,
  alts:(dt)=>`sc:day:${dt}:alts`,
  qada:(dt)=>`sc:day:${dt}:qada`,
  weekly:(dt)=>`sc:weekly:${dt}`
};

async function sGet(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}}
async function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

let STATS={cur:0,best:0,pts:0,lc:null,lf:null};
let DONE={};
let SELECTED_ALTS={};
let WEEKLY_REPORT=[];

function updateDailyRefreshIfNeeded(){
  if(STATS.lc===TODAY) return;
  const yesterday=dateOff(-1);
  if(STATS.lf && STATS.lf!==TODAY && STATS.lf!==yesterday){
    STATS.cur=0;
  }
  STATS.lc=TODAY;
}

function dateOff(n){
  const d=new Date();
  d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}

async function localLoad(){
  STATS=(await sGet(LS.stats))||{cur:0,best:0,pts:0,lc:null,lf:null};
  DONE=(await sGet(LS.done(TODAY)))||{};
  SELECTED_ALTS=(await sGet(LS.alts(TODAY)))||{};
  WEEKLY_REPORT=(await sGet(LS.weekly(TODAY)))||[];
}

async function localSave(){
  await sSet(LS.stats,STATS);
  await sSet(LS.done(TODAY),DONE);
  await sSet(LS.alts(TODAY),SELECTED_ALTS);
  await sSet(LS.weekly(TODAY),WEEKLY_REPORT);
}

  const id=task[0];
  const chosen=SELECTED_ALTS[id];
  const desc=task[5];
  const alts=task[8];
  if(alts && chosen && alts.includes(chosen)) return chosen;
  return desc;
}

function renderCard(task,isToday){
  const [id,arTime,cat,ico,name,desc,pts,alts,hw,isEx]=task;
  const doneState=DONE[id]; 
  const isDone = doneState !== undefined;
  const passed=taskIsPassed(task);

  if(cat==='free'){
    return `<div class="tc" data-c="free"><div class="tctime">${arTime}</div><div class="tcico">${ico}</div><div class="tcbody"><div class="tcname" style="color:#6366f1">${name}</div><div class="tcdesc">${desc}</div></div></div>`;
  }

  let act='';
  if(isEx){
    act=`<div class="excbadge">🔓 استثناء</div>`;
  }else if(isToday){
    if(isDone){
      act=`<div class="cbtn done">✅</div>`;
    }else{
      if(isPrayerTask(task) && passed){
        const half=Math.floor(pts/2);
        act=`<button class="cbtn qada" data-action="qada" data-id="${id}" data-pts="${pts}">قضاء (50%)<span class="ptslbl">+${half}⭐</span></button>`;
      }else if(pts>0 && passed){
        act=`<div class="cbtn exp">فات الوقت</div>`;
      }else{
        act=`<button class="cbtn" data-action="confirm" data-id="${id}" data-pts="${pts}">تأكيد ✓<span class="ptslbl">+${pts}⭐</span></button>`;
      }
    }
  }

  if(!act){
    act=isDone?`<div class="cbtn done">✅</div>`:`<div class="ptsbdg">${pts}⭐</div>`;
  }

  const altH = (alts && alts.length)
    ? `<button class="altbtn" data-action="alts" data-id="${id}">🔄 بدائل (${alts.length})</button>`+
      `<div class="altlist" id="al-${id}">${alts.map(a=>{
        const selected=SELECTED_ALTS[id]===a;
        return `<div class="altitem">
                  <span style="flex:1; line-height:1.4; padding-left:8px; ${selected?'color:var(--gr);font-weight:bold;':''}">${selected?'✓ ':''}${a}</span>
                  <button class="cbtn" style="padding:4px 8px; font-size:0.65rem; min-width:65px; ${selected?'background:rgba(16,185,129,.05);color:var(--mu);cursor:default;border-color:transparent':''}" data-action="pickalt" data-id="${id}" data-pts="${pts}" data-alt="${String(a).replace(/"/g,'&quot;')}">${selected?'تم ✅':'اختيار'}</button>
                </div>`;
      }).join('')}</div>`
    : '';

  const hwH=hw?`<div class="hwtag">⏰ ${hw}</div>`:'';
  const displayDesc=getTaskDisplayDesc(task);

  return `<div class="tc${isDone?' done':''}${isEx?' excx':''}" data-c="${cat}" id="c-${id}">
    <div class="tctime">${arTime}</div><div class="tcico">${ico}</div>
    <div class="tcbody"><div class="tcname">${name}</div><div class="tcdesc">${displayDesc}</div>${hwH}${altH}</div>
    ${act}
  </div>`;
}

function renderPanel(jd){
  const d=SCHED[jd];
  if(!d) return '';
  const k=DKEYS[jd];
  const isToday=jd===todayJD();

  const gbLabel=d.gm
    ? `<div class="gbx ${d.gm==='upper'?'gbu':'gbl'}">${d.gm==='upper'?'Upper Body 💪':'Lower Body 🦵'}</div>`
    : `<div class="gbx gbr">يوم راحة 💤</div>`;

  const prayerOrder=['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];
  const pillsArr=[];
  const schedList=d.ts||[];
  const jumahTask=schedList.find(t=>t[2]==='prayer' && (t[4]?.includes('جمعة')||t[0].includes('fri-jm')));

  for(const pk of prayerOrder){
    if(pk==='Sunrise') {
      pillsArr.push(`<div class="ppill" style="border-color:var(--or); background:rgba(245,158,11,0.03)"><div class="pnam" style="color:var(--or)">الشروق</div><div class="ptim" style="color:var(--or)">${fmt24(PRYT.Sunrise||FALLBK.Sunrise)}</div></div>`);
      continue;
    }
    if(pk==='Dhuhr' && jd===5){
      if(jumahTask){
        const pid=jumahTask[0];
        const done=DONE[pid]!==undefined&&isToday;
        pillsArr.push(`<div class="ppill${done?' done':''}" id="pp-${pid}"><div class="pnam">${jumahTask[4]}</div><div class="ptim">${fmt24(jumahTask[1])}</div></div>`);
      }
      continue;
    }
    const pm=PMETA[pk];
    if(!pm) continue;
    const pid=`pr-${k}-${pk}`;
    const done=DONE[pid]!==undefined&&isToday;
    pillsArr.push(`<div class="ppill${done?' done':''}" id="pp-${pid}"><div class="pnam">${pm.ar}</div><div class="ptim">${fmt24(PRYT[pk]||FALLBK[pk])}</div></div>`);
  }

  const tasks=getAllTasks(jd);

  return `<div class="pan" id="pan-${k}">
    <div class="dh"><div><div class="dhn">${d.n}</div><div class="dhm">فجر ${fmt24(PRYT.Fajr||FALLBK.Fajr)} ← صحيان ${d.wk} · نوم ${d.bd}</div></div>${gbLabel}</div>
    <div class="prow">${pillsArr.join('')}</div>
    <div class="tl">${tasks.map(t=>renderCard(t,isToday)).join('')}</div>
  </div>`;
}

function updateUI(){
  const req=getReqTasks(todayJD());
  const done=req.filter(t=>DONE[t[0]]!==undefined);
  const pct=req.length?Math.round(done.length/req.length*100):0;
  
  const todayPts=done.reduce((s,t)=>{
      const val = DONE[t[0]];
      if(typeof val === 'number') return s + val;
      if(val === 'qada') return s + Math.floor(t[6]/2);
      return s + t[6];
  },0);
  
  document.getElementById('sv1').textContent=STATS.cur;
  document.getElementById('sv2').textContent=STATS.pts; 
  document.getElementById('sv3').textContent=STATS.best;
  
  document.getElementById('ptxt').textContent=`${done.length}/${req.length} مهمة (${pct}%)`;
  document.getElementById('ppts').textContent=`${todayPts} نقطة اليوم`;
  document.getElementById('pfill').style.width=pct+'%';
}

function switchDay(jd){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('act'));
  const tb=document.getElementById(`tb-${DKEYS[jd]}`);
  if(tb){tb.classList.add('act');tb.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})}
  document.querySelectorAll('.pan').forEach(p=>p.classList.remove('act'));
  document.getElementById(`pan-${DKEYS[jd]}`)?.classList.add('act');
  updateUI();
}

function maybeHandleWeekly(){}

function completeStreakIfDayDone(){
  const req=getReqTasks(todayJD());
  const isAllDone=req.every(t=>DONE[t[0]]!==undefined);
  if(isAllDone && STATS.lf!==TODAY){
    const yesterday=dateOff(-1);
    if(STATS.lf===yesterday){
      STATS.cur=STATS.cur+1;
    }else{
      STATS.cur=1;
    }
    STATS.lf=TODAY;
    STATS.best=Math.max(STATS.best,STATS.cur);
    showToast(`🎉 يوم كامل!\nاستريك: ${STATS.cur} يوم 🔥\nنقاطك: ${STATS.pts} ⭐`,4000);
  }
}

async function onConfirm(task, pts, rect){
  if(DONE[task[0]]!==undefined) return;
  if(taskIsPassed(task)){
    showToast('فات الوقت');
    return;
  }
  DONE[task[0]]=pts;
  STATS.pts+=pts;
  
  WEEKLY_REPORT.push({t:new Date().toISOString(),taskId:task[0],day:TODAY,points:pts,label:task[4]});
  
  maybeHandleWeekly();
  completeStreakIfDayDone();
  await saveAndRefresh();
  floatPts(rect.left+rect.width/2-20, rect.top-10, pts);
}

async function onQada(task, pts, rect){
  if(DONE[task[0]]!==undefined) return;
  if(!isPrayerTask(task)) return;
  if(!taskIsPassed(task)) return;

  const half=Math.floor(pts/2);
  DONE[task[0]]=half;
  STATS.pts+=half;
  WEEKLY_REPORT.push({t:new Date().toISOString(),taskId:task[0],day:TODAY,points:half,label:task[4]});
  maybeHandleWeekly();
  completeStreakIfDayDone();
  await saveAndRefresh();
  floatPts(rect.left+rect.width/2-20, rect.top-10, half);
  showToast('تم قضاء (50%)');
}

// ===== Geolocation & Prayer timings =====
function getCoords() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      () => resolve(null),
      { timeout: 6000 }
    );
  });
}

async function fetchPrayers(){
  try{
    const coords = await getCoords();
    let url = 'https://api.aladhan.com/v1/timingsByCity?city=Salmiya&country=Kuwait&method=5'; 
    
    if (coords) {
      url = `https://api.aladhan.com/v1/timings?latitude=${coords.lat}&longitude=${coords.lng}&method=5`;
      console.log(`تم تحديد موقعك الفعلي بنجاح: ${coords.lat}, ${coords.lng}`);
    } else {
      console.log('لم يتم منح إذن الموقع الفعلي، تم تفعيل توقيت السالمية الافتراضي.');
    }
    
    const res = await fetch(url);
    const data = await res.json();
    
    if(data && data.code === 200) {
      const timings = data.data.timings;
      
      PRYT = {
        Fajr: timings.Fajr,
        Sunrise: timings.Sunrise,
        Dhuhr: timings.Dhuhr,
        Asr: timings.Asr,
        Maghrib: timings.Maghrib,
        Isha: timings.Isha
      };
      
      startNextPrayerCountdown(PRYT);
      return true;
    }
    throw new Error('تعذر جلب البيانات من الخادم');
  }catch(e){
    console.warn('فشل جلب المواقيت الحية، سيتم استخدام التوقيت الاحتياطي المتوسط', e);
    PRYT = {...FALLBK};
    startNextPrayerCountdown(PRYT);
    return false;
  }
}

function startNextPrayerCountdown(timings){
  if(window.prayerInterval) clearInterval(window.prayerInterval);
  window.prayerInterval=setInterval(()=>{
    const now=new Date();
    const currentMinutes=now.getHours()*60+now.getMinutes();
    const parseToMinutes=(t)=>{const [h,m]=t.split(':').map(Number);return h*60+m;};
    const prayerKeys=[
      {name:'الفجر',time:timings.Fajr},
      {name:'الشروق',time:timings.Sunrise},
      {name:'الظهر',time:timings.Dhuhr},
      {name:'العصر',time:timings.Asr},
      {name:'المغرب',time:timings.Maghrib},
      {name:'العشاء',time:timings.Isha}
    ];
    let nextPrayerName='الفجر'; let nextPrayerTime=timings.Fajr; let found=false;
    for(const p of prayerKeys){
      if(currentMinutes<parseToMinutes(p.time)){
        nextPrayerName=p.name; nextPrayerTime=p.time; found=true; break;
      }
    }
    if(!found){nextPrayerName='الفجر'; nextPrayerTime=timings.Fajr;}
    const targetMinutes=parseToMinutes(nextPrayerTime);
    let diffMinutes=targetMinutes-currentMinutes;
    if(diffMinutes<0) diffMinutes+=24*60;
    const hoursLeft=Math.floor(diffMinutes/60);
    const minsLeft=diffMinutes%60;
    const secsLeft=59-now.getSeconds();
    const countdownStr=`${hoursLeft}:${String(minsLeft).padStart(2,'0')}:${String(secsLeft).padStart(2,'0')}`;
    const setIf=(id,val)=>{const el=document.getElementById(id);if(el) el.innerText=val||''};
    setIf('next-prayer-title',`المتبقي لأذان ${nextPrayerName}`);
    setIf('next-prayer-countdown',countdownStr);
  },1000);
}

  onAuthStateChanged(fbAuth,(user)=>{

    if(user){
      nameEl.textContent=user.displayName||user.email||'';
      (async()=>{
        try{
          const uid=user.uid;
          const snap=await getDoc(doc(fbDb,'users',uid));
          if(snap.exists()){
            const data=snap.data()||{};

            } else { DONE={}; await sSet(LS.done(TODAY),DONE); }
            
            if(data['alts_'+TODAY]&&typeof data['alts_'+TODAY]==='object'){
                SELECTED_ALTS=data['alts_'+TODAY]; await sSet(LS.alts(TODAY),SELECTED_ALTS);
            } else { SELECTED_ALTS={}; await sSet(LS.alts(TODAY),SELECTED_ALTS); }
          }
          renderPanelsForAllDays();switchDay(todayJD());updateUI();
          if(window.__sc_unsub){try{window.__sc_unsub();}catch(e){}}
          window.__sc_unsub=onSnapshot(doc(fbDb,'users',uid),(snap)=>{
            const data=snap.data()||{};
            if(data.stats){STATS=data.stats;sSet(LS.stats,STATS);}
            if(data['done_'+TODAY]&&typeof data['done_'+TODAY]==='object'){DONE=data['done_'+TODAY];sSet(LS.done(TODAY),DONE);}
            if(data['alts_'+TODAY]&&typeof data['alts_'+TODAY]==='object'){SELECTED_ALTS=data['alts_'+TODAY];sSet(LS.alts(TODAY),SELECTED_ALTS);}
            renderPanelsForAllDays();switchDay(todayJD());updateUI();
          });
        }catch(e){console.warn('cloud load failed',e);}
      })();
      btn.textContent='خروج';
      
      btn.onclick=()=>{
        try{if(window.__sc_unsub) window.__sc_unsub();}catch{}
        window.__sc_unsub=null;
        fbAuth.signOut().then(()=>{
          Object.keys(localStorage).forEach(k=>{if(k.startsWith('sc:'))localStorage.removeItem(k);});
          STATS={cur:0,best:0,pts:0,lc:null,lf:null};
          DONE={};
          SELECTED_ALTS={};
          renderPanelsForAllDays();
          switchDay(todayJD());
          updateUI();
          showToast('تم تسجيل الخروج ومسح البيانات المؤقتة بنجاح');
        });
      };
    } else {
      nameEl.textContent='';
      btn.textContent='تسجيل دخول';
      btn.onclick=async ()=>{
        const provider=new GoogleAuthProvider();
        await signInWithPopup(fbAuth,provider);
      };
    }
  });
}

// ===== Init =====
async function init(){
  const ld=document.getElementById('ld');
  const app=document.getElementById('app');

  checkStorageAvailable();

  renderTabs();
  renderPanelsForAllDays();
  switchDay(todayJD());

  await localLoad();
  updateDailyRefreshIfNeeded();
  await localSave();

  renderPanelsForAllDays();
  switchDay(todayJD());
  updateUI();

  document.getElementById('panels').addEventListener('click',async (ev)=>{
    const el=ev.target.closest('[data-action]');
    if(!el) return;

    const action=el.dataset.action;
    const id=el.dataset.id;
    const pts=parseInt(el.dataset.pts||'0',10);

    const jd=todayJD();
    const all=getAllTasks(jd);
    const task=all.find(t=>t[0]===id);
    if(action==='alts'){
      toggleAlts(id);
      return;
    }

    if(action==='pickalt'){
      const alt=el.dataset.alt;
      if(!alt) return;
      
      if(task && taskIsPassed(task)){
         showToast('فات الوقت للأسف');
         return;
      }
      
      if(task && DONE[id]===undefined){
         SELECTED_ALTS[id]=alt;
         DONE[id]=pts;
         STATS.pts+=pts;
         WEEKLY_REPORT.push({t:new Date().toISOString(),taskId:id,day:TODAY,points:pts,label:task[4],alt:alt});
         maybeHandleWeekly();
         completeStreakIfDayDone();
         const rect=ev.currentTarget.getBoundingClientRect();
         floatPts(rect.left+50, rect.top-10, pts);
      }
      
      await saveAndRefresh();
      return;
    }

    if(!task) return;

    const rect=ev.currentTarget.getBoundingClientRect();

    if(action==='confirm'){
      await onConfirm(task, pts, rect);
      return;
    }

    if(action==='qada'){
      await onQada(task, pts, rect);
      return;
    }
  });

  fetchPrayers().then(()=>{
    renderPanelsForAllDays();
    switchDay(todayJD());
    updateUI();
  });

  initFirebaseAuth();

  if(ld) ld.style.display='none';
  if(app) app.style.display='block';

  setTimeout(()=>{
    if(ld && ld.style.display!=='none'){
      ld.style.display='none';
      if(app) app.style.display='block';
    }
  },7000);
}

// ===== Storage Check =====
function checkStorageAvailable(){
  try{
    const k='__sc_test__';
    localStorage.setItem(k,'1');
    localStorage.removeItem(k);
    return true;
  }catch{
    showToast('تحذير: تخزين المتصفح غير متاح');
    return false;
  }
}

window.addEventListener('DOMContentLoaded',()=>{init().catch(e=>{console.error(e);showToast('فشل بدء التطبيق')})});
</script>
