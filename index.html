<script type="module">

// ===== Helpers / Time =====
const KUWAIT_TZ = 'Asia/Kuwait';
const p2 = (n)=>String(n).padStart(2,'0');

function getKuwaitNowMinutes(){
  try{
    const parts = new Intl.DateTimeFormat('en-GB',{timeZone:KUWAIT_TZ,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date());
    const out={};
    parts.forEach(p=>{if(p.type!=='literal') out[p.type]=p.value});
    const h=parseInt(out.hour||'0',10);
    const m=parseInt(out.minute||'0',10);
    return h*60+m;
  }catch{
    const d=new Date();
    return d.getHours()*60+d.getMinutes();
  }
}

function getKuwaitDateParts(targetDate = new Date()){
  try{
    const parts=new Intl.DateTimeFormat('en-GB',{timeZone:KUWAIT_TZ,year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'}).formatToParts(targetDate);
    const out={};
    parts.forEach(p=>{ if(p.type!=='literal') out[p.type]=p.value; });
    return out;
  }catch{
    const d=targetDate;
    return {year:`${d.getFullYear()}`,month:p2(d.getMonth()+1),day:p2(d.getDate()),weekday:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]};
  }
}

const DKEYS=['sun','mon','tue','wed','thu','fri','sat'];
const DSHORT=['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];

function todayStr(){
  const d=getKuwaitDateParts();
  return `${d.year}-${d.month}-${d.day}`;
}

function todayJD(){
  const weekday=getKuwaitDateParts().weekday;
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].indexOf(weekday);
}

const TODAY=todayStr();

function getKuwaitJDFromISO(iso){
  const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return todayJD();
  const y = parseInt(m[1],10);
  const mo = parseInt(m[2],10);
  const d = parseInt(m[3],10);
  const dt = new Date(Date.UTC(y, mo-1, d));
  return dt.getUTCDay();
}

function dateOff(n, baseStr){
  const d = baseStr ? new Date(baseStr + 'T12:00:00') : new Date();
  d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}

function cleanTimeStr(s){
  if(!s) return '';
  const m=String(s).match(/\d{1,2}:\d{2}/);
  return m?m[0]:String(s);
}

function fmt24(t){
  const s=cleanTimeStr(t);
  if(!s) return '';
  const [h,m]=s.split(':').map(Number);
  const pm=h>=12;
  const dh=h>12?h-12:(h===0?12:h);
  return `${dh}:${p2(m)} ${pm?'م':'ص'}`;
}

function toMin(s){
  if(!s) return 0;
  const s0=cleanTimeStr(s);
  const raw=String(s);
  if(raw.includes('ص')||raw.includes('م')){
    const pm=raw.includes('م');
    const [h,m]=s0.split(':').map(Number);
    let hr=h;
    if(pm&&h!==12) hr+=12;
    if(!pm&&h===12) hr=0;
    return hr*60+(m||0);
  }
  const [h,m]=s0.split(':').map(Number);
  return h*60+(m||0);
}

function isPrayerTask(task){
  return task[2]==='prayer';
}

function getTaskState(task) {
  const now = getKuwaitNowMinutes();
  const start = toMin(task[10] || task[1]);
  if (isPrayerTask(task)) {
    let end = start + 60;
    const parts = task[0].split('-');
    if (parts.length >= 3) {
      const pk = parts[2];
      if(pk === 'Fajr') end = toMin(PRYT.Sunrise || FALLBK.Sunrise);
      else if(pk === 'Dhuhr') end = toMin(PRYT.Asr || FALLBK.Asr);
      else if(pk === 'Asr') end = toMin(PRYT.Maghrib || FALLBK.Maghrib);
      else if(pk === 'Maghrib') end = toMin(PRYT.Isha || FALLBK.Isha);
      else if(pk === 'Isha') end = 24 * 60;
    }
    if (task[0].includes('fri-jm')) end = toMin(PRYT.Asr || FALLBK.Asr);
    if (now > end) return 'QADA';
    return 'PENDING';
  }
  const end = start + 180;
  if (now > end) return 'EXPIRED';
  return 'PENDING';
}

function floatPts(x,y,n){
  const e=document.createElement('div');
  e.className='floatpts';
  e.textContent=`+${n}⭐`;
  e.style.cssText=`left:${x}px;top:${y}px`;
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),900);
}

let toastTmr;
function showToast(msg,ms=3500){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg;
  t.className='show';
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>{ if(t){ t.className=''; } },ms);
}

// ===== Schedule =====
const mkBk=(p,t='9:15 ص')=>[p+'-bk',t,'food','🧀','الفطار','جبنة قريش ١٥٠جم + زيت زيتون + رغيفين أسمر + طماطم + خيار',5,[

const mkSw=(p,t)=>[p+'-sw',t,'swim','🏊','سباحة مع الكوتش','تقنية + drills ← استثناء ✓',0,null,null,true];

function buildPTasks(jd){
  const k=DKEYS[jd];
  return Object.entries(PMETA)
    .filter(([pk])=>!(jd===5 && pk==='Dhuhr'))
    .map(([pk,pm])=>{
      const t24=PRYT[pk]||FALLBK[pk];
      const desc=pk==='Fajr'?`${fmt24(t24)} · ارجع نام بعدها ✓`:`وقت الصلاة: ${fmt24(t24)}`;
      return [`pr-${k}-${pk}`,fmt24(t24),'prayer',pm.ic,pm.ar,desc,pm.pts,null,null,false,t24];
    });
}

function getAllTasks(jd){
  const d=SCHED[jd];
  if(!d) return [];
  const frees=(FREE_TIME[jd]||[]).map((f,i)=>[`fr-${jd}-${i}`,f.t,'free','🎮','وقت حر',f.d,0,null,null,false]);
  return [...buildPTasks(jd),...d.ts,...frees].sort((a,b)=>toMin(a[10]||a[1])-toMin(b[10]||b[1]));
}

function getReqTasks(jd){
  return [...buildPTasks(jd),...(SCHED[jd]?.ts||[])].filter(t=>!t[9] && t[6]>0);
}

function getDayKey(iso){
  return String(iso);
}

function loadHistoryDay(){
  const dk=getDayKey(SELECTED_DATE);
  const day=data.history[dk]||{};
  DONE=day.done||{};
  SELECTED_ALTS=day.alts||{};
}

function saveHistoryDay(){
  const dk=getDayKey(SELECTED_DATE);
  if(!data.history) data.history={};
  data.history[dk]=data.history[dk]||{};
  data.history[dk].done=DONE;
  data.history[dk].alts=SELECTED_ALTS;
}

async function sGet(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}}
async function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

async function loadAll(){
  STATS=(await sGet(LS.stats))||{cur:0,best:0,pts:0,lc:null,lf:null};
  const hd=await sGet(LS.history);
  data.history=hd||{};
  const lr=await sGet(LS.lastReport);
  data.lastReportDate=lr||null;
  loadHistoryDay();
}

async function fetchRemoteDayData() {
  const user = fbAuth.currentUser;
  if (!user) return;
  try {
    const taskDoc = await getDoc(doc(fbDb, `users/${user.uid}/tasks/${SELECTED_DATE}`));
    if (taskDoc.exists()) {
      const tData = taskDoc.data();
      DONE = tData.done || {};
      SELECTED_ALTS = tData.alts || {};
      saveHistoryDay();
    } else {
      DONE = {};
      SELECTED_ALTS = {};
      saveHistoryDay();
    }
  } catch (e) {
    console.warn('Cloud data fetch failed', e);
  }
}

async function saveAll(){
  saveHistoryDay();
  await sSet(LS.stats,STATS);
  await sSet(LS.history,data.history);
  await sSet(LS.lastReport,data.lastReportDate);

  const user = fbAuth.currentUser;
  if(!user) return;

  try{
    await setDoc(doc(fbDb, "users", user.uid), { stats: STATS, lastReportDate: data.lastReportDate }, { merge:true });
    await setDoc(doc(fbDb, `users/${user.uid}/tasks/${SELECTED_DATE}`), {
      done: DONE,
      alts: SELECTED_ALTS
    }, { merge:true });
  }catch(e){
    console.warn('Cloud backup failed',e);
  }
}

function getWeekPreviousDaysISO(){
  const out=[];
  for(let i=1;i<=7;i++) out.push(dateOff(-i));
  return out;
}

async function weeklyObserverInit(){
  const todayJD_=todayJD();
  const isSunday=todayJD_===0;
  if(!isSunday) return;

  const lastWindowStart=dateOff(-7);
  if(data.lastReportDate===lastWindowStart) return;

  let totalPts=0;
  let totalQada=0;
  let lines=[];

  for(const iso of getWeekPreviousDaysISO()){
    const dk=getDayKey(iso);
    const day=data.history[dk]||{};
    const dayDone=day.done||{};
    const jd=getKuwaitJDFromISO(iso);
    const tasks=getReqTasks(jd);

    let pts=0;
    let qada=0;
    for(const t of tasks){
      const id=t[0];
      const v=dayDone[id];
      if(!v) continue;
      if(v==='qada'){
        qada++;
        pts+=Math.floor(t[6]/2);
      }else{
        pts+=t[6];
      }
    }
    totalPts+=pts;
    totalQada+=qada;
    lines.push(`${iso}: ${pts}⭐${qada?` (قضاء x${qada})`:''}`);
  }

  const report=`📊 تقرير أسبوع (آخر 7 أيام)
المجموع: ${totalPts}⭐
القضاء: ${totalQada} مهمة قضاء
\n${lines.join('\n')}`;
  showHistoryReportModal(report);

  STATS.pts=0;
  data.lastReportDate=lastWindowStart;
  await saveAll();
}

async function fetchPrayerTimesAPI(dateStr) {

    PRYT = {...FALLBK};
  }
}

function getTaskDisplayDesc(task){
  const id=task[0];
  const chosen=SELECTED_ALTS[id];
  const desc=task[5];
  const alts=task[7];
  if(alts && chosen && alts.includes(chosen)) return chosen;
  return desc;
}

function renderCard(task,isToday){
  const [id,arTime,cat,ico,name,desc,pts,alts,hw,isEx] = task;
  const done=DONE[id]||false;
  const tState = getTaskState(task);
  const expired = (tState === 'EXPIRED');

  if(cat==='free'){
    return `<div class="tc" data-c="free"><div class="tctime">${arTime}</div><div class="tcico">${ico}</div><div class="tcbody"><div class="tcname" style="color:#6366f1">${name}</div><div class="tcdesc">${desc}</div></div></div>`;
  }

  let act='';
  if(isEx){
    act=`<div class="excbadge">🔓 استثناء</div>`;
  } else if(isToday){
    if(done){
      act=`<div class="cbtn done">✅</div>`;
    } else {
      if(tState === 'QADA'){
        const half=Math.floor(pts/2);
        act=`<button class="cbtn qada" data-action="qada" data-id="${id}" data-pts="${pts}">قضاء (50%)<span class="ptslbl">+${half}⭐</span></button>`;
      } else if(tState === 'EXPIRED'){
        act=`<div class="cbtn exp">فات الوقت</div>`;
      } else {
        act=`<button class="cbtn" data-action="confirm" data-id="${id}" data-pts="${pts}">تأكيد ✓<span class="ptslbl">+${pts}⭐</span></button>`;
      }
    }
  }

  if(!act){
    act = done ? `<div class="cbtn done">✅</div>` : `<div class="cbtn exp">مفقود</div>`;
  }

  const altH = (alts && alts.length && !expired && !done && isToday)
    ? `<button class="altbtn" data-action="alts" data-id="${id}">🔄 بدائل (${alts.length})</button>`+
      `<div class="altlist" id="al-${id}">${alts.map(a=>`<div class="altitem" role="button" tabindex="0" data-action="pickalt" data-id="${id}" data-alt="${String(a).replace(/"/g,'\"')}">${a}</div>`).join('')}</div>`
    : '';

  const hwH = hw ? `<div class="hwtag">⏰ ${hw}</div>` : '';
  const displayDesc=getTaskDisplayDesc(task);

  return `<div class="tc${done?' done':''}${isEx?' excx':''}" data-c="${cat}" id="c-${id}">
    <div class="tctime">${arTime}</div><div class="tcico">${ico}</div>
    <div class="tcbody"><div class="tcname">${name}</div><div class="tcdesc">${displayDesc}</div>${hwH}${altH}</div>
    ${act}
  </div>`;
}

function renderPanel(jd){
  const d=SCHED[jd];
  if(!d) return '';
  const k=DKEYS[jd];
  const isToday = (SELECTED_DATE === TODAY) && (jd === todayJD());

  const gbLabel=d.gm
    ? `<div class="gbx ${d.gm==='upper'?'gbu':'gbl'}">${d.gm==='upper'?'Upper Body 💪':'Lower Body 🦵'}</div>`
    : `<div class="gbx gbr">يوم راحة 💤</div>`;

  const prayerOrder=['Fajr','Dhuhr','Asr','Maghrib','Isha'];
  const pillsArr=[];

  const schedList=d.ts||[];
  const jumahTask=schedList.find(t=>t[2]==='prayer' && (t[4]?.includes('جمعة')||t[0].includes('fri-jm')));

  for(const pk of prayerOrder){
    if(pk==='Dhuhr' && jd===5){
      if(jumahTask){
        const pid=jumahTask[0];
        const done=DONE[pid];
        pillsArr.push(`<div class="ppill${done?' done':''}" id="pp-${pid}"><div class="pnam">${jumahTask[4]}</div><div class="ptim">${fmt24(jumahTask[1])}</div></div>`);
      }
      continue;
    }
    const pm=PMETA[pk];
    if(!pm) continue;
    const pid=`pr-${k}-${pk}`;
    const done=DONE[pid];
    pillsArr.push(`<div class="ppill${done?' done':''}" id="pp-${pid}"><div class="pnam">${pm.ar}</div><div class="ptim">${fmt24(PRYT[pk]||FALLBK[pk])}</div></div>`);

  const tasks=getAllTasks(jd);
  return `<div class="pan" id="pan-${k}">
    <div class="dh"><div><div class="dhn">${d.n}</div><div class="dhm">فجر ${fmt24(PRYT.Fajr||FALLBK.Fajr)} ← صحيان ${d.wk} · نوم ${d.bd}</div></div>${gbLabel}</div>
    <div class="prow">${pillsArr.join('')}</div>
    <div class="tl">${tasks.map(t=>renderCard(t,isToday)).join('')}</div>

  const jd=getSelectedJD();
  const req=getReqTasks(jd);
  const done=req.filter(t=>DONE[t[0]]);

  const pct=req.length?Math.round(done.length/req.length*100):0;

  const sv1=document.getElementById('sv1');
  if(sv1) sv1.textContent=STATS.cur;
  const sv2=document.getElementById('sv2');
  if(sv2) sv2.textContent=STATS.pts;
  const sv3=document.getElementById('sv3');
  if(sv3) sv3.textContent=STATS.best;

  const ptxt=document.getElementById('ptxt');
  if(ptxt) ptxt.textContent=`${done.length}/${req.length} مهمة (${pct}%)`;

  const todayPts=done.reduce((s,t)=>{
    const statusVal=DONE[t[0]];
    if(statusVal==='qada') return s+Math.floor(t[6]/2);
    if(typeof statusVal==='number') return s+statusVal;
    return s+t[6];
  },0);

  const ppts=document.getElementById('ppts');
  if(ppts) ppts.textContent=`${todayPts} نقطة اليوم`;

  const pfill=document.getElementById('pfill');
  if(pfill) pfill.style.width=pct+'%';

  const hist=document.getElementById('hist-label');
  if(hist) hist.textContent=`التاريخ: ${SELECTED_DATE}`;
}

function switchDay(jd){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('act'));
  document.querySelectorAll('.pan').forEach(p => p.classList.remove('act'));
  const key=DKEYS[jd];
  document.getElementById(`tb-${key}`)?.classList.add('act');
  document.getElementById(`pan-${key}`)?.classList.add('act');
}

// ===== Interactive Prayer Popups Logic =====
let activePrayerFlow = null;

function startPrayerInteractiveFlow(taskId, taskName, basePts, eventX, eventY) {
  let prayerKey = null;
  if (taskId.includes('Fajr') || taskName.includes('الفجر')) prayerKey = 'Fajr';
  else if (taskId.includes('Dhuhr') || taskName.includes('الظهر') || taskId.includes('fri-jm')) prayerKey = 'Dhuhr';
  else if (taskId.includes('Asr') || taskName.includes('العصر')) prayerKey = 'Asr';
  else if (taskId.includes('Maghrib') || taskName.includes('المغرب')) prayerKey = 'Maghrib';
  else if (taskId.includes('Isha') || taskName.includes('العشاء')) prayerKey = 'Isha';

  activePrayerFlow = {
    id: taskId,
    key: prayerKey,
    name: taskName,
    basePts: parseInt(basePts, 10),
    totalEarned: parseInt(basePts, 10),
    x: eventX,
    y: eventY
  };

  showPrayerModalStep1();
}

function showPrayerModalStep1() {
  const modal = document.getElementById('prayerModal');
  const question = document.getElementById('prayerModalQuestion');
  question.textContent = `هل قلت أذكار الصلاة؟`;
  modal.classList.add('open');

  document.getElementById('prayerModalYes').onclick = () => {
    activePrayerFlow.totalEarned += 5;
    goToPrayerModalStep2();
  };
  document.getElementById('prayerModalNo').onclick = () => {
    goToPrayerModalStep2();
  };
}

function goToPrayerModalStep2() {
  const pk = activePrayerFlow.key;
  if (pk === 'Asr' || !pk) {
    finishPrayerInteractiveFlow();
    return;
  }

  let sunnahDescription = '';
  if (pk === 'Fajr') sunnahDescription = 'ركعتين قبل الفجر';
  else if (pk === 'Dhuhr') sunnahDescription = '4 ركعات قبل و ركعتين بعد';
  else if (pk === 'Maghrib') sunnahDescription = 'ركعتين بعد الصلاة';
  else if (pk === 'Isha') sunnahDescription = 'ركعتين بعد الصلاة';

  document.getElementById('prayerModalQuestion').textContent = `هل صليت سنة ${activePrayerFlow.name} (${sunnahDescription})؟`;

  document.getElementById('prayerModalYes').onclick = () => {
    activePrayerFlow.totalEarned += 5;
    finishPrayerInteractiveFlow();
  };
  document.getElementById('prayerModalNo').onclick = () => {
    finishPrayerInteractiveFlow();
  };
}

async function finishPrayerInteractiveFlow() {
  document.getElementById('prayerModal').classList.remove('open');
  const finalScore = activePrayerFlow.totalEarned;

  DONE[activePrayerFlow.id] = finalScore;
  STATS.pts += finalScore;
  if (STATS.pts > STATS.best) STATS.best = STATS.pts;

  floatPts(activePrayerFlow.x, activePrayerFlow.y, finalScore);
  await saveAll();
  renderPanelsForAllDays();
  updateUI();
  switchDay(getSelectedJD());
}

// ===== Global Actions Event Listener =====
document.body.addEventListener('click', async (e) => {
  const action = e.target.getAttribute('data-action');
  const id = e.target.getAttribute('data-id');
  const ptsAttr = e.target.getAttribute('data-pts');

  if (e.target.id === 'btn-reset') {
    if (confirm("هل أنت متأكد من مسح جميع البيانات وتصفير النقاط؟ لا يمكن التراجع عن هذا الإجراء.")) {
      STATS = {cur:0, best:0, pts:0, lc:null, lf:null};
      DONE = {};
      SELECTED_ALTS = {};
      data.history = {};
      data.lastReportDate = null;
      await saveAll();
      window.location.reload();
    }
    return;
  }

  if (e.target.id === 'btn-signin') {
    const provider = new GoogleAuthProvider();
    try { await signInWithPopup(fbAuth, provider); }
    catch { showToast('فشل تسجيل الدخول'); }
    return;
  }

  if (e.target.id === 'btn-signout') {
    await fbAuth.signOut();
    STATS = {cur:0,best:0,pts:0,lc:null,lf:null};
    DONE = {};
    SELECTED_ALTS = {};
    await loadAll();
    renderTabs();
    renderPanelsForAllDays();
    switchDay(getSelectedJD());
    updateUI();
    return;
  }

  if (e.target.id === 'btn-hist-prev') {
    SELECTED_DATE = dateOff(-1, SELECTED_DATE);
    loadHistoryDay();
    document.getElementById('ld').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    await fetchRemoteDayData();
    await fetchPrayerTimesAPI(SELECTED_DATE);
    document.getElementById('ld').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderTabs();
    renderPanelsForAllDays();
    switchDay(getSelectedJD());
    updateUI();
    return;
  }

  if (e.target.id === 'btn-hist-next') {
    SELECTED_DATE = dateOff(1, SELECTED_DATE);
    loadHistoryDay();
    document.getElementById('ld').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    await fetchRemoteDayData();
    await fetchPrayerTimesAPI(SELECTED_DATE);
    document.getElementById('ld').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderTabs();
    renderPanelsForAllDays();
    switchDay(getSelectedJD());
    updateUI();
    return;
  }

  if (!action) return;

  if (action === 'confirm' || action === 'qada') {
    const pts = parseInt(ptsAttr || '0', 10);
    const isPrayer = id.startsWith('pr-') || id.includes('-jm');

    if (isPrayer && action === 'confirm') {
      const cardTitle = e.target.closest('.tc').querySelector('.tcname').textContent;
      startPrayerInteractiveFlow(id, cardTitle, pts, e.clientX, e.clientY);
      return;
    }

    DONE[id] = action === 'qada' ? 'qada' : true;
    const reward = action === 'qada' ? Math.floor(pts / 2) : pts;

    STATS.pts += reward;
    if (STATS.pts > STATS.best) STATS.best = STATS.pts;

    floatPts(e.clientX, e.clientY, reward);
    await saveAll();
    renderPanelsForAllDays();
    updateUI();
    switchDay(getSelectedJD());
  }

  if (action === 'alts') {
    toggleAlts(id);
  }

  if (action === 'pickalt') {
    const chosenAltText = e.target.getAttribute('data-alt');
    SELECTED_ALTS[id] = chosenAltText;
    await saveAll();
    renderPanelsForAllDays();
    switchDay(getSelectedJD());
  }
});

// ===== Initialization Logic =====
onAuthStateChanged(fbAuth, async (user) => {
  if (user) {
    document.getElementById('authName').textContent = user.displayName || 'عبدالله';
    document.getElementById('authBtn').innerHTML = `<button class="altbtn" id="btn-signout">تسجيل خروج</button><button class="altbtn danger" id="btn-reset">تصفير</button>`;

    try {
      const userDoc = await getDoc(doc(fbDb, "users", user.uid));
      if (userDoc.exists()) {
        const uData = userDoc.data();
        if (uData.stats) STATS = uData.stats;
        if (uData.lastReportDate) data.lastReportDate = uData.lastReportDate;
      }

      const taskDoc = await getDoc(doc(fbDb, `users/${user.uid}/tasks/${SELECTED_DATE}`));
      if (taskDoc.exists()) {
        const tData = taskDoc.data();
        DONE = tData.done || {};
        SELECTED_ALTS = tData.alts || {};
        saveHistoryDay();
      }
    } catch (e) {
      console.warn('Cloud data loading skipped/failed', e);
    }
  } else {
    document.getElementById('authName').textContent = '';
    document.getElementById('authBtn').innerHTML = `<button class="altbtn" id="btn-signin">تسجيل دخول</button><button class="altbtn danger" id="btn-reset">تصفير</button>`;
    await loadAll();
  }

  await fetchPrayerTimesAPI(SELECTED_DATE);
  await weeklyObserverInit();

  renderTabs();
  renderPanelsForAllDays();
  switchDay(getSelectedJD());
  updateUI();

  document.getElementById('ld').style.display = 'none';
  document.getElementById('app').style.display = 'block';
});
</script>
