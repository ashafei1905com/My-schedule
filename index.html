const KUWAIT_TZ = 'Asia/Kuwait';
const p2 = (n)=>String(n).padStart(2,'0');

function getKuwaitNowMinutes(){
  try{
    const parts = new Intl.DateTimeFormat('en-GB',{timeZone:KUWAIT_TZ,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date());
    const out={};
    parts.forEach(p=>{if(p.type!=='literal') out[p.type]=p.value});
    const h=parseInt(out.hour||'0',10);
    const m=parseInt(out.minute||'0',10);
    return h*60+m;
  }catch{
    const d=new Date();
    return d.getHours()*60+d.getMinutes();
  }
}

function getKuwaitDateParts(){
  try{
    const parts=new Intl.DateTimeFormat('en-GB',{timeZone:KUWAIT_TZ,year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'}).formatToParts(new Date());
    const out={};
    parts.forEach(p=>{ if(p.type!=='literal') out[p.type]=p.value; });
    return out;
  }catch{
    const d=new Date();
    return {year:`${d.getFullYear()}`,month:p2(d.getMonth()+1),day:p2(d.getDate()),weekday:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]};
  }
}

function todayStr(){
  const d=getKuwaitDateParts();
  return `${d.year}-${d.month}-${d.day}`;
}

function todayJD(){
  const weekday=getKuwaitDateParts().weekday;
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].indexOf(weekday);
}

const TODAY=todayStr();

function getDateStrForDayIndex(jd) {
  const currentJD = todayJD();
  const diff = jd - currentJD;
  const d = new Date();
  d.setDate(d.getDate() + diff);
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}

function cleanTimeStr(s){
  if(!s) return '';
  const m=String(s).match(/\d{1,2}:\d{2}/);
  return m?m[0]:String(s);
}

function fmt24(t){
  const s=cleanTimeStr(t);
  if(!s) return '';
  let [h,m]=s.split(':').map(Number);
  if(h >= 24) h -= 24; 
  const pm=h>=12;
  const dh=h>12?h-12:(h===0?12:h);
  return `${dh}:${p2(m)} ${pm?'م':'ص'}`;
}

function toMin(s){
  if(!s) return 0;
  const s0=cleanTimeStr(s);
  const raw=String(s);
  if(raw.includes('ص')||raw.includes('م')){
    const pm=raw.includes('م');
    const [h,m]=s0.split(':').map(Number);
    let hr=h;
    if(pm&&h!==12) hr+=12;
    if(!pm&&h===12) hr=0;
    return hr*60+(m||0);
  }
  const [h,m]=s0.split(':').map(Number);
  return h*60+(m||0);
}

function getSortMinutes(task) {
  const id = task[0];
  const timeStr = task[10] || task[1];
  let min = toMin(timeStr);
  
  if (id.includes('-sl') || id.includes('-dn') || id.includes('-pm')) {
    if (min < 240) { 
      return 1440 + min; 
    }
    return min + 720; 
  }
  return min;
}

function taskIsPassed(task){
  const currentMin = getKuwaitNowMinutes();
  const t24 = task[10] || task[1];
  const taskMin = toMin(t24);

  if (isPrayerTask(task)) {
    const pk = task[0].split('-')[2];
    if (pk === 'Fajr') return currentMin >= toMin(PRYT.Fajr || FALLBK.Fajr);
    if (pk === 'Dhuhr') return currentMin >= toMin(PRYT.Dhuhr || FALLBK.Dhuhr);
    if (pk === 'Asr') return currentMin >= toMin(PRYT.Asr || FALLBK.Asr);
    if (pk === 'Maghrib') return currentMin >= toMin(PRYT.Maghrib || FALLBK.Maghrib);
    if (pk === 'Isha') return currentMin >= toMin(PRYT.Isha || FALLBK.Isha);
    return currentMin > taskMin;
  }

  return currentMin > (taskMin + 180);
}

function isPrayerTask(task){
  return task[2]==='prayer';
}

function floatPts(x,y,n){
  const e=document.createElement('div');

  document.body.appendChild(e);
  setTimeout(()=>e.remove(),900);
}

let toastTmr;
function showToast(msg,ms=3500){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg;
  t.style.opacity='1';
  t.style.transform='translateX(-50%) translateY(-10px)';
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>{
    t.style.opacity='0';
    t.style.transform='translateX(-50%) translateY(0)';
  },ms);
}

function buildPTasks(jd){
  const k=DKEYS[jd];
  return Object.entries(PMETA).filter(([pk])=>!(jd===5 && pk==='Dhuhr')).map(([pk,pm])=>{
    const t24=PRYT[pk]||FALLBK[pk];
    const desc=pk==='Fajr'?`${fmt24(t24)} · ارجع نام بعدها فوراً لتوفير طاقة البناء العضلي ✓`:`وقت الصلاة: ${fmt24(t24)}`;
    return [`pr-${k}-${pk}`,fmt24(t24),'prayer',pm.ic,pm.ar,desc,pm.pts,null,null,false,t24];
  });
}

function getAllTasks(jd){
  const d=SCHED[jd];
  if(!d) return [];
  const frees=(FREE_TIME[jd]||[]).map((f,i)=>[`fr-${jd}-${i}`,f.t,'free','🎮','وقت مريح وحر لتهدئة الأعصاب',f.d,0,null,null,false]);
  return [...buildPTasks(jd),...d.ts,...frees].sort((a,b)=>getSortMinutes(a)-getSortMinutes(b));
}

function getReqTasks(jd){
  return [...buildPTasks(jd),...(SCHED[jd]?.ts||[])].filter(t=>!t[9] && t[6]>0);
}

const LS={
  stats:'sc:stats',
  progress:'sc:progress',
  alts:'sc:alts',
  weekly:(dt)=>`sc:weekly:${dt}`,

};

async function sGet(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}}
async function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

let STATS={cur:0,best:0,pts:0,lc:null,lf:null,lastWeeklyReset:null};
let PROGRESS={}; 
let SELECTED_ALTS={}; 
let WEEKLY_REPORT=[];

function updateDailyRefreshIfNeeded(){
  if(STATS.lc===TODAY) return;
  const yesterday=dateOff(-1);
  if(STATS.lf && STATS.lf!==TODAY && STATS.lf!==yesterday){
    STATS.cur=0;
  }
  if(todayJD() === 0 && STATS.lastWeeklyReset !== TODAY) {
    STATS.pts = 0; 
    STATS.lastWeeklyReset = TODAY;
    showToast("🔄 أسبوع جديد ماليان التزام وتدريب! تم تصفير النقاط الإجمالية.");
  }
  STATS.lc=TODAY;
}

function dateOff(n){
  const d=new Date();
  d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}

async function localLoad(){
  STATS=(await sGet(LS.stats))||{cur:0,best:0,pts:0,lc:null,lf:null,lastWeeklyReset:null};
  PROGRESS=(await sGet(LS.progress))||{};
  SELECTED_ALTS=(await sGet(LS.alts))||{};
  WEEKLY_REPORT=(await sGet(LS.weekly(TODAY)))||[];
}

async function localSave(){
  await sSet(LS.stats,STATS);
  await sSet(LS.progress,PROGRESS);
  await sSet(LS.alts,SELECTED_ALTS);
  await sSet(LS.weekly(TODAY),WEEKLY_REPORT);
}

function getTaskDisplayDesc(task, jd){
  const id=task[0];

  const chosen = dayAlts[id];
  const desc=task[5];
  const alts=task[7];
  if(alts && chosen && alts.includes(chosen)) return chosen;
  return desc;
}

function updateUI(){
  const jd = todayJD();
  const dateStr = getDateStrForDayIndex(jd);
  const req=getReqTasks(jd);
  const dayProgress = PROGRESS[dateStr] || {};
  const done=req.filter(t=>dayProgress[t[0]]!==undefined);
  const pct=req.length?Math.round(done.length/req.length*100):0;
  
  const todayPts=done.reduce((s,t)=>{
      const val = dayProgress[t[0]];
      if(typeof val === 'number') return s + val;
      if(val === 'qada') return s + Math.floor(t[6]/2);
      return s + t[6];
  },0);
  
  document.getElementById('sv1').textContent=STATS.cur;
  document.getElementById('sv2').textContent=STATS.pts; 
  document.getElementById('sv3').textContent=STATS.best;
  
  document.getElementById('ptxt').textContent=`${done.length}/${req.length} مهمة (${pct}%)`;
  document.getElementById('ppts').textContent=`${todayPts} نقطة اليوم`;
  document.getElementById('pfill').style.width=pct+'%';
}

function switchDay(jd){
  document.querySelectorAll('.tab').forEach(b=>{
    b.style.background = 'var(--c2)';
    b.style.color = 'var(--tx)';
  });
  const tb=document.getElementById(`tb-${DKEYS[jd]}`);
  if(tb){
    tb.style.background = 'var(--br)';
    tb.style.color = 'var(--ac)';
    tb.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }
  document.querySelectorAll('.pan').forEach(p=>p.style.display='none');
  const targetPan = document.getElementById(`pan-${DKEYS[jd]}`);
  if(targetPan) targetPan.style.display = 'flex';
  updateUI();
}

function completeStreakIfDayDone(){
  const jd = todayJD();
  const dateStr = getDateStrForDayIndex(jd);
  const req=getReqTasks(jd);
  const dayProgress = PROGRESS[dateStr] || {};
  const isAllDone=req.every(t=>dayProgress[t[0]]!==undefined);
  if(isAllDone && STATS.lf!==TODAY){
    const yesterday=dateOff(-1);
    if(STATS.lf===yesterday){
      STATS.cur=STATS.cur+1;
    }else{
      STATS.cur=1;
    }
    STATS.lf=TODAY;
    STATS.best=Math.max(STATS.best,STATS.cur);
    showToast(`🎉 التزام كامل بالوجبات والتمرين بدون عك مفاجئ!\nاستريك: ${STATS.cur} يوم 🔥\nنقاطك: ${STATS.pts} ⭐`,4000);
  }
}

async function onConfirm(task, pts, rect){
  const jd = todayJD();
  const dateStr = getDateStrForDayIndex(jd);
  if(!PROGRESS[dateStr]) PROGRESS[dateStr] = {};
  if(PROGRESS[dateStr][task[0]]!==undefined) return;
  if(taskIsPassed(task)){
    showToast('فات الوقت');
    return;
  }
  PROGRESS[dateStr][task[0]]=pts;
  STATS.pts+=pts;
  
  WEEKLY_REPORT.push({t:new Date().toISOString(),taskId:task[0],day:TODAY,points:pts,label:task[4]});
  
  completeStreakIfDayDone();
  await saveAndRefresh();
  floatPts(rect.left+rect.width/2-20, rect.top-10, pts);
}

async function onQada(task, pts, rect){
  const jd = todayJD();
  const dateStr = getDateStrForDayIndex(jd);
  if(!PROGRESS[dateStr]) PROGRESS[dateStr] = {};
  if(PROGRESS[dateStr][task[0]]!==undefined) return;
  if(!isPrayerTask(task)) return;
  if(!taskIsPassed(task)) return;

  const half=Math.floor(pts/2);
  PROGRESS[dateStr][task[0]]='qada';
  STATS.pts+=half;
  WEEKLY_REPORT.push({t:new Date().toISOString(),taskId:task[0],day:TODAY,points:half,label:task[4]});
  completeStreakIfDayDone();
  await saveAndRefresh();
  floatPts(rect.left+rect.width/2-20, rect.top-10, half);
  showToast('تم قضاء الصلاة (50%)');
}

function getCoords() {
  return new Promise((resolve) => {
    try {
      const cachedData = localStorage.getItem(LS.coords);
      if (cachedData) {
        const parsed = JSON.parse(cachedData);
        if (Date.now() - parsed.timestamp < 3 * 24 * 60 * 60 * 1000) {
          return resolve(parsed.coords);
        }
      }
    } catch(e) { console.warn('خطأ كاش الموقع', e); }

    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        try {
          localStorage.setItem(LS.coords, JSON.stringify({ coords, timestamp: Date.now() }));
        } catch(e){}
        resolve(coords);
      },
      () => resolve(null),
      { timeout: 6000 }
    );
  });
}

async function fetchPrayers(){
  try{
    const coords = await getCoords();
    let url = 'https://api.aladhan.com/v1/timingsByCity?city=Salmiya&country=Kuwait&method=9'; 
    if (coords) {
      url = `https://api.aladhan.com/v1/timings?latitude=${coords.lat}&longitude=${coords.lng}&method=9`;
      console.log(`تم تحديد موقعك الفعلي بنجاح: ${coords.lat}, ${coords.lng}`);
    } else {
      console.log('لم يتم منح إذن الموقع الفعلي، تم تفعيل توقيت السالمية الافتراضي');
    }
    const res = await fetch(url);
    const data = await res.json();
    if(data && data.code === 200) {
      const timings = data.data.timings;
      PRYT = {
        Fajr: timings.Fajr,
        Sunrise: timings.Sunrise,
        Dhuhr: timings.Dhuhr,
        Asr: timings.Asr,
        Maghrib: timings.Maghrib,
        Isha: timings.Isha
      };
      startNextPrayerCountdown(PRYT);
      return true;
    }
    throw new Error('API Error');
  }catch(e){
    PRYT = {...FALLBK};
    startNextPrayerCountdown(PRYT);
    return false;
  }
}

function startNextPrayerCountdown(timings){
  if(window.prayerInterval) clearInterval(window.prayerInterval);
  window.prayerInterval=setInterval(()=>{
    const now=new Date();
    const currentMinutes=now.getHours()*60+now.getMinutes();
    const parseToMinutes=(t)=>{const [h,m]=t.split(':').map(Number);return h*60+m;};
    const prayerKeys=[
      {name:'الفجر',time:timings.Fajr},
      {name:'الشروق',time:timings.Sunrise},
      {name:'الظهر',time:timings.Dhuhr},
      {name:'العصر',time:timings.Asr},
      {name:'المغرب',time:timings.Maghrib},
      {name:'العشاء',time:timings.Isha}
    ];
    let nextPrayerName='الفجر'; let nextPrayerTime=timings.Fajr; let found=false;
    for(const p of prayerKeys){
      if(currentMinutes<parseToMinutes(p.time)){
        nextPrayerName=p.name; nextPrayerTime=p.time; found=true; break;
      }
    }
    if(!found){nextPrayerName='الفجر'; nextPrayerTime=timings.Fajr;}
    const targetMinutes=parseToMinutes(nextPrayerTime);
    let diffMinutes=targetMinutes-currentMinutes;
    if(diffMinutes<0) diffMinutes+=24*60;
    const hoursLeft=Math.floor(diffMinutes/60);
    const minsLeft=diffMinutes%60;
    const secsLeft=59-now.getSeconds();
    const countdownStr=`${hoursLeft}:${String(minsLeft).padStart(2,'0')}:${String(secsLeft).padStart(2,'0')}`;
    const setIf=(id,val)=>{const el=document.getElementById(id);if(el) el.innerText=val||''};
    setIf('next-prayer-title',`المتبقي لأذان ${nextPrayerName}`);
    setIf('next-prayer-countdown',countdownStr);
  },1000);
}

function attachDynamicEvents() {
  document.querySelectorAll('.confirm-btn').forEach(btn => {
    btn.onclick = (e) => {
      const id = btn.getAttribute('data-id');
      const pts = parseInt(btn.getAttribute('data-pts'), 10);
      const task = getAllTasks(todayJD()).find(t => t[0] === id);
      if(task) onConfirm(task, pts, btn.getBoundingClientRect());
    };
  });

  document.querySelectorAll('.qada').forEach(btn => {
    btn.onclick = (e) => {
      const id = btn.getAttribute('data-id');
      const pts = parseInt(btn.getAttribute('data-pts'), 10);
      const task = getAllTasks(todayJD()).find(t => t[0] === id);
      if(task) onQada(task, pts, btn.getBoundingClientRect());
    };
  });

  document.querySelectorAll('.altbtn').forEach(btn => {
    btn.onclick = () => {
      const id = btn.getAttribute('data-id');
      const list = document.getElementById(`al-${id}`);
      if(list) list.style.display = list.style.display === 'none' ? 'flex' : 'none';
    };
  });

  document.querySelectorAll('.alt-pick-btn').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.getAttribute('data-id');
      const altVal = btn.getAttribute('data-alt');
      const dateStr = getDateStrForDayIndex(todayJD());
      if(!SELECTED_ALTS[dateStr]) SELECTED_ALTS[dateStr] = {};
      SELECTED_ALTS[dateStr][id] = altVal;
      await saveAndRefresh();
    };
  });
}

function initFirebaseAuth(){
  const btn=document.getElementById('btn-signin');
  if(!btn) return;

  btn.onclick=async ()=>{
    try{
      const provider=new GoogleAuthProvider();
      await signInWithRedirect(fbAuth,provider);
    }catch(e){
      showToast('فشل تسجيل الدخول');
    }
  };

  onAuthStateChanged(fbAuth,(user)=>{
    const nameEl=document.getElementById('authName');

    if(!user){
      if(nameEl) nameEl.textContent='';
      btn.textContent='تسجيل دخول';
      btn.onclick=async ()=>{
        const provider=new GoogleAuthProvider();
        await signInWithRedirect(fbAuth,provider);
      };
      return;
    }

    if(nameEl) nameEl.textContent=user.displayName||user.email||'';
    btn.textContent='خروج';
    btn.onclick=()=>fbAuth.signOut();

    (async()=>{
      try{
        const uid=user.uid;
        if(window.__sc_unsub){try{window.__sc_unsub();}catch(e){}}

        const snap=await getDoc(doc(fbDb,'users',uid));
        if(snap.exists()){
          const data=snap.data()||{};
          if(data.stats && typeof data.stats==='object') STATS=data.stats;
          if(data.progress && typeof data.progress==='object') PROGRESS=data.progress;
          if(data.alts && typeof data.alts==='object') SELECTED_ALTS=data.alts;
          await localSave();
        }

        renderPanelsForAllDays();
        switchDay(todayJD());
        updateUI();

        window.__sc_unsub=onSnapshot(doc(fbDb,'users',uid),(snap)=>{
          const data=snap.data()||{};
          if(data.stats && typeof data.stats==='object') STATS=data.stats;
          if(data.progress && typeof data.progress==='object') PROGRESS=data.progress;
          if(data.alts && typeof data.alts==='object') SELECTED_ALTS=data.alts;
          
          localSave().then(()=>{
            renderPanelsForAllDays();
            switchDay(todayJD());
            updateUI();
          });
        });

      }catch(e){console.warn('Realtime database sync failed',e);}
    })();
  });
}

(async function init(){
  await localLoad();
  updateDailyRefreshIfNeeded();
  renderTabs();
  renderPanelsForAllDays();
  switchDay(todayJD());
  updateUI();
  initFirebaseAuth();
  await fetchPrayers();
})();
</script>
