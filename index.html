<! DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>جدول عبدالله 🏋️</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--c:#111827;--c2:#1a2235;--br:#1e2d45;--ac:#3b82f6;--gr:#10b981;--or:#f59e0b;--rd:#ef4444;--pu:#8b5cf6;--ye:#fbbf24;--cy:#06b6d4;--pk:#ec4899;--tx:#f1f5f9;--mu:#64748b;--so:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);direction:rtl}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(1.3)}}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes flashRed{0%{background:rgba(239,68,68,.35)}100%{background:rgba(10,14,26,.96)}}
@keyframes streakPulse{0%{transform:scale(1)}50%{transform:scale(1.5);color:#fbbf24;text-shadow:0 0 18px #fbbf24}100%{transform:scale(1)}}
@keyframes ontimeGlow{0%{box-shadow:0 0 0 rgba(16,185,129,0);border-color:var(--br)}40%{box-shadow:0 0 18px 3px rgba(16,185,129,.55);border-color:var(--gr)}100%{box-shadow:0 0 0 rgba(16,185,129,0)}}
@keyframes lateGlow{0%{box-shadow:0 0 0 rgba(245,158,11,0);border-color:var(--br)}40%{box-shadow:0 0 18px 3px rgba(245,158,11,.55);border-color:var(--or)}100%{box-shadow:0 0 0 rgba(245,158,11,0)}}
@keyframes qadaGlow{0%{box-shadow:0 0 0 rgba(148,163,184,0)}40%{box-shadow:0 0 14px 2px rgba(148,163,184,.4)}100%{box-shadow:0 0 0 rgba(148,163,184,0)}}
@keyframes barGold{0%{filter:brightness(1)}50%{filter:brightness(1.6) saturate(1.4)}100%{filter:brightness(1)}}
#sbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--br);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.penalty-flash{animation:flashRed 1s ease}
.streak-broke{animation:shakeX .5s ease}
.streak-win{display:inline-block;animation:streakPulse .7s ease}
.milestone-hit{display:inline-block;animation:streakPulse 1s ease 2}
.card-ontime{animation:ontimeGlow 1s ease}
.card-late{animation:lateGlow 1s ease}
.card-qada{animation:qadaGlow 1s ease}
.bar-gold{animation:barGold .9s ease}
.st{display:flex;flex-direction:column;align-items:center;gap:1px}
.sv{font-size:1.5rem;font-weight:900;line-height:1}
.sl{font-size:.6rem;color:var(--so);font-weight:700}
#sv1{color:var(--or)}#sv2{color:var(--ye)}#sv3{color:var(--pu)}
.pw{padding:10px 16px 0}
.pb{background:var(--c);border:1px solid var(--br);border-radius:10px;padding:10px 14px}
.ph{display:flex;justify-content:space-between;font-size:.77rem;color:var(--so);margin-bottom:6px}
.pbg{height:6px;background:var(--br);border-radius:3px;overflow:hidden}
.pfx{height:100%;background:linear-gradient(90deg,var(--ac),var(--gr));border-radius:3px;transition:width .4s}
.tw{overflow-x:auto;scrollbar-width:none;padding:10px 16px 4px}
.tw::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:6px;width:max-content}
.tab{flex-shrink:0;padding:8px 13px;background:var(--c);border:1px solid var(--br);border-radius:8px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.82rem;font-weight:700;color:var(--so);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab:hover{border-color:var(--ac);color:var(--tx)}
.tab.act{background:#2563eb;border-color:#2563eb;color:#fff}
.tab.tod:not(.act){border-color:var(--gr);color:var(--gr)}
.gdot{width:5px;height:5px;border-radius:50%;background:var(--or)}
.tab.act .gdot{background:rgba(255,255,255,.7)}
.pan{display:none;padding:0 16px 100px}
.pan.act{display:block}
.dh{padding:14px 16px;background:linear-gradient(135deg,var(--c),var(--c2));border:1px solid var(--br);border-radius:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.dhn{font-size:1.1rem;font-weight:900}
.dhm{font-size:.7rem;color:var(--mu);margin-top:2px}
.gbx{padding:4px 10px;border-radius:6px;font-size:.72rem;font-weight:700}
.gbu{background:rgba(239,68,68,.15);color:#ef4444}
.gbl{background:rgba(245,158,11,.15);color:#f59e0b}
.gbr{background:rgba(100,116,139,.1);color:var(--mu)}
.prow{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.prow::-webkit-scrollbar{display:none}
.ppill{flex-shrink:0;padding:6px 10px;background:var(--c);border:2px solid var(--br);border-radius:8px;text-align:center;min-width:60px;transition:all .2s}
.ppill.done{border-color:var(--gr);background:rgba(16,185,129,.1)}
.ppill.sunrise-pill{border-color:var(--or);background:rgba(245,158,11,.06)}
.pnam{font-size:.6rem;color:var(--so);font-weight:700}
.ptim{font-size:.72rem;font-weight:700}
.tl{position:relative;padding-right:20px}
.tl::before{content:'';position:absolute;right:7px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--ac),transparent);border-radius:2px}
.tc{position:relative;margin-bottom:8px;padding:12px 14px;background:var(--c);border:1px solid var(--br);border-radius:12px;display:flex;align-items:flex-start;gap:10px;transition:border-color .2s,background .2s}
.tc::before{content:'';position:absolute;right:-24px;top:16px;width:10px;height:10px;border-radius:50%;background:var(--c2);border:2px solid var(--br)}
.tc.done{background:rgba(16,185,129,.05);border-color:rgba(16,185,129,.3)}
.tc.done::before{border-color:var(--gr);background:var(--gr)}
.tc.excx{background:rgba(6,182,212,.04);border-color:rgba(6,182,212,.2)}
.tc[data-c="prayer"]{border-right:3px solid var(--ye)}
.tc[data-c="food"]{border-right:3px solid var(--or)}
.tc[data-c="gym"]{border-right:3px solid var(--rd)}
.tc[data-c="swim"]{border-right:3px solid var(--cy)}
.tc[data-c="recovery"]{border-right:3px solid var(--gr)}
.tc[data-c="quran"]{border-right:3px solid var(--ye)}
.tc[data-c="prog"]{border-right:3px solid var(--pk)}
.tc[data-c="sleep"]{border-right:3px solid var(--pu)}
.tc[data-c="free"]{border-right:3px dashed #6366f1}
.tc[data-c="sunrise"]{border-right:3px solid var(--or)}
.tctime{font-size:.67rem;color:var(--mu);font-weight:700;min-width:60px;text-align:left;padding-top:2px;direction:ltr;flex-shrink:0}
.tcico{font-size:1.1rem;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);flex-shrink:0}
.tcbody{flex:1;min-width:0}
.tcname{font-weight:700;font-size:.88rem;margin-bottom:2px}
.tcdesc{font-size:.73rem;color:var(--so);line-height:1.5}
.hwtag{display:inline-block;margin-top:4px;padding:2px 7px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:4px;font-size:.62rem;color:#ef4444;font-weight:700}
.excbadge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.3);border-radius:6px;font-size:.67rem;color:var(--cy);font-weight:700;flex-shrink:0}
.altbtn{margin-top:5px;padding:5px 10px;background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.5);border-radius:6px;font-size:.68rem;font-weight:800;color:#60a5fa;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-family:'Cairo',sans-serif;transition:all .2s}
.altbtn:hover{background:rgba(59,130,246,.3)}
.altbtn:disabled{opacity:.5;cursor:not-allowed}
.altlist{display:none;margin-top:6px;padding:8px;background:rgba(0,0,0,.2);border-radius:6px;border:1px solid var(--br)}
.altlist.open{display:block}
.altitem{font-size:.72rem;color:#cbd5e1;padding:4px 2px;display:flex;gap:6px;cursor:pointer;font-weight:600}
.altitem::before{content:'←';color:var(--ac)}
.cbtn{flex-shrink:0;padding:6px 10px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.4);border-radius:8px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.73rem;font-weight:700;color:var(--gr);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:1px}
.cbtn:hover{background:rgba(16,185,129,.2)}
.cbtn.done{background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.2);color:var(--mu);cursor:default}
.cbtn.exp{background:rgba(100,116,139,.08);border-color:rgba(100,116,139,.4);color:var(--mu);cursor:not-allowed}
.cbtn.qada{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.35);color:var(--or)}
.cbtn.qada:hover{background:rgba(245,158,11,.15)}
.ptslbl{font-size:.58rem;color:var(--mu)}
.ptsbdg{padding:4px 8px;background:rgba(100,116,139,.1);border:1px solid var(--br);border-radius:6px;font-size:.67rem;color:var(--mu);flex-shrink:0}
.floatpts{position:fixed;pointer-events:none;z-index:9999;font-size:1.1rem;font-weight:900;color:var(--ye);font-family:'Cairo',sans-serif;animation:up .8s ease-out forwards}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--c2);border:2px solid var(--gr);border-radius:12px;padding:14px 20px;font-size:.85rem;font-weight:700;color:var(--gr);z-index:9999;display:none;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:340px;white-space:pre-line}
#toast.show{display:block;animation:ti .3s ease}
#toast.toast-warn{border-color:#ef4444;color:#ef4444}
#toast.toast-qada{border-color:var(--so);color:var(--so)}
#toast.toast-late{border-color:var(--or);color:var(--or)}
#toast.toast-gold{border-color:#fbbf24;color:#fbbf24;box-shadow:0 0 24px rgba(251,191,36,.4)}

/* Top bar action buttons — visually distinct per function */
.topbtn{padding:9px 16px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s;border:none}
.topbtn-report{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 2px 10px rgba(37,99,235,.35)}
.topbtn-report:hover{box-shadow:0 4px 16px rgba(37,99,235,.5);transform:translateY(-1px)}
.topbtn-report:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.topbtn-history{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;box-shadow:0 2px 10px rgba(124,58,237,.35)}
.topbtn-history:hover{box-shadow:0 4px 16px rgba(124,58,237,.5);transform:translateY(-1px)}
.topbtn-signout{background:rgba(239,68,68,.12);border:1.5px solid rgba(239,68,68,.5);color:#f87171}
.topbtn-signout:hover{background:rgba(239,68,68,.22)}
.topbtn-signin{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 2px 10px rgba(16,185,129,.35)}
.topbtn-signin:hover{box-shadow:0 4px 16px rgba(16,185,129,.5);transform:translateY(-1px)}

/* Prayer Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,14,26,.92);display:none;align-items:center;justify-content:center;z-index:10000;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--c2);border:2px solid var(--br);border-radius:20px;padding:28px 20px;width:100%;max-width:420px;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,.7)}
.modal-step-ind{font-size:.65rem;color:var(--mu);margin-bottom:10px}
.modal-title{font-size:1.1rem;font-weight:900;margin-bottom:4px;color:var(--tx)}
.modal-sub{font-size:.75rem;color:var(--so);margin-bottom:20px}
.modal-opts{display:flex;flex-direction:column;gap:10px}
.modal-opt{padding:14px 16px;border-radius:12px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:700;border:2px solid var(--br);background:var(--c);color:var(--tx);transition:all .2s;display:flex;align-items:center;justify-content:space-between;text-align:right}
.modal-opt:hover{border-color:var(--ac);background:rgba(59,130,246,.08)}
.modal-opt.gold{border-color:#d4af37;background:rgba(212,175,55,.07);color:#f5d060;box-shadow:0 0 14px rgba(212,175,55,.2)}
.modal-opt.gold:hover{background:rgba(212,175,55,.14);box-shadow:0 0 22px rgba(212,175,55,.35)}
.opt-pts{font-size:.72rem;direction:ltr;opacity:.9;white-space:nowrap}
.modal-back-btn{margin-top:16px;padding:9px 18px;background:rgba(239,68,68,.12);border:2px solid rgba(239,68,68,.45);border-radius:10px;color:#ef4444;font-family:'Cairo',sans-serif;font-weight:800;font-size:.82rem;cursor:pointer;transition:all .2s}
.modal-back-btn:hover{background:rgba(239,68,68,.22)}

/* Weekly Report / History Modal */
.report-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,14,26,.95);display:none;align-items:flex-start;justify-content:center;z-index:10001;padding:40px 20px;overflow-y:auto}
.report-overlay.open{display:flex}
.report-box{background:var(--c2);border:2px solid var(--br);border-radius:20px;padding:24px 24px;width:100%;max-width:650px;margin:auto;box-shadow:0 10px 40px rgba(0,0,0,0.8)}
.report-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:12px;border-bottom:2px solid var(--br)}
.report-title{font-size:1.4rem;font-weight:900;color:var(--ye)}
.report-range{font-size:.72rem;color:var(--mu);font-weight:700;margin-top:2px}
.report-close{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:8px;padding:6px 16px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:700;transition:all .2s}
.report-close:hover{background:rgba(239,68,68,.2)}
.report-summary{display:grid;grid-template-columns:repeat(4, 1fr);gap:12px;margin-bottom:24px}
.report-stat{background:var(--c);border:1px solid var(--br);border-radius:12px;padding:16px 12px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
.report-stat-val{font-size:1.8rem;font-weight:900;color:var(--ye)}
.report-stat-lbl{font-size:.75rem;color:var(--so);margin-top:4px;font-weight:700}
.report-day{background:var(--c);border:1px solid var(--br);border-radius:12px;padding:16px;margin-bottom:12px}
.report-day-title{font-size:1rem;font-weight:900;color:var(--ac);margin-bottom:12px;border-bottom:1px solid rgba(59,130,246,.2);padding-bottom:6px}
.report-day-row{font-size:.85rem;color:var(--tx);padding:4px 0;display:flex;justify-content:space-between;align-items:center;font-weight:700;gap:8px}
.report-prayer-detail{font-size:.75rem;color:var(--tx);margin-top:6px;padding:8px 12px;background:rgba(10,14,26,.6);border:1px solid var(--br);border-radius:8px;line-height:1.8;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.badge-green{color:#10b981;font-weight:900;background:rgba(16,185,129,.15);padding:2px 8px;border-radius:4px}
.badge-red{color:#ef4444;font-weight:900;background:rgba(239,68,68,.15);padding:2px 8px;border-radius:4px}
.badge-or{color:var(--or);font-weight:700}
.badge-alt{color:#60a5fa;font-weight:700;background:rgba(59,130,246,.12);padding:2px 8px;border-radius:4px;font-size:.68rem}
.report-day-enc{margin-top:10px;padding:8px 12px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);border-radius:8px;font-size:.75rem;color:var(--ye);font-weight:700;text-align:center}
.report-history-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:rgba(0,0,0,.15);border:1px solid rgba(30,45,69,.6);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.report-history-item:hover{background:rgba(124,58,237,.14);border-color:rgba(124,58,237,.5)}
.report-history-item b{color:var(--ye)}
.report-back-btn{margin-bottom:16px;padding:9px 16px;background:rgba(124,58,237,.14);border:1px solid rgba(124,58,237,.5);border-radius:10px;color:#a78bfa;font-family:'Cairo',sans-serif;font-weight:800;font-size:.82rem;cursor:pointer}
.report-back-btn:hover{background:rgba(124,58,237,.24)}
.history-empty{color:var(--mu);font-weight:700;text-align:center;padding:30px 10px}
@media(max-width:500px){.report-summary{grid-template-columns:1fr 1fr;}}

/* AI Assistant widget */
#aiFab{position:fixed;bottom:22px;left:22px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#6d28d9);display:flex;align-items:center;justify-content:center;font-size:1.6rem;cursor:pointer;z-index:9998;box-shadow:0 4px 20px rgba(139,92,246,.5);border:none;transition:transform .2s}
#aiFab:hover{transform:scale(1.08)}
#aiFab.hidden{display:none}
#aiPanel{position:fixed;bottom:0;left:0;width:100%;max-width:420px;height:min(640px,88vh);background:var(--c2);border:2px solid var(--br);border-radius:20px 20px 0 0;z-index:9999;display:none;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.6)}
#aiPanel.open{display:flex}
@media(min-width:460px){#aiPanel{bottom:22px;left:22px;border-radius:20px}}
.ai-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--br);flex-shrink:0}
.ai-title{font-weight:900;font-size:1rem;display:flex;align-items:center;gap:8px}
.ai-sub{font-size:.65rem;color:var(--mu);margin-top:2px}
.ai-close{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#f87171;border-radius:8px;padding:5px 12px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700}
.ai-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:.85rem;line-height:1.6;white-space:pre-wrap}
.ai-msg.user{align-self:flex-end;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border-bottom-left-radius:4px}
.ai-msg.bot{align-self:flex-start;background:var(--c);border:1px solid var(--br);color:var(--tx);border-bottom-right-radius:4px}
.ai-msg.bot.err{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08)}
.ai-msg.bot.ok{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.08)}
.ai-empty{color:var(--mu);text-align:center;padding:30px 10px;font-size:.8rem;line-height:1.8}
.ai-inputrow{display:flex;gap:8px;padding:12px;border-top:1px solid var(--br);flex-shrink:0}
.ai-input{flex:1;background:var(--c);border:1px solid var(--br);border-radius:10px;padding:10px 14px;color:var(--tx);font-family:'Cairo',sans-serif;font-size:.85rem;resize:none;max-height:90px}
.ai-input:focus{outline:none;border-color:var(--pu)}
.ai-send{background:linear-gradient(135deg,#8b5cf6,#6d28d9);border:none;color:#fff;border-radius:10px;padding:0 18px;cursor:pointer;font-weight:800;font-size:.9rem}
.ai-send:disabled{opacity:.4;cursor:not-allowed}
.ai-clearbtn{background:none;border:none;color:var(--mu);font-size:.68rem;cursor:pointer;text-decoration:underline;padding:0}
.ai-signin-note{padding:10px 14px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:10px;font-size:.72rem;color:var(--or);margin:10px 16px 0}
</style>
</head>
<body>

<div id="ld" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px">
  <div style="width:40px;height:40px;border:3px solid #1e2d45;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite"></div>
  <span style="color:#64748b;font-family:Cairo,sans-serif;font-size:.9rem">جاري تحميل جدول عبدالله...</span>
</div>

<main id="app" style="display:none">
  <div id="sbar">
    <div style="display:flex;gap:12px">

// All date logic now uses UTC to prevent any timezone-related bugs.

function getKuwaitDateParts(dt = new Date()) {
    // This remains for display purposes but not for logic.
    try {
        const pts = new Intl.DateTimeFormat('en-GB', { timeZone: KUWAIT_TZ, year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' }).formatToParts(dt);
        const o = {}; pts.forEach(p => { if (p.type !== 'literal') o[p.type] = p.value }); return o;
    } catch {
        const d = dt; return { year: `${d.getFullYear()}`, month: p2(d.getMonth() + 1), day: p2(d.getDate()), weekday: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][d.getDay()] };
    }
}

function dateToUTC(date) {
    // Creates a UTC date object from a local date, preserving the year, month, and day.
    return new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
}

function todayStr() {
    // Returns today's date as a 'YYYY-MM-DD' string based on UTC.
    const today = dateToUTC(new Date());
    return today.toISOString().split('T')[0];
}

function dateOff(n, base) {
    // Returns a 'YYYY-MM-DD' string for a date `n` days away from `base`.
    // Consistently uses UTC for calculations.
    const baseDate = base ? new Date(base + 'T12:00:00Z') : dateToUTC(new Date());
    baseDate.setUTCDate(baseDate.getUTCDate() + n);
    return baseDate.toISOString().split('T')[0];
}

function todayJD() {
    // Returns the UTC day of the week for today.
    return dateToUTC(new Date()).getUTCDay();
}

function getJDfromISO(iso) {
    // Returns the UTC day of the week for a given 'YYYY-MM-DD' string.
    if (!iso) return todayJD();
    const d = new Date(iso + 'T12:00:00Z');
    return d.getUTCDay();
}

function currentWeekStartISO(refISO) {
    const ref = refISO || TODAY;
    const refJD = getJDfromISO(ref);
    const daysSinceSat = (refJD + 1) % 7;
    return dateOff(-daysSinceSat, ref);
}

function dateForWeekday(jd, refISO) {
    const weekStart = currentWeekStartISO(refISO);
    const offsetFromSat = (jd + 1) % 7;
    return dateOff(offsetFromSat, weekStart);
}

const TODAY = todayStr();

function cleanTime(s){if(!s)return'';const m=String(s).match(/\d{1,2}:\d{2}/);return m?m[0]:String(s);}
function fmt24(t){const s=cleanTime(t);if(!s)return'';const[h,m]=s.split(':').map(Number);const pm=h>=12;const dh=h>12?h-12:(h===0?12:h);return`${dh}:${p2(m)} ${pm?'م':'ص'}`;}
function toMin(s){if(!s)return 0;const s0=cleanTime(s);const raw=String(s);if(raw.includes('ص')||raw.includes('م')){const pm=raw.includes('م');const[h,m]=s0.split(':').map(Number);let hr=h;if(pm&&h!==12)hr+=12;if(!pm&&h===12)hr=0;return hr*60+(m||0);}const[h,m]=s0.split(':').map(Number);return h*60+(m||0);} 

function getKuwaitNow(){
  // minutes since midnight in Asia/Kuwait
  try{
    const parts = new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Kuwait',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(new Date());
    const hh = parseInt(parts.find(p=>p.type==='hour')?.value || '0',10);
    const mm = parseInt(parts.find(p=>p.type==='minute')?.value || '0',10);
    return hh*60+mm;
  }catch{
    // fallback: UTC
    const d=new Date();
    return d.getUTCHours()*60+d.getUTCMinutes();
  }
}

function isPrayer(task){return task[2]==='prayer';}

function getState(task){
  const now=getKuwaitNow();
  const start=toMin(task[10]||task[1]);

    let end=start+60;

    else if(pk==='Maghrib')end=toMin(PRYT.Isha||FALLBK.Isha);
    else if(pk==='Isha')end=24*60;
    if(task[0].includes('fri-jm'))end=toMin(PRYT.Asr||FALLBK.Asr);
    if(now>end)return'QADA';
    return'PENDING';
  }
  if(now>start+180)return'EXPIRED';
  return'PENDING';
}

// ===== User Edits (per-account overlay on top of the static SCHED) =====
// This is NEVER visible to a guest / signed-out browser: it only ever loads when
// fbAuth.currentUser exists, and it only ever writes to the signed-in user's own
// Firestore doc. SCHED itself is never mutated — this is a pure overlay applied at
// render time in applyUserEditsToTasks(), so guests always see the untouched schedule.
//
// Shape:
//   moves:   { [taskId]: { toDate:'YYYY-MM-DD', toTime:'HH:MM ص/م', fromDate:'YYYY-MM-DD', _origTask:[...] } }
//   deletes: { [taskId]: true }   // soft-delete: stays visible, greyed out, marked removed
//   pointOverrides: { [taskId]: number }
//   customTasks: [ { id, date, time, cat, ico, name, desc, pts, createdAt } ]
let USER_EDITS={moves:{},deletes:{},pointOverrides:{},customTasks:[]};

function emptyUserEdits(){return{moves:{},deletes:{},pointOverrides:{},customTasks:[]};}

// Applies USER_EDITS to a list of base tasks that were generated for weekday `jd` on
// date `iso`. Returns a NEW array — never mutates SCHED-derived task tuples in place.
//   - Tasks moved AWAY from this date are filtered out here (they'll appear on their
//     target date's render instead, pulled in via the _origTask snapshot).
//   - Tasks moved INTO this date (from elsewhere) are appended, tagged with fromDate.
//   - Deleted tasks stay in the list but get a `_deleted:true` flag (soft-delete).
//   - Point overrides replace task[6] (the point value) via a shallow tuple copy.
//   - Custom tasks for this date are appended as synthetic task tuples.
function applyUserEditsToTasks(baseTasks, iso){
  let out=[];
  for(const t of baseTasks){
    const id=t[0];
    const mv=USER_EDITS.moves[id];
    if(mv && mv.toDate!==iso){
      continue; // moved away from this date — rendered on its target date instead
    }
    let tt=[...t];
    if(USER_EDITS.pointOverrides[id]!==undefined) tt[6]=USER_EDITS.pointOverrides[id];
    if(mv && mv.toTime) tt[1]=mv.toTime;
    if(USER_EDITS.deletes[id]) tt._deleted=true;
    if(mv) tt._movedFrom=mv.fromDate;
    out.push(tt);
  }
  for(const [id,mv] of Object.entries(USER_EDITS.moves)){
    if(mv.toDate!==iso) continue;
    if(out.some(t=>t[0]===id)) continue;
    if(mv._origTask){
      let tt=[...mv._origTask];
      tt[1]=mv.toTime||tt[1];
      if(USER_EDITS.pointOverrides[id]!==undefined) tt[6]=USER_EDITS.pointOverrides[id];
      if(USER_EDITS.deletes[id]) tt._deleted=true;
      tt._movedFrom=mv.fromDate;
      out.push(tt);
    }
  }
  for(const ct of USER_EDITS.customTasks){
    if(ct.date!==iso) continue;
    const tup=[ct.id,ct.time,ct.cat||'free',ct.ico||'✨',ct.name,ct.desc||'',ct.pts||0,null,null,false];
    if(USER_EDITS.deletes[ct.id]) tup._deleted=true;
    tup._custom=true;
    out.push(tup);
  }
  return out;
}

// Legacy savedReports entries (pre-weekStart schema) get deduplicated by content signature,
// since the old code appended a new entry every time the modal was opened.
function migrateSavedReports() {
    // This is the final, most robust version of the migration. It ensures that
    // even if multiple reports for the same week exist due to previous bugs,
    // only the single most recent and relevant one is kept.

    if (!Array.isArray(savedReports)) {
        savedReports = [];
        return;
    }

    const reportMap = new Map();

    // Process all reports, including legacy ones without a proper weekStart.
    for (const report of savedReports) {
        if (!report || (!report.weekStart && !report.date)) {
            continue; // Skip invalid report objects
        }

        // Determine the canonical start of the week (the Saturday) for the report.
        // This is the key to correct de-duplication.
        const reportDate = new Date((report.weekStart || report.date) + 'T12:00:00Z');
        let canonicalWeekStart = new Date(reportDate.getTime());
        // Find the preceding Saturday (day 6). The formula is (day + 1) % 7.
        const dayOfWeek = canonicalWeekStart.getUTCDay();
        const daysToSubtract = (dayOfWeek + 1) % 7;
        canonicalWeekStart.setUTCDate(canonicalWeekStart.getUTCDate() - daysToSubtract);
        
        const canonicalKey = canonicalWeekStart.toISOString().split('T')[0];

        // If we've already stored a report for this week, we only replace it if the new
        // one has more points, indicating it's a more up-to-date version.
        if (reportMap.has(canonicalKey)) {
            const existingReport = reportMap.get(canonicalKey);
            // A simple heuristic: the report with more data is likely the correct one.
            // A "better" heuristic might be the one with the later `weekEnd` date, but totalPts is a good proxy.
            if (report.totalPts >= existingReport.totalPts) {
                reportMap.set(canonicalKey, report);
            }
        } else {
            reportMap.set(canonicalKey, report);
        }
    }

    const cleanedReports = Array.from(reportMap.values());
    
    // Sort the cleaned reports by date, newest first.
    savedReports = cleanedReports.sort((a, b) => {
        const dateA = a.weekStart || a.date;
        const dateB = b.weekStart || b.date;
        return dateB.localeCompare(dateA);
    });
}

// One-time migration: rescue data that was incorrectly saved under future dates
// due to the tab-onclick offset bug (j - todayJD() going positive for Sat/Sun tabs).
// Any historyData key that is strictly in the future gets moved back 7 days,
// provided the target date doesn't already have richer data.
// This runs once on every load but is safe to re-run — future keys will disappear
// after the first run and the condition will never trigger again.
function rescueFutureDatedEntries() {
    const today = new Date(TODAY + 'T12:00:00Z');
    const keysToFix = Object.keys(historyData).filter(k => k > TODAY);
    for (const futureKey of keysToFix) {
        const targetDate = new Date(futureKey + 'T12:00:00Z');
        targetDate.setUTCDate(targetDate.getUTCDate() - 7);
        const correctKey = targetDate.toISOString().split('T')[0];
        // Only rescue if the correct slot is empty or shallower than the future entry.
        const futureEntry = historyData[futureKey];
        const existingEntry = historyData[correctKey] || {};
        const futureDoneCount = Object.keys(futureEntry.done || {}).length;
        const existingDoneCount = Object.keys(existingEntry.done || {}).length;
        if (futureDoneCount > existingDoneCount) {
            historyData[correctKey] = futureEntry;
        }
        delete historyData[futureKey];
    }
}

let PENALTY_FLASH_PENDING=false;

function getPunishRate(){return (STATS.cur||0)>=3 ? 0.15 : 0.35;}

async function applyPunishmentOnce(){
  try{
    // Brand-new account/browser: never punish on the very session that created it.
    // This prevents "sign up today, get docked tonight for a day you never used the app."
    if(IS_BRAND_NEW_SESSION)return;
    const yesterday=dateOff(-1);
    if(penalizedDates[yesterday])return; // checked against the SYNCED ledger now, not a local-only flag
    // Never evaluate a day before the account/browser's first-ever use — there is no
    // legitimate "missed task" data for days that predate FIRST_SEEN.
    if(FIRST_SEEN && yesterday<FIRST_SEEN)return;
    const jd=getJDfromISO(yesterday);
    const tasks=getReqTasks(jd);
    const dayDone=(historyData[yesterday]||{}).done||{};
    const rate=getPunishRate();
    let ded=0,missedCount=0;
    for(const t of tasks){if(!dayDone[t[0]]&&t[6]>0){ded+=Math.round(t[6]*rate);missedCount++;}}
    if(ded>0 && STATS.pts!==undefined){
      STATS.pts=STATS.pts-ded;
      const rateLabel=rate<0.2?'مخفف (إنت مستمر على استريك)':'أعلى (مش على استريك حالياً)';
      showToast(`⚠️ خصم ${ded}⭐ عن ${missedCount} مهمة مفقودة أمس\nمعدل الخصم: ${rateLabel}\nرصيدك الآن: ${STATS.pts}⭐\n\n${pickRandom(ENCOURAGE_MISS)}`,5000,'warn');
      PENALTY_FLASH_PENDING=true;
      if(!historyData[yesterday])historyData[yesterday]={};
      historyData[yesterday].penalty={rate,ded,missedCount};
    }
    penalizedDates[yesterday]=true;
    await saveAll(); // persists the ledger to Firestore immediately so no other device can re-apply it
  }catch(e){console.error(e);}
}

const MILESTONES=[5,10,15,20,25,30,40,50];

function checkStreak(){
  const jd=todayJD();
  const req=getReqTasks(jd);
  const todayDone=(historyData[TODAY]||{}).done||DONE;
  const allDone=req.length>0 && req.every(t=>todayDone[t[0]]);
  const yesterday=dateOff(-1);

  if(STATS.lc!==TODAY){
    if(STATS.lf===yesterday && !allDone){
      STATS.best=Math.max(STATS.best,STATS.cur);
      if(STATS.cur>0){showToast(`💔 انكسر الاستريك بعد ${STATS.cur} يوم\n${pickRandom(ENCOURAGE_MISS)}`,3800,'warn');shakeStreakBroken();}
      STATS.cur=0;
    }
    STATS.lc=TODAY;
  }

  if(allDone && STATS.lf!==TODAY){
    STATS.cur=(STATS.lf===yesterday)?(STATS.cur+1):1;
    STATS.lf=TODAY;
    STATS.best=Math.max(STATS.best,STATS.cur);
    if(MILESTONES.includes(STATS.cur)){
      showToast(`🏆 ${STATS.cur} يوم متواصل! إنجاز كبير جداً 🎊`,5000,'gold');
      hitMilestone();barGoldFlash();
    }else{
      showToast(`${pickRandom(ENCOURAGE_WIN)}\nاستريك: ${STATS.cur} يوم 🔥`,4000);
    }
    pulseStreakWin();barGoldFlash();
  }

  if(!allDone && STATS.lf===yesterday){
    STATS.best=Math.max(STATS.best,STATS.cur);
    if(STATS.cur>0){showToast(`💔 انكسر الاستريك بعد ${STATS.cur} يوم\n${pickRandom(ENCOURAGE_MISS)}`,3800,'warn');shakeStreakBroken();}
    STATS.cur=0;STATS.lf=null;
  }
}

// Resets the visible weekly points counter (STATS.pts) back to 0 the first time
// the app is opened in a NEW app-week (Saturday->Friday). This does NOT touch
// STATS.cur or STATS.best — the streak is a separate, cross-week concept and must
// keep counting through week boundaries. Idempotent: safe to call on every load,
// only fires once per week because it stamps STATS.lastPtsWeekStart.
function resetWeeklyPointsIfNewWeek(){
  const thisWeekStart=currentWeekStartISO(TODAY);
  if(STATS.lastPtsWeekStart!==thisWeekStart){
    STATS.pts=0;
    STATS.lastPtsWeekStart=thisWeekStart;
  }
}

function computeHistoricalBestStreak(){
  const dates=Object.keys(historyData).sort();
  let best=0,cur=0,prevDate=null;
  for(const iso of dates){
    const day=historyData[iso];
    const jd=getJDfromISO(iso);
    const req=getReqTasks(jd);
    const allDone=!!(day&&day.done)&&req.length>0&&req.every(t=>day.done[t[0]]);
    if(allDone){cur=(prevDate&&dateOff(1,prevDate)===iso)?cur+1:1;best=Math.max(best,cur);}else{cur=0;}
    prevDate=iso;
  }
  return best;
}

async function sanitizeStats(){
  if(STATS.bestFixed) return;
  const recomputed=computeHistoricalBestStreak();
  STATS.best=Math.max(STATS.cur||0,recomputed);
  STATS.bestFixed=true;
  await saveAll();
}

// Fine-tune offsets (in minutes) applied on top of the API's raw calculation, calibrated
// against Abdullah's actual mosque/local authority times on 2026-07-13. Order per the
// Aladhan API spec: Imsak,Fajr,Sunrise,Dhuhr,Asr,Maghrib,Sunset,Isha,Midnight.
// Positive = push later, negative = push earlier. Fajr/Sunrise/Dhuhr were coming back
// too early; Asr/Maghrib/Isha were coming back too late — this is a normal, expected
// gap between calculation methods and locally-observed times (Aladhan's own docs note
// 1-5 min differences even against the matching regional authority), not a bug in this
// app's date/time logic. If real-world drift is noticed again later, re-measure against
// the mosque and adjust these numbers — do not touch the fetch logic itself.

// Schedules a browser notification for every remaining, not-yet-done task today,
// firing at the task's start time. Re-run whenever today's task list changes (task
// completed, edit applied) so already-done tasks stop being scheduled.
function scheduleTodayNotifications(){

  if(typeof Notification==='undefined' || Notification.permission!=='granted') return;

  const jd=todayJD();

    if(t[2]==='free') continue;
    const id=t[0];
    if(DONE[id]!==undefined && DONE[id]!==false) continue; // already done, no need to remind
    const startMin=toMin(t[10]||t[1]);
    const deltaMin=startMin-nowMin;
    if(deltaMin<0 || deltaMin>16*60) continue; // skip past tasks and anything absurdly far out
    const ms=deltaMin*60*1000;
    const timer=setTimeout(()=>{
      try{
        new Notification('⏰ تذكير من جدول عبدالله',{
          body:`${t[4]} — الساعة ${t[1]}`,
          icon:'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ctext y="75" font-size="80"%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E',
          tag:id
        });
      }catch(e){console.warn('notification fire failed',e);}
    },ms);
    NOTIF_TIMERS.push(timer);
  }
}

async function requestNotifPermission(){
  if(typeof Notification==='undefined'){
    showToast('المتصفح ده مش بيدعم الإشعارات',3500,'warn');
    return false;
  }
  if(Notification.permission==='granted') return true;
  if(Notification.permission==='denied'){
    showToast('الإشعارات متبلوكة من إعدادات المتصفح — لازم تفعّلها يدوياً من هناك',4200,'warn');
    return false;
  }
  try{
    const perm=await Notification.requestPermission();
    return perm==='granted';
  }catch{return false;}
}

function startPrayerFlow(id,name,basePts,x,y,late){
  const parts=id.split('-');

function showPrayerStep(){
  const{pk,name,step}=activePrayer;
  const hasSunnah=!!PMETA[pk]?.sunnah;
  const totalSteps=hasSunnah?4:3;
  if(step>=totalSteps){finishPrayerFlow();return;}

  const modal=document.getElementById('prayerModal');
  if(modal){
    const sEl=document.getElementById('modalStep');
    if(sEl) sEl.textContent=`السؤال ${step+1} من ${totalSteps}`;
    const backBtn=document.getElementById('btn-prayer-back');
    if(backBtn){backBtn.disabled=false;backBtn.style.opacity='1';}
    modal.classList.add('open');
  }

  const qEl=document.getElementById('modalQuestion');
  const subEl=document.getElementById('modalSub');

  if(step===0){
    if(qEl) qEl.textContent='أين صليت؟';
    if(subEl) subEl.textContent='اختر مكان الصلاة';
    renderOpts([{label:'المسجد 🕌',pts:5,gold:true},{label:'البيت 🏠',pts:3,gold:false},{label:'الجيم 🏋️',pts:2,gold:false},{label:'أخرى 📍',pts:1,gold:false}],'location');
  }else if(step===1){
    if(qEl) qEl.textContent=`كيف أديت صلاة ${name}؟`;
    if(subEl) subEl.textContent='اختر طريقة الأداء';
    renderOpts([{label:'جماعة 👥',pts:4,gold:true},{label:'منفرد 🧍',pts:2,gold:false}],'style');
  }else if(step===2){
    if(qEl) qEl.textContent='هل قلت أذكار الصلاة؟';
    if(subEl) subEl.textContent='سبحان الله · الحمد لله · الله أكبر';
    renderOpts([{label:'نعم ✅',pts:3,gold:true},{label:'لا ❌',pts:1,gold:false}],'dhikr');
  }else if(step===3){
    const sunnahText=PMETA[pk]?.sunnah||`سنة ${name}`;
    if(qEl) qEl.textContent=`هل صليت ${sunnahText}؟`;
    if(subEl) subEl.textContent='السنة الراتبة';
    renderOpts([{label:'نعم ✅',pts:3,gold:true},{label:'لا ❌',pts:1,gold:false}],'sunnah');

function renderOpts(opts,logKey){
  const el=document.getElementById('modalOpts');
  if(!el) return;
  el.innerHTML='';
  opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='modal-opt'+(o.gold?' gold':'');
    btn.innerHTML=`<span>${o.label}</span><span class="opt-pts">+${o.pts}⭐</span>`;
    btn.onclick=()=>{
      activePrayer.bonus+=o.pts;
      activePrayer.log.push({key:logKey,choice:o.label,pts:o.pts});
      activePrayer.step++;
      showPrayerStep();
    };
    el.appendChild(btn);
  });
}

async function finishPrayerFlow(){
  const modal=document.getElementById('prayerModal');
  if(modal) modal.classList.remove('open');
  const total=activePrayer.basePts+activePrayer.bonus;
  DONE[activePrayer.id]=total;
  const dk=SELECTED_DATE;
  if(!historyData[dk]) historyData[dk]={};
  if(!historyData[dk].prayerLogs) historyData[dk].prayerLogs={};
  historyData[dk].prayerLogs[activePrayer.id]={name:activePrayer.name,total,log:activePrayer.log,late:activePrayer.late};
  STATS.pts+=total;
  floatPts(activePrayer.x,activePrayer.y,total);
  if(activePrayer.late){showToast(`⏰ صليت متأخر شوي بس صليت — كمّل كذا`,3200,'late');cardEffect(activePrayer.id,'late');}
  else{showToast(`🕌 صلاة في وقتها، الله يتقبل`,3000);cardEffect(activePrayer.id,'ontime');}
  // Same save-guarantee as confirm/qada: a throw in checkStreak() must never
  // prevent the actual prayer completion from being persisted.
  try{ checkStreak(); }catch(err){ console.error('checkStreak failed, saving anyway:',err); }
  try{
    await saveAll();
  }catch(err){
    console.error('saveAll failed after prayer completion:',err);
    showToast('⚠️ حصل خطأ أثناء حفظ الصلاة — جرب تاني أو أعد تحميل الصفحة',4000,'warn');
  }
  try{ renderPanels();switchDay(getJDfromISO(SELECTED_DATE));updateUI(); }catch(err){ console.error('re-render failed:',err); }
  activePrayer=null;
}

// ===== Weekly Report =====
// The report covers the app-week that just ended: Saturday through Friday.
// Uses the SAME canonical currentWeekStartISO()/dateForWeekday() functions the tabs
// use, so a task saved under a tab's date is guaranteed to be found by the report
// looking up that same date — no more independent, disagreeing date formulas.
function getReportRangeDates() {
    // TODAY is always a Saturday when this runs (report button is Saturday-only),
    // so currentWeekStartISO(TODAY) is the Saturday that JUST started — the last
    // COMPLETED week is exactly 7 days before that.
    const thisWeekStart = currentWeekStartISO(TODAY);
    const lastWeekStart = dateOff(-7, thisWeekStart);

    const wantedDates = {};
    for (let i = 0; i < 7; i++) {
        const iso = dateOff(i, lastWeekStart);
        wantedDates[getJDfromISO(iso)] = iso;
    }

    return wantedDates;
}

const REPORT_CAT_META={
  prayer:{label:'🕌 الصلوات',order:1},
  food:{label:'🍽️ الوجبات',order:2},
  gym:{label:'🏋️ الجيم',order:3},
  swim:{label:'🏊 السباحة',order:4},
  recovery:{label:'♨️ الريكفري',order:5},
  quran:{label:'📿 القرآن',order:6},
  prog:{label:'💻 البرمجة',order:7},
  sleep:{label:'🌙 النوم',order:8},
  free:{label:'🎮 وقت حر',order:9}
};

function buildWeekReportData(){
  const order=['sat','sun','mon','tue','wed','thu','fri'];
  const mapJD={sat:6,sun:0,mon:1,tue:2,wed:3,thu:4,fri:5};
  const wantedDates=getReportRangeDates();

  let totalPts=0,totalMissed=0,totalQada=0,totalDone=0,totalTasks=0;
  const dayBlocks=[];
  let rangeStart=null,rangeEnd=null;

  for(const dKey of order){
    const jd=mapJD[dKey];
    const iso=wantedDates[jd];
    if(!iso) continue;
    if(rangeStart===null||iso<rangeStart) rangeStart=iso;
    if(rangeEnd===null||iso>rangeEnd) rangeEnd=iso;

    const day=historyData[iso]||{};
    const dayDone=day.done||{};
    const dayAlts=day.alts||{};
    const prayerLogs=day.prayerLogs||{};
    // getReqTasks already applies USER_EDITS (moves/deletes/custom/point overrides),
    // so the report automatically reflects any changes made via the AI assistant —
    // no separate merge logic needed here.
    const tasks=getReqTasks(jd,iso);

    if (!tasks.length) continue;

    let pts=0,missed=0,qada=0,done=0;
    const prayerDetails=[];
    // Group every task row by category so the report reads as organized sections
    // instead of one flat chronological list.
    const byCat={};

    for(const t of tasks){
      const v=dayDone[t[0]];
      totalTasks++;
      const cat=t[2]||'free';
      if(!byCat[cat]) byCat[cat]=[];

      // Always resolve what was actually eaten/done — the chosen alternative if one
      // was picked, otherwise the task's default/main description. Previously this
      // only showed anything when an alt was explicitly chosen, so "ate the default
      // meal" produced zero detail in the report — this is the actual fix.
      const altChoice=dayAlts[t[0]];
      const usedAlt=t[7]&&altChoice&&t[7].includes(altChoice);
      const contentLine=usedAlt?altChoice:(t[5]||'');
      const movedNote=t._movedFrom?` <span class="badge-alt">🔀 نُقلت من ${t._movedFrom}</span>`:'';
      const customNote=t._custom?` <span class="badge-alt" style="background:rgba(139,92,246,.15);color:#a78bfa">✨ مخصصة</span>`:'';

      if(t._deleted){
        // Soft-deleted tasks are shown but excluded from totals/percentages — they
        // were removed on purpose and shouldn't count as "missed".
        byCat[cat].push(`<div class="report-day-row" style="opacity:.5"><span>${t[4]}${movedNote}${customNote}</span><span class="badge-alt">🗑️ محذوفة</span></div>`);
        continue;
      }

      if(!v){
        missed++;totalMissed++;
        byCat[cat].push(`<div class="report-day-row"><span>${t[4]}${movedNote}${customNote}<div style="font-size:.68rem;color:var(--mu);font-weight:400;margin-top:2px">${contentLine}</div></span><span class="badge-red">❌ لم تُنجز</span></div>`);
      }else if(v==='qada'){
        qada++;totalQada++;done++;totalDone++;
        const earned=Math.floor(t[6]/2);pts+=earned;
        byCat[cat].push(`<div class="report-day-row"><span>${t[4]}${movedNote}${customNote}<div style="font-size:.68rem;color:var(--mu);font-weight:400;margin-top:2px">${contentLine}</div></span><span class="badge-or">🟡 قضاء +${earned}⭐</span></div>`);
      }else{
        done++;totalDone++;
        const earned=typeof v==='number'?v:t[6];pts+=earned;
        if(isPrayer(t)&&prayerLogs[t[0]]){
          const pl=prayerLogs[t[0]];
          const details=pl.log.map(l=>{
            const icon=l.gold?'🥇':'✓';
            return `${icon} ${l.key==='location'?'المكان':l.key==='style'?'الأداء':l.key==='dhikr'?'الأذكار':'السنة'}: ${l.choice} (+${l.pts}⭐)`;
          }).join(' · ');
          const timingBadge=pl.late?'<span class="badge-or">⏰ متأخر</span>':'<span class="badge-green">✅ في وقتها</span>';
          prayerDetails.push(`<div style="margin-bottom:4px"><span style="color:var(--ye);font-weight:700">${t[4]}</span> ${timingBadge}: <span>+${earned}⭐</span><div class="report-prayer-detail">${details}</div></div>`);
          byCat[cat].push(`<div class="report-day-row"><span>${t[4]}</span><span class="badge-green">✅ +${earned}⭐</span></div>`);
        }else{
          byCat[cat].push(`<div class="report-day-row"><span>${t[4]}${movedNote}${customNote}<div style="font-size:.68rem;color:var(--so);font-weight:400;margin-top:2px">🍽️ ${contentLine}</div></span><span class="badge-green">✅ +${earned}⭐</span></div>`);
        }
      }
    }

    totalPts+=pts;
    const dayName=DSHORT[jd]||'';
    const dayPct=tasks.length?Math.round(done/tasks.length*100):0;
    let prayerSection='';
    if(prayerDetails.length>0) prayerSection=`<div style="margin-top:8px;padding:8px;background:rgba(0,0,0,.2);border-radius:8px;font-size:.7rem">${prayerDetails.join('')}</div>`;
    const encLine=dayPct===100
      ?`<div class="report-day-enc">🎉 يوم كامل! ${dayName} كان يوم ممتاز</div>`
      :(missed>0?`<div class="report-day-enc">فاتك ${missed} مهمة ${dayName} — حاول تعوضهم بكرة 💪</div>`:'');

    // Render grouped-by-category sections, in a fixed logical order (prayers first,
    // then food, then activity types) rather than raw chronological order — this is
    // what actually makes the report scannable instead of a wall of mixed rows.
    const catKeys=Object.keys(byCat).sort((a,b)=>(REPORT_CAT_META[a]?.order||99)-(REPORT_CAT_META[b]?.order||99));
    const catSections=catKeys.map(cat=>{
      const meta=REPORT_CAT_META[cat]||{label:cat};
      return`<div style="margin-bottom:10px">
        <div style="font-size:.72rem;font-weight:800;color:var(--so);margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,.06)">${meta.label}</div>
        ${byCat[cat].join('')}
      </div>`;
    }).join('');

    dayBlocks.push(`<div class="report-day">
      <div class="report-day-title">${dayName} — ${iso} — <span style="color:var(--ye)">${pts}⭐</span> <span style="color:var(--mu);font-size:.7rem">(${done}/${tasks.length} مهمة${missed>0?` · ${missed} مفقود`:''}${qada>0?` · ${qada} قضاء`:''})</span></div>
      ${catSections}
      ${prayerSection}
      ${encLine}
    </div>`);
  }

  const pct=totalTasks>0?Math.round(totalDone/totalTasks*100):0;
  return{totalPts,totalMissed,totalQada,totalDone,totalTasks,pct,dayBlocksHtml:dayBlocks.join(''),rangeStart,rangeEnd};
}

function renderReportSummaryHtml(data){
  return `
    <div class="report-summary">
      <div class="report-stat"><div class="report-stat-val" style="color:var(--ye)">${data.totalPts}⭐</div><div class="report-stat-lbl">إجمالي النقاط</div></div>
      <div class="report-stat"><div class="report-stat-val" style="color:var(--gr)">${data.pct}%</div><div class="report-stat-lbl">نسبة الإنجاز</div></div>
      <div class="report-stat"><div class="report-stat-val" style="color:var(--rd)">${data.totalMissed}</div><div class="report-stat-lbl">مهام مفقودة</div></div>
      <div class="report-stat"><div class="report-stat-val" style="color:var(--or)">${data.totalQada}</div><div class="report-stat-lbl">قضاء صلوات</div></div>
    </div>
    ${data.dayBlocksHtml}
  `;
}

async function showWeeklyReport(){
  const el=document.getElementById('reportContent');
  const titleEl=document.getElementById('reportTitle');
  const rangeEl=document.getElementById('reportRange');
  if(!el) return;
  if(titleEl) titleEl.textContent='📊 تقرير آخر أسبوع مكتمل';

  const data=buildWeekReportData();
  if (!data.rangeStart || !data.rangeEnd) {
      el.innerHTML = '<div class="history-empty">لا توجد بيانات كافية لإنشاء تقرير. أكمل بضعة أيام أولاً.</div>';
      const rModal = document.getElementById('reportModal');
      if (rModal) rModal.classList.add('open');
      return;
  }
  
  if(rangeEl) rangeEl.textContent=`من ${data.rangeStart} إلى ${data.rangeEnd} — لا يشمل اليوم الحالي`;

  el.innerHTML=renderReportSummaryHtml(data);

  // Do NOT persist a report if there is genuinely nothing to show for that week —
  // either every day had zero required tasks, or the underlying historyData for
  // every day in the range is missing (e.g. loadAll() hadn't populated it yet, or
  // this device never had local data for that week). Saving a 0%/0-task snapshot
  // in that state is what produced the corrupt "0%, 25⭐, no details" report: the
  // summary numbers were computed from a fluke partial read, not from real data.
  const hasRealData = data.totalTasks > 0 && Object.keys(historyData).some(k => k >= data.rangeStart && k <= data.rangeEnd);
  if (!hasRealData) {
    showToast('لا توجد بيانات كافية لحفظ تقرير هذا الأسبوع — جرب مرة تانية بعد ما تسجل مهام', 4000, 'warn');
    const rModal=document.getElementById('reportModal');
    if(rModal) rModal.classList.add('open');
    return;
  }

  // weekStart uniquely identifies this week — reopening it just refreshes the
  // existing entry instead of creating a duplicate (this was the actual cause
  // of seeing the "same" report multiple times in the history list).
  const weekStart=data.rangeStart;
  const existingIdx=savedReports.findIndex(r=>r.weekStart===weekStart);
  const entry={weekStart,weekEnd:data.rangeEnd,totalPts:data.totalPts,totalMissed:data.totalMissed,totalQada:data.totalQada,pct:data.pct,snapshotHtml:renderReportSummaryHtml(data)};
  
  if(existingIdx>=0) {
    savedReports[existingIdx]=entry;
  } else {
    savedReports.unshift(entry); // Add to the beginning of the array
  }
  
  // Sort by weekStart date to ensure consistency, newest first.
  savedReports.sort((a, b) => b.weekStart.localeCompare(a.weekStart));

  if(savedReports.length > 52) {
    savedReports = savedReports.slice(0, 52);
  }

  await saveAll();

  const rModal=document.getElementById('reportModal');
  if(rModal) rModal.classList.add('open');
}

}

async function deleteSavedReport(idx){
  if(idx<0||idx>=savedReports.length)return;
  savedReports.splice(idx,1);

  showToast('🗑️ تم حذف التقرير',2200);
  showReportHistoryList();
}

  const altH=(alts&&alts.length&&isToday&&!isDone)?
    `<button class="altbtn" data-action="alts" data-id="${id}">🔄 بدائل (${alts.length})</button>`+
    `<div class="altlist" id="al-${id}">${alts.map(a=>`<div class="altitem" data-action="pickalt" data-id="${id}" data-alt="${String(a).replace(/"/g,'"')}">${a}</div>`).join('')}</div>`:'';

  const hwH=hw?`<div class="hwtag">⏰ ${hw}</div>`:'';

  // Edit-overlay badges — soft-deleted tasks stay visible (greyed) rather than
  // vanishing, per spec; moved tasks show where they came from; custom tasks are
  // flagged so it's clear they were added by you (or via the assistant), not SCHED.
  const isDeleted=!!task._deleted;
  const movedBadge=task._movedFrom?`<div class="hwtag" style="background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.3);color:#60a5fa">🔀 نُقلت من ${task._movedFrom}</div>`:'';

  if(isDeleted) act=`<div class="cbtn exp" style="opacity:.6">🗑️ محذوفة</div>`;

  return`<div class="tc${isDone?' done':''}${isEx?' excx':''}${isDeleted?' excx':''}" data-c="${cat}" id="c-${id}" ${isDeleted?'style="opacity:.5"':''}>
    <div class="tctime">${arTime}</div><div class="tcico">${ico}</div>
    <div class="tcbody"><div class="tcname">${name}</div><div class="tcdesc">${getDisplayDesc(task)}</div>${hwH}${movedBadge}${customBadge}${deletedBadge}${altH}</div>
    ${act}
  </div>`;
}

  const jd=getJDfromISO(SELECTED_DATE);
  // Pass SELECTED_DATE explicitly — previously this defaulted to "today's natural date
  // for this weekday", which silently showed the WRONG week's task list/points whenever
  // browsing history via the prev/next day buttons. Not something I introduced, but
  // worth fixing since this function is being touched anyway.
  const req=getReqTasks(jd,SELECTED_DATE);
  let d=0,p=0;

// ===== AI Assistant: local intent parser + action execution =====
// No live LLM call (per explicit instruction — "live calls are not important at all").
// This is a deliberately constrained natural-language parser: it recognizes a fixed set
// of actions (mark done, move, delete, edit points, add custom task) against your real
// task catalog, then executes them through the SAME data functions your buttons already
// use (DONE, USER_EDITS, saveAll/saveUserEdits). It cannot do anything your UI can't
// already do — it just lets you say it instead of clicking it. This constraint is
// intentional: an assistant that can only call known-safe actions can't corrupt your
// schedule no matter how it misreads a sentence, unlike an unconstrained "rewrite
// anything" model would.

const AI_DAY_WORDS={
  'اليوم':0,'today':0,
  'بكرة':1,'بكره':1,'غدا':1,'غداً':1,'tomorrow':1,
  'بعد بكرة':2,'بعد بكره':2,
  'الأحد':'sun','الاحد':'sun','sunday':'sun',
  'الاثنين':'mon','الإثنين':'mon','monday':'mon',
  'الثلاثاء':'tue','tuesday':'tue',
  'الأربعاء':'wed','الاربعاء':'wed','wednesday':'wed',
  'الخميس':'thu','thursday':'thu',
  'الجمعة':'fri','friday':'fri',
  'السبت':'sat','saturday':'sat'
};
const AI_DKEY_TO_JD={sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6};

function aiResolveDate(phrase){
  const p=phrase.trim().toLowerCase();
  for(const [word,val] of Object.entries(AI_DAY_WORDS)){
    if(p.includes(word)){
      if(typeof val==='number') return dateOff(val,TODAY);
      const jd=AI_DKEY_TO_JD[val];
      return dateForWeekday(jd,TODAY);
    }
  }
  return null;
}

// Parses "8:00 م" / "8 مساءً" / "20:00" / "8pm" / "8 صباحا" style fragments into the
// app's internal "H:MM ص/م" display format.
function aiResolveTime(phrase){
  const p=phrase.trim();
  let m=p.match(/(\d{1,2}):?(\d{2})?\s*(ص|صباح|am|AM)/);
  if(m){const h=parseInt(m[1],10)%12||12;const mm=m[2]||'00';return`${h}:${mm} ص`;}
  m=p.match(/(\d{1,2}):?(\d{2})?\s*(م|مساء|pm|PM)/);
  if(m){const h=parseInt(m[1],10)%12||12;const mm=m[2]||'00';return`${h}:${mm} م`;}
  m=p.match(/(\d{1,2}):(\d{2})/);
  if(m){const h24=parseInt(m[1],10);const mm=m[2];const pm=h24>=12;const h12=h24%12||12;return`${h12}:${mm} ${pm?'م':'ص'}`;}
  m=p.match(/(\d{1,2})\s*(?!:)/);
  if(m){const h=parseInt(m[1],10)%12||12;return`${h}:00 م`;} // bare hour, assume PM (most tasks are afternoon/evening)
  return null;
}

// Fuzzy-match a spoken task description against every task across the whole week
// (base SCHED tasks + already-added custom tasks), searching by Arabic name first
// since that's what's actually displayed to the user.
function aiFindTask(phrase){
  const p=phrase.trim();
  if(!p) return null;
  const candidates=[];
  for(let jd=0;jd<7;jd++){
    const iso=dateForWeekday(jd,TODAY);
    const tasks=getAllTasks(jd,iso);
    for(const t of tasks){
      candidates.push({task:t,iso,jd});
    }
  }
  // exact substring match on name first
  let hit=candidates.find(c=>c.task[4] && p.includes(c.task[4]));
  if(hit) return hit;
  // reverse: task name contains a meaningful word from the phrase
  const words=p.split(/\s+/).filter(w=>w.length>=3);
  for(const c of candidates){
    if(!c.task[4]) continue;
    if(words.some(w=>c.task[4].includes(w))) return c;
  }
  return null;
}

function aiGenId(prefix){return`${prefix}-${Date.now()}-${Math.floor(Math.random()*9999)}`;}

// The parser: returns {action, ...params, reply} or null if nothing recognized.
// Order matters — more specific patterns are checked before generic ones.
function aiParseIntent(msg){
  const raw=msg.trim();
  const low=raw.toLowerCase();

  // 1. Mark as done (retroactively) — "عملت الجيم" / "خلصت الغدا" / "i did the gym"
  if(/عملت|خلصت|سويت|انجزت|أنجزت|i did|done|completed|finished/.test(low)){
    const found=aiFindTask(raw);
    if(found){
      return{action:'markDone',task:found.task,iso:found.iso,jd:found.jd,
        reply:`تمام، سجلت "${found.task[4]}" بتاريخ ${found.iso} كمُنجزة ✅`};
    }
    return{action:'unrecognizedTask',reply:'مش لاقي المهمة دي في الجدول. ممكن تقولي اسمها بالظبط زي ما هي ظاهرة؟'};
  }

  // 2. Move a task — "انقل الجيم لبكرة الساعة ٨" / "move gym to tomorrow 8pm"
  if(/انقل|حرك|غير وقت|move|reschedule/.test(low)){
    const found=aiFindTask(raw);
    if(!found) return{action:'unrecognizedTask',reply:'مش لاقي المهمة دي. جرب تكتب اسمها زي ما هو ظاهر في الجدول.'};
    const newDate=aiResolveDate(raw);
    const newTime=aiResolveTime(raw);
    if(!newDate) return{action:'needMoreInfo',reply:`لأي يوم عايز تنقل "${found.task[4]}"؟ (مثلاً: بكرة، الأربعاء...)`};
    return{action:'moveTask',task:found.task,fromIso:found.iso,toDate:newDate,toTime:newTime,
      reply:`تم نقل "${found.task[4]}" من ${found.iso} إلى ${newDate}${newTime?' الساعة '+newTime:''} ✅`};
  }

  // 3. Delete a task — "احذف السباحة النهاردة" / "delete swimming"
  if(/احذف|امسح|شيل|delete|remove/.test(low)){
    const found=aiFindTask(raw);
    if(!found) return{action:'unrecognizedTask',reply:'مش لاقي المهمة دي. جرب تكتب اسمها زي ما هو ظاهر في الجدول.'};
    return{action:'deleteTask',task:found.task,iso:found.iso,
      reply:`تم حذف "${found.task[4]}" من ${found.iso} (لسه ظاهرة بس متعلّم عليها كمحذوفة) 🗑️`};
  }

  // 4. Edit points — "خلي الجيم بـ 30 نقطة" / "set gym points to 30"
  if(/(نقطة|نقاط|points?)/.test(low) && /(\d+)/.test(low)){
    const found=aiFindTask(raw);
    const numMatch=raw.match(/(\d+)/);
    if(found && numMatch){
      return{action:'editPoints',task:found.task,pts:parseInt(numMatch[1],10),
        reply:`تم تغيير نقاط "${found.task[4]}" إلى ${numMatch[1]}⭐ ✅`};
    }
  }

  // 5. Add a custom task — "ضيف مهمة قراءة الساعة ٩ بكرة بـ 10 نقاط"
  if(/ضيف|اضف|أضف|add task|new task/.test(low)){
    const newDate=aiResolveDate(raw)||TODAY;
    const newTime=aiResolveTime(raw)||'9:00 م';
    const numMatch=raw.match(/(\d+)\s*(نقطة|نقاط|points?)/);
    const pts=numMatch?parseInt(numMatch[1],10):5;
    // strip command words + date/time/points fragments to guess a name — imperfect on
    // purpose; we always show the parsed result before committing (see confirm flow).
    let name=raw.replace(/ضيف|اضف|أضف|add task|new task/gi,'')
                .replace(/(\d+)\s*(نقطة|نقاط|points?)/gi,'')
                .trim();
    if(!name) name='مهمة جديدة';
    return{action:'addCustomTask',date:newDate,time:newTime,pts,name,
      reply:`تم إضافة "${name}" يوم ${newDate} الساعة ${newTime} بـ ${pts}⭐ ✅`};
  }

  return{action:'unknown',
    reply:'مش فاهم الأمر ده 🤔 جرب صيغة زي: "عملت الجيم"، "انقل الغدا لبكرة"، "احذف السباحة"، أو "ضيف مهمة مذاكرة الساعة ٧"'};
}

async function aiExecuteAction(intent){
  const{action}=intent;
  if(action==='markDone'){
    const{task,iso}=intent;
    if(!historyData[iso]) historyData[iso]={};
    if(!historyData[iso].done) historyData[iso].done={};
    if(historyData[iso].done[task[0]]===undefined || historyData[iso].done[task[0]]===false){
      historyData[iso].done[task[0]]=task[6]||true;
      if(iso===SELECTED_DATE) DONE[task[0]]=task[6]||true;
      if(iso===TODAY) STATS.pts=(STATS.pts||0)+(typeof task[6]==='number'?task[6]:0);
      try{ checkStreak(); }catch(e){ console.error(e); }
    }
    await saveAll();
    return true;
  }
  if(action==='moveTask'){
    const{task,fromIso,toDate,toTime}=intent;
    USER_EDITS.moves[task[0]]={toDate,toTime:toTime||task[1],fromDate:fromIso,_origTask:[...task]};
    await saveUserEdits();
    return true;
  }
  if(action==='deleteTask'){
    const{task}=intent;
    USER_EDITS.deletes[task[0]]=true;
    await saveUserEdits();
    return true;
  }
  if(action==='editPoints'){
    const{task,pts}=intent;
    USER_EDITS.pointOverrides[task[0]]=pts;
    await saveUserEdits();
    return true;
  }
  if(action==='addCustomTask'){
    const{date,time,pts,name}=intent;
    USER_EDITS.customTasks.push({id:aiGenId('custom'),date,time,cat:'free',ico:'✨',name,desc:'أُضيفت بواسطة المساعد',pts,createdAt:Date.now()});
    await saveUserEdits();
    return true;
  }
  return false; // unrecognized / needMoreInfo / unknown — nothing to execute
}

// ===== AI Assistant: chat UI =====
function aiRenderMessages(){
  const body=document.getElementById('aiBody');
  if(!body) return;
  if(!AI_CHAT.length){
    body.innerHTML=`<div class="ai-empty">👋 أهلاً! تقدر تقولي حاجات زي:<br>"عملت الجيم"<br>"انقل الغدا لبكرة الساعة ٢"<br>"احذف السباحة النهاردة"<br>"ضيف مهمة مذاكرة الساعة ٧ بـ 10 نقاط"<br><br>التغييرات دي خاصة بحسابك بس، ومتزامنة على كل أجهزتك.</div>`;
    return;
  }
  body.innerHTML=AI_CHAT.map(m=>{
    const cls=m.role==='user'?'user':`bot${m.tone?' '+m.tone:''}`;
    return`<div class="ai-msg ${cls}">${m.text.replace(/</g,'&lt;')}</div>`;
  }).join('');
  body.scrollTop=body.scrollHeight;
}

async function aiHandleSend(){
  const input=document.getElementById('aiInput');
  if(!input) return;
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  input.style.height='auto';

  const user=fbAuth.currentUser;
  AI_CHAT.push({role:'user',text,ts:Date.now()});
  aiRenderMessages();

  if(!user){
    AI_CHAT.push({role:'bot',text:'لازم تسجل دخول الأول عشان أقدر أعمل تغييرات في جدولك وأحفظها ليك 🔒',ts:Date.now(),tone:'err'});
    aiRenderMessages();
    await saveAiChat();
    return;
  }

  const intent=aiParseIntent(text);
  let tone='ok';
  try{
    if(['markDone','moveTask','deleteTask','editPoints','addCustomTask'].includes(intent.action)){
      await aiExecuteAction(intent);
      try{ renderPanels();switchDay(getJDfromISO(SELECTED_DATE));updateUI(); }catch(e){ console.error('re-render after AI action failed:',e); }
    }else{
      tone=intent.action==='unknown'?null:'err';
    }
  }catch(e){
    console.error('AI action execution failed:',e);
    intent.reply='⚠️ حصل خطأ أثناء تنفيذ التغيير — جرب تاني.';
    tone='err';
  }

  AI_CHAT.push({role:'bot',text:intent.reply,ts:Date.now(),tone});
  aiRenderMessages();
  await saveAiChat();
}

function aiOpenPanel(){
  const panel=document.getElementById('aiPanel');

  if(sub) sub.textContent=fbAuth.currentUser?'جاهز للمساعدة':'سجل دخول عشان أقدر أحفظلك التغييرات';
  if(panel) panel.classList.add('open');
  aiRenderMessages();
  setTimeout(()=>document.getElementById('aiInput')?.focus(),50);
}
function aiClosePanel(){document.getElementById('aiPanel')?.classList.remove('open');}


document.body.addEventListener('click',async e=>{
  const tgt=e.target;
  const closest=sel=>tgt.closest(sel);

  if(tgt.id==='aiFab'){aiOpenPanel();return;}
  if(tgt.id==='aiCloseBtn'){aiClosePanel();return;}
  if(tgt.id==='aiSendBtn'){await aiHandleSend();return;}

  if(tgt.id==='btn-notif-toggle'){
    if(!NOTIF_ENABLED){
      const granted=await requestNotifPermission();
      if(!granted)return;
      NOTIF_ENABLED=true;
      await saveNotifPref();
      scheduleTodayNotifications();
      showToast('🔔 التذكيرات اشتغلت — هتوصلك إشعارات للمهام النهاردة',3000);
    }else{
      NOTIF_ENABLED=false;
      await saveNotifPref();
      clearScheduledNotifs();
      showToast('🔕 التذكيرات اتقفلت',2200);
    }
    updateAuthUI(fbAuth.currentUser);
    return;
  }

  if(tgt.id==='btn-signin'){
    try{await signInWithPopup(fbAuth,new GoogleAuthProvider());}catch{showToast('فشل تسجيل الدخول',3500,'warn');}
    return;
  }

  if(tgt.id==='btn-signout'){
    // Important: only clear localStorage AFTER Firebase finishes signing out,
    // otherwise Firebase can crash ("Pending promise was never set").
    if(typeof fbAuth!=='undefined'){
      try{ await fbAuth.signOut(); }catch(e){ console.warn('signOut failed',e); }
    }

    try{
      // Clear app-local state so next anonymous visit looks brand-new.
      localStorage.removeItem(LS.stats);
      localStorage.removeItem(LS.history);
      localStorage.removeItem(LS.reports);
      localStorage.removeItem(LS.penalized);
      localStorage.removeItem(LS.firstSeen);
      localStorage.removeItem(LS.userEdits);
      localStorage.removeItem(LS.aiChat);

      // Clear any in-memory state
      STATS={cur:0,best:0,pts:0,lc:null,lf:null};
      DONE={};
      SELECTED_ALTS={};
      historyData={};
      savedReports=[];
      penalizedDates={};
      FIRST_SEEN=null;
      USER_EDITS=emptyUserEdits();
      AI_CHAT=[];
      IS_BRAND_NEW_SESSION=false;
      SELECTED_DATE=TODAY;
    }catch(e){console.warn('local reset failed',e);}

    window.location.reload();
    return;
  }

  if(tgt.id==='btn-report'){
    if(todayJD()!==6){showToast('التقرير متاح يوم السبت فقط 📅');return;}
    await showWeeklyReport();return;
  }

  if(tgt.id==='btn-report-history'){showReportHistoryList();return;}
  if(tgt.id==='btn-back-to-history-list'){showReportHistoryList();return;}

  const delBtn=closest('[data-action="delreport"]');
  if(delBtn){
    const idx=parseInt(delBtn.getAttribute('data-hist-idx'),10);
    await deleteSavedReport(idx);
    return;
  }

  const histItem=closest('.report-history-item');
  if(histItem){
    const idx=parseInt(histItem.getAttribute('data-hist-idx'),10);
    showReportHistoryDetail(idx);
    return;
  }

  if(tgt.id==='closeReport'){document.getElementById('reportModal')?.classList.remove('open');return;}

  if(tgt.id==='btn-prayer-back'){
    if(!activePrayer) return;
    if(activePrayer.step<=0){document.getElementById('prayerModal')?.classList.remove('open');activePrayer=null;return;}
    activePrayer.step--;
    const last=activePrayer.log.pop();
    if(last) activePrayer.bonus-=last.pts;
    showPrayerStep();
    return;
  }

  if(tgt.id==='btn-hist-prev'){
    saveDay();SELECTED_DATE=dateOff(-1,SELECTED_DATE);loadDay();
    renderTabs();renderPanels();switchDay(getJDfromISO(SELECTED_DATE));updateUI();return;
  }
  if(tgt.id==='btn-hist-next'){
    const next=dateOff(1,SELECTED_DATE);
    if(next>TODAY){showToast('لا يمكن عرض أيام مستقبلية');return;}
    saveDay();SELECTED_DATE=next;loadDay();
    renderTabs();renderPanels();switchDay(getJDfromISO(SELECTED_DATE));updateUI();return;
  }

  const actionEl=closest('[data-action]');
  if(!actionEl) return;
  const action=actionEl.getAttribute('data-action');
  const id=actionEl.getAttribute('data-id');
  const ptsAttr=actionEl.getAttribute('data-pts');

  if(action==='alts'){toggleAlts(id);return;}
  if(action==='pickalt'){
    const alt=actionEl.getAttribute('data-alt');if(!alt)return;
    SELECTED_ALTS[id]=alt;await saveAll();renderPanels();switchDay(getJDfromISO(SELECTED_DATE));
    showToast('🔄 تم اختيار البديل',2200);
    return;
  }

  if(action==='confirm'){
    if(DONE[id]!==undefined)return;
    const pts=parseInt(ptsAttr||'0',10);
    const isPr=id.startsWith('pr-')||id.includes('-jm');
    const jd=getJDfromISO(SELECTED_DATE);
    const taskObj=getAllTasks(jd).find(t=>t[0]===id);
    if(isPr){
      const cardName=tgt.closest('.tc')?.querySelector('.tcname')?.textContent||'';
      const late=taskObj?isLatePrayer(taskObj):false;
      startPrayerFlow(id,cardName,pts,e.clientX,e.clientY,late);return;
    }
    const late=taskObj?isLateNonPrayer(taskObj):false;
    DONE[id]=pts;STATS.pts+=pts;
    floatPts(e.clientX,e.clientY,pts);
    if(late){showToast('⏰ متأخر شوي بس تم — استمر كذا 💪',3000,'late');cardEffect(id,'late');}
    else{showToast('✅ في الوقت المثالي، أحسنت',2200);cardEffect(id,'ontime');}
    // checkStreak() and the re-render below must never be able to swallow the save.
    // Previously, if checkStreak() (or anything after it) threw, saveAll() was never
    // reached — the user saw the success animation but the completion was silently
    // never persisted. That's what caused tasks to vanish from historyData while
    // looking completed in the moment.
    try{ checkStreak(); }catch(err){ console.error('checkStreak failed, saving anyway:',err); }
    try{
      await saveAll();
    }catch(err){
      console.error('saveAll failed after confirm:',err);
      showToast('⚠️ حصل خطأ أثناء الحفظ — جرب تاني أو أعد تحميل الصفحة',4000,'warn');
    }
    try{ renderPanels();switchDay(getJDfromISO(SELECTED_DATE));updateUI(); }catch(err){ console.error('re-render failed:',err); }
    return;
  }

  if(action==='qada'){
    if(DONE[id]!==undefined)return;
    const pts=parseInt(ptsAttr||'0',10);
    const half=Math.floor(pts/2);
    DONE[id]='qada';STATS.pts+=half;
    floatPts(e.clientX,e.clientY,half);
    cardEffect(id,'qada');
    try{ checkStreak(); }catch(err){ console.error('checkStreak failed, saving anyway:',err); }
    try{
      await saveAll();
    }catch(err){
      console.error('saveAll failed after qada:',err);
      showToast('⚠️ حصل خطأ أثناء الحفظ — جرب تاني أو أعد تحميل الصفحة',4000,'warn');
    }
    try{ renderPanels();switchDay(getJDfromISO(SELECTED_DATE));updateUI(); }catch(err){ console.error('re-render failed:',err); }
    showToast('تم تسجيل القضاء — حاول تصلي بدري بكرة 🌙',3500,'qada');return;
  }
});

document.body.addEventListener('input',e=>{
  if(e.target && e.target.id==='aiInput'){
    e.target.style.height='auto';
    e.target.style.height=Math.min(e.target.scrollHeight,90)+'px';
  }
});
document.body.addEventListener('keydown',async e=>{
  if(e.target && e.target.id==='aiInput' && e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    await aiHandleSend();
  }
});

// ===== Init =====
function initAppFlow(user){
  updateAuthUI(user);
  fetchPrayers().then(()=>applyPunishmentOnce()).then(async ()=>{
    const ptsBefore=STATS.pts;
    resetWeeklyPointsIfNewWeek();
    if(STATS.pts!==ptsBefore){ try{ await saveAll(); }catch(e){ console.warn('weekly reset save failed',e); } }
    checkStreak();
    renderTabs();renderPanels();switchDay(todayJD());updateUI();
    const ldEl=document.getElementById('ld'); if(ldEl) ldEl.style.display='none';
    const appEl=document.getElementById('app'); if(appEl) appEl.style.display='block';
    if(PENALTY_FLASH_PENDING){flashPenalty();PENALTY_FLASH_PENDING=false;}
    await loadNotifPref();
    updateAuthUI(user);
    if(NOTIF_ENABLED && typeof Notification!=='undefined' && Notification.permission==='granted'){
      scheduleTodayNotifications();
    }
  }).catch(e=>{
    console.warn('Init error bypass:',e);
    const ldEl=document.getElementById('ld'); if(ldEl) ldEl.style.display='none';
    const appEl=document.getElementById('app'); if(appEl) appEl.style.display='block';
  });
}

if (typeof onAuthStateChanged !== 'undefined' && typeof fbAuth !== 'undefined') {
  onAuthStateChanged(fbAuth, async user => {
    await loadAll();

    if(user && typeof getDoc !== 'undefined' && typeof doc !== 'undefined' && typeof fbDb !== 'undefined'){
      try{
        const ud=await getDoc(doc(fbDb,'users',user.uid));
        if(ud.exists()){
          const d=ud.data();
          if(d.stats) STATS=d.stats;
          if(d.reports) savedReports=d.reports;
          // Cloud historyData/penalizedDates now genuinely merge in — this is what
          // makes a second browser/device actually see your past days.
          if(d.historyData){
            for(const dateKey of Object.keys(d.historyData)){
              const cloudDay=d.historyData[dateKey]||{};
              const localDay=historyData[dateKey]||{};
              historyData[dateKey]={
                done:{...(localDay.done||{}),...(cloudDay.done||{})},
                alts:{...(localDay.alts||{}),...(cloudDay.alts||{})},
                prayerLogs:{...(localDay.prayerLogs||{}),...(cloudDay.prayerLogs||{})},
                // Critical fix: Ensure penalty is explicitly null if it doesn't exist,
                // preventing 'undefined' from being sent to Firestore.
                penalty:cloudDay.penalty||localDay.penalty||null
              };
            }
          }
          if(d.penalizedDates) penalizedDates={...penalizedDates,...d.penalizedDates};
          // Cloud userEdits is authoritative once it exists — this is what makes an
          // edit made on your phone show up on your laptop. If the cloud doc has no
          // userEdits yet (brand-new account), keep whatever local value we have.
          if(d.userEdits) USER_EDITS={...emptyUserEdits(),...d.userEdits};
          if(d.aiChat) AI_CHAT=d.aiChat;
          // firstSeen from the cloud is authoritative once it exists — this is what makes
          // "sign in on a fresh browser" not reset the account's age. If the cloud has no
          // firstSeen yet, this is genuinely the first time this account has ever been used
          // anywhere, so today becomes the anchor and this session must not be punished.
          if(d.firstSeen){
            FIRST_SEEN=d.firstSeen;
            IS_BRAND_NEW_SESSION=false;
          }else{
            FIRST_SEEN=FIRST_SEEN||TODAY;
            IS_BRAND_NEW_SESSION=true;
          }
          // Rescue any cloud entries that landed on wrong future dates due to tab-offset bug.
          rescueFutureDatedEntries();
          migrateSavedReports();
          loadDay();
        }
      }catch(e){console.warn('cloud load failed',e);}
    }

    await sanitizeStats();
    initAppFlow(user);
  });
} else {
  setTimeout(async ()=>{await loadAll();await sanitizeStats();initAppFlow(null);},100);
}
</script>
