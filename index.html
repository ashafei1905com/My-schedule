const KUWAIT_TZ = 'Asia/Kuwait';
const p2 = (n)=>String(n).padStart(2,'0');

function getKuwaitNowMinutes(){
  try{
    const parts = new Intl.DateTimeFormat('en-GB',{timeZone:KUWAIT_TZ,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date());
    const out={};
    parts.forEach(p=>{if(p.type!=='literal') out[p.type]=p.value});
    const h=parseInt(out.hour||'0',10);
    const m=parseInt(out.minute||'0',10);
    return h*60+m;
  }catch{
    const d=new Date();
    return d.getHours()*60+d.getMinutes();
  }
}

function getKuwaitDateParts(){
  try{
    const parts=new Intl.DateTimeFormat('en-GB',{timeZone:KUWAIT_TZ,year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'}).formatToParts(new Date());
    const out={};
    parts.forEach(p=>{ if(p.type!=='literal') out[p.type]=p.value; });
    return out;
  }catch{
    const d=new Date();
    return {year:`${d.getFullYear()}`,month:p2(d.getMonth()+1),day:p2(d.getDate()),weekday:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]};
  }
}

const DKEYS=['sun','mon','tue','wed','thu','fri','sat'];
const DSHORT=['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];

function todayStr(){
  const d=getKuwaitDateParts();
  return `${d.year}-${d.month}-${d.day}`;
}

function todayJD(){
  const weekday=getKuwaitDateParts().weekday;
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].indexOf(weekday);
}

const TODAY=todayStr();

function getKuwaitJDFromISO(iso){
  const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return todayJD();
  const y = parseInt(m[1],10);
  const mo = parseInt(m[2],10);
  const d = parseInt(m[3],10);
  const dt = new Date(Date.UTC(y, mo-1, d));
  return dt.getUTCDay();
}

function dateOff(n){
  const d=new Date();
  d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}

function getSelectedJD(){
  return getKuwaitJDFromISO(SELECTED_DATE);
}

function isSelectedRealToday(){
  return SELECTED_DATE===TODAY;
}

function cleanTimeStr(s){
  if(!s) return '';
  const m=String(s).match(/\d{1,2}:\d{2}/);
  return m?m[0]:String(s);
}

function fmt24(t){
  const s=cleanTimeStr(t);
  if(!s) return '';
  const [h,m]=s.split(':').map(Number);
  const pm=h>=12;
  const dh=h>12?h-12:(h===0?12:h);
  return `${dh}:${p2(m)} ${pm?'م':'ص'}`;
}

function toMin(s){
  if(!s) return 0;
  const s0=cleanTimeStr(s);
  const raw=String(s);
  if(raw.includes('ص')||raw.includes('م')){
    const pm=raw.includes('م');
    const [h,m]=s0.split(':').map(Number);
    let hr=h;
    if(pm&&h!==12) hr+=12;
    if(!pm&&h===12) hr=0;
    return hr*60+(m||0);
  }
  const [h,m]=s0.split(':').map(Number);
  return h*60+(m||0);
}

function isPrayerTask(task){
  return task[2]==='prayer';
}

// Determines if task is PENDING, EXPIRED (after 3 hours), or QADA (missed prayer time)
function getTaskState(task) {
  const now = getKuwaitNowMinutes();
  const start = toMin(task[10] || task[1]);
  
  if (isPrayerTask(task)) {
    let end = start + 60;
    const parts = task[0].split('-');
    if (parts.length >= 3) {
      const pk = parts[2];
      if(pk === 'Fajr') end = toMin(PRYT.Sunrise || FALLBK.Sunrise);
      else if(pk === 'Dhuhr') end = toMin(PRYT.Asr || FALLBK.Asr);
      else if(pk === 'Asr') end = toMin(PRYT.Maghrib || FALLBK.Maghrib);
      else if(pk === 'Maghrib') end = toMin(PRYT.Isha || FALLBK.Isha);
      else if(pk === 'Isha') end = 24 * 60;
    }
    if (task[0].includes('fri-jm')) {
      end = toMin(PRYT.Asr || FALLBK.Asr);
    }
    if (now > end) return 'QADA';
    return 'PENDING';
  } else {
    const end = start + 180;
    if (now > end) return 'EXPIRED';
    return 'PENDING';
  }
}

  e.style.cssText=`left:${x}px;top:${y}px`;
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),900);
}

function buildPTasks(jd){
  const k=DKEYS[jd];
  return Object.entries(PMETA)
    .filter(([pk])=>!(jd===5 && pk==='Dhuhr'))
    .map(([pk,pm])=>{
      const t24=PRYT[pk]||FALLBK[pk];
      const desc=pk==='Fajr'?`${fmt24(t24)} · ارجع نام بعدها ✓`:`وقت الصلاة: ${fmt24(t24)}`;
      return [`pr-${k}-${pk}`,fmt24(t24),'prayer',pm.ic,pm.ar,desc,pm.pts,null,null,false,t24];
    });
}

function getAllTasks(jd){
  const d=SCHED[jd];
  if(!d) return [];
  const frees=(FREE_TIME[jd]||[]).map((f,i)=>[`fr-${jd}-${i}`,f.t,'free','🎮','وقت حر',f.d,0,null,null,false]);
  return [...buildPTasks(jd),...d.ts,...frees].sort((a,b)=>toMin(a[10]||a[1])-toMin(b[10]||b[1]));
}

function getReqTasks(jd){
  return [...buildPTasks(jd),...(SCHED[jd]?.ts||[])].filter(t=>!t[9] && t[6]>0);
}

async function sGet(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}}
async function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

async function loadAll(){
  STATS=(await sGet(LS.stats))||{cur:0,best:0,pts:0,lc:null,lf:null};
  const hd=await sGet(LS.history);
  data.history=hd||{};
  const lr=await sGet(LS.lastReport);

  loadHistoryDay();
}

async function saveAll(){
  await sSet(LS.stats,STATS);
  saveHistoryDay();
  await sSet(LS.history,data.history);
  await sSet(LS.lastReport,data.lastReportDate);

  const user = fbAuth.currentUser;
  if(user){
    try{

function sumPtsFromTasks(tasks){
  let pts=0;
  for(const t of tasks){
    const id=t[0];
    const v=DONE[id];
    if(v){
      if(v==='qada') pts+=Math.floor(t[6]/2);
      else pts+=t[6];
    }
  }
  return pts;
}

function getWeekPreviousDaysISO(){
  // previous 7 days excluding current SELECTED_DATE
  const out=[];
  for(let i=1;i<=7;i++){
    out.push(dateOff(-i));
  }
  return out;
}

async function weeklyObserverInit(){
  // Runs on init. If current date is Sunday and no report generated for prev week.
  const todayJD_=todayJD();
  const isSunday=todayJD_===0; // Sun=0
  if(!isSunday) return;

  // We report previous week (last 7 days), and prevent duplicates via lastReportDate.
  // Use lastReportDate as the start date of reported window = TODAY-7.
  const lastWindowStart=dateOff(-7);
  if(data.lastReportDate===lastWindowStart) return;

  // aggregate done/qada from previous 7 days stored in data.history
  let totalPts=0;
  let totalQada=0;
  let lines=[];

  const prevISOs=getWeekPreviousDaysISO();
  for(const iso of prevISOs){
    const dk=getDayKey(iso);
    const day=data.history[dk]||{};
    const dayDone=day.done||{};
    // derive weekday
    const jd=getKuwaitJDFromISO(iso);
    const tasks=getReqTasks(jd);

    let pts=0;
    let qada=0;
    for(const t of tasks){
      const id=t[0];
      const v=dayDone[id];
      if(!v) continue;
      if(v==='qada'){
        qada++;
        pts+=Math.floor(t[6]/2);
      }else{
        pts+=t[6];
      }
    }
    totalPts+=pts;
    totalQada+=qada;
    lines.push(`${iso}: ${pts}⭐${qada?` (قضاء x${qada})`:''}`);
  }

  const report=`📊 تقرير أسبوع (آخر 7 أيام)
المجموع: ${totalPts}⭐
القضاء: ${totalQada} مهمة قضاء
\n${lines.join('\n')}`;
  showHistoryReportModal(report);

  // reset weekly progress: STATS.pts and current weekly progress.
  STATS.pts=0;

  // update flag
  data.lastReportDate=lastWindowStart;
  await saveAll();
}

  const chosen=SELECTED_ALTS[id];

  if(alts && chosen && alts.includes(chosen)) return chosen;

}

function renderCard(task,isToday){
  const [id,arTime,cat,ico,name,desc,pts,alts,hw,isEx]=task;
  const done=DONE[id]||false;
  const tState = getTaskState(task);
  const expired = (tState === 'EXPIRED');

  if(cat==='free'){
    return `<div class="tc" data-c="free"><div class="tctime">${arTime}</div><div class="tcico">${ico}</div><div class="tcbody"><div class="tcname" style="color:#6366f1">${name}</div><div class="tcdesc">${desc}</div></div></div>`;
  }

  let act='';
  if(isEx){
    act=`<div class="excbadge">🔓 استثناء</div>`;
  }else if(isToday){
    if(done){
      act=`<div class="cbtn done">✅</div>`;
    }else{
      if(tState === 'QADA'){
        const half=Math.floor(pts/2);
        act=`<button class="cbtn qada" data-action="qada" data-id="${id}" data-pts="${pts}">قضاء (50%)<span class="ptslbl">+${half}⭐</span></button>`;
      }else if(tState === 'EXPIRED'){
        act=`<div class="cbtn exp">فات الوقت</div>`;
      }else{
        act=`<button class="cbtn" data-action="confirm" data-id="${id}" data-pts="${pts}">تأكيد ✓<span class="ptslbl">+${pts}⭐</span></button>`;
      }
    }
  }

  if(!act){
    if(done){
      // history view: show finished
      act=`<div class="cbtn done">✅</div>`;
    }else{
      // history view: show missed if non-completed
      act=`<div class="cbtn exp">مفقود</div>`;
    }
  }

  const altH = (alts && alts.length && !expired && !done && isToday)
    ? `<button class="altbtn" data-action="alts" data-id="${id}">🔄 بدائل (${alts.length})</button>`+
      `<div class="altlist" id="al-${id}">${alts.map(a=>{
        const selected=SELECTED_ALTS[id]===a;
        return `<div class="altitem" role="button" tabindex="0" data-action="pickalt" data-id="${id}" data-alt="${String(a).replace(/"/g,'"')}">${a}</div>`;
      }).join('')}</div>`
    : '';

  const hwH=hw?`<div class="hwtag">⏰ ${hw}</div>`:'';
  const displayDesc=getTaskDisplayDesc(task);

  return `<div class="tc${done?' done':''}${isEx?' excx':''}" data-c="${cat}" id="c-${id}">
    <div class="tctime">${arTime}</div><div class="tcico">${ico}</div>
    <div class="tcbody"><div class="tcname">${name}</div><div class="tcdesc">${displayDesc}</div>${hwH}${altH}</div>
    ${act}
  </div>`;
}

function switchDay(jd){
  // change SELECTED_DATE based on desired weekday relative to TODAY using histIndex
  // Keep same histIndex, only adjust displayed jd by moving date +/- until weekday matches.
  const targetJD=jd;
  const curISO=SELECTED_DATE;
  const curJD=getKuwaitJDFromISO(curISO);
  const delta=(targetJD - curJD + 7)%7;
  // choose nearest date in same hist direction: for simplicity move forward delta
  SELECTED_DATE=dateOff(delta);

  loadHistoryDay();
  renderTabs();
  renderPanelsForAllDays();
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('act'));
  document.getElementById(`tb-${DKEYS[jd]}`)?.classList.add('act');
  document.querySelectorAll('.pan').forEach(p=>p.classList.remove('act'));
  document.getElementById(`pan-${DKEYS[jd]}`)?.classList.add('act');
  updateUI();
}

function completeStreakIfDayDone(){
  // Only update streak when viewing real today
  if(!isSelectedRealToday()) return;
  const jd=getSelectedJD();
  const req=getReqTasks(jd);
  const isAllDone=req.every(t=>DONE[t[0]]);
  if(isAllDone && STATS.lf!==TODAY){
    const yesterday=dateOff(-1);
    if(STATS.lf===yesterday) STATS.cur=STATS.cur+1;
    else STATS.cur=1;
    STATS.lf=TODAY;
    STATS.best=Math.max(STATS.best,STATS.cur);
    showToast(`🎉 يوم كامل!\nاستريك: ${STATS.cur} يوم 🔥\nنقاطك: ${STATS.pts} ⭐`,4000);
  }
}

async function onConfirm(task, pts, rect){
  if(!isSelectedRealToday()) return;
  if(DONE[task[0]]) return;
  const tState = getTaskState(task);
  if(tState === 'EXPIRED'){
    showToast('فات الوقت المخصص لهذه المهمة');
    return;
  }
  DONE[task[0]]=true;
  STATS.pts+=pts;
  completeStreakIfDayDone();
  await saveAll();
  renderPanelsForAllDays();
  switchDay(getSelectedJD());
  floatPts(rect.left+rect.width/2-20, rect.top-10, pts);
}

async function onQada(task, pts, rect){
  if(!isSelectedRealToday()) return;
  if(DONE[task[0]]) return;
  if(!isPrayerTask(task)) return;
  const tState = getTaskState(task);
  if(tState !== 'QADA') return;

  const half=Math.floor(pts/2);
  DONE[task[0]]='qada';
  STATS.pts+=half;
  WEEKLY_REPORT.push({t:new Date().toISOString(),taskId:task[0],day:SELECTED_DATE,points:half,label:task[4]});
  completeStreakIfDayDone();
  await saveAll();
  renderPanelsForAllDays();
  switchDay(getSelectedJD());
  floatPts(rect.left+rect.width/2-20, rect.top-10, half);
  showToast('تم قضاء الفريضة (50% نقاط)');
}

async function saveAndRefresh(){
  await saveAll();
  renderPanelsForAllDays();
  updateUI();
}

async function fetchPrayers(){
  try{
    const res=await fetch('https://api.aladhan.com/v1/timingsByCity?city=Kuwait City&country=Kuwait&method=4');
    const data=await res.json();
    if(data&&data.code===200){
      const t=data.data.timings;
      PRYT={Fajr:t.Fajr,Sunrise:t.Sunrise,Dhuhr:t.Dhuhr,Asr:t.Asr,Maghrib:t.Maghrib,Isha:t.Isha};
    }else throw new Error('bad response');
  }catch(e){
    console.warn('Prayer API failed, using fallback',e);
    PRYT={Fajr:'03:13',Sunrise:'04:48',Dhuhr:'11:49',Asr:'15:23',Maghrib:'18:50',Isha:'20:23'};
  }
  startNextPrayerCountdown(PRYT);
  return true;
}

function startNextPrayerCountdown(){
  if(window.prayerInterval) clearInterval(window.prayerInterval);
  window.prayerInterval=setInterval(()=>{},60000);
}

document.addEventListener('click', async (e)=>{
  const btn = e.target.closest('button, .altitem');
  if(!btn) return;

  const act = btn.getAttribute('data-action');
  const id = btn.getAttribute('data-id');
  const pts = parseInt(btn.getAttribute('data-pts')||'0', 10);

  // Fix Click Handlers: resolve tasks based on SELECTED_DATE (not todayJD)
  const jd=getSelectedJD();

  if(act === 'confirm'){
    const rect = btn.getBoundingClientRect();
    const task = getAllTasks(jd).find(t => t[0] === id);
    if(task) await onConfirm(task, pts, rect);
  } else if(act === 'qada'){
    const rect = btn.getBoundingClientRect();
    const task = getAllTasks(jd).find(t => t[0] === id);
    if(task) await onQada(task, pts, rect);
  } else if(act === 'alts'){
    toggleAlts(id);
  } else if(act === 'pickalt'){
    const task = getAllTasks(jd).find(t => t[0] === id);
    if(task && getTaskState(task) === 'EXPIRED'){
      showToast('لا يمكن اختيار بديل، فات وقت المهمة');
      return;
    }
    const altText = btn.getAttribute('data-alt');
    SELECTED_ALTS[id] = altText;
    await saveAndRefresh();
    renderPanelsForAllDays();
    updateUI();
  } else if(btn.id === 'btn-signin'){
    const provider = new GoogleAuthProvider();
    try{ await signInWithPopup(fbAuth, provider);}catch(err){
      console.error('Sign-in error:', err);
      showToast('فشل تسجيل الدخول');
    }
  } else if(btn.id === 'btn-signout'){
    await fbAuth.signOut();
    window.location.reload();
  }
});

// history navigation
document.getElementById('btn-hist-prev').addEventListener('click', ()=>{
  // older: move back 1 day
  SELECTED_DATE=dateOff(-1);
  histIndex--;
  loadHistoryDay();
  renderTabs();
  renderPanelsForAllDays();
  switchDay(getSelectedJD());
});

document.getElementById('btn-hist-next').addEventListener('click', ()=>{
  // newer: move forward 1 day
  SELECTED_DATE=dateOff(1);
  histIndex++;
  loadHistoryDay();
  renderTabs();
  renderPanelsForAllDays();
  switchDay(getSelectedJD());
});

// ===== Application Bootstrapper =====
async function initApp(){
  await loadAll();
  renderTabs();
  renderPanelsForAllDays();
  switchDay(getSelectedJD());
  await fetchPrayers();
  await weeklyObserverInit();
  document.getElementById('ld').style.display='none';
  document.getElementById('app').style.display='block';
  updateUI();
}

onAuthStateChanged(fbAuth, async (user)=>{
  if(!user){
    document.getElementById('authName').textContent='';
    document.getElementById('authBtn').innerHTML='<button class="altbtn" id="btn-signin">تسجيل دخول</button>';
    return;
  }
  document.getElementById('authName').textContent=user.displayName;
  document.getElementById('authBtn').innerHTML='<button class="altbtn" id="btn-signout">تسجيل خروج</button>';
  try{
    const docSnap=await getDoc(doc(fbDb,'users',user.uid));
    if(docSnap.exists() && docSnap.data().stats) STATS=docSnap.data().stats;
  }catch(e){ console.warn('stats fetch failed',e); }
  saveAll();
});

initApp();

</script>
