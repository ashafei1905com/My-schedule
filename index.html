function getKuwaitDateParts(){
  try{
    const parts=new Intl.DateTimeFormat('en-GB',{timeZone:KUWAIT_TZ,year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'}).formatToParts(new Date());
    const out={};
    parts.forEach(p=>{ if(p.type!=='literal') out[p.type]=p.value; });
    return out;
  }catch{
    const d=new Date();
    return {year:`${d.getFullYear()}`,month:p2(d.getMonth()+1),day:p2(d.getDate()),weekday:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]};
  }
}
function todayStr(){const d=getKuwaitDateParts(); return `${d.year}-${d.month}-${d.day}`}
function todayJD(){const weekday=getKuwaitDateParts().weekday; return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].indexOf(weekday)}
const TODAY=todayStr();

function cleanTimeStr(s){if(!s)return'';const m=String(s).match(/\d{1,2}:\d{2}/);return m?m[0]:String(s)}
function fmt24(t){const s=cleanTimeStr(t);if(!s)return'';const[h,m]=s.split(':').map(Number);const pm=h>=12;const dh=h>12?h-12:(h===0?12:h);return `${dh}:${p2(m)} ${pm?'م':'ص'}`}
function toMin(s){if(!s)return 0;const s0=cleanTimeStr(s);if(String(s).includes('ص')||String(s).includes('م')){const pm=String(s).includes('م');const[h,m]=s0.split(':').map(Number);let hr=h;if(pm&&h!==12)hr+=12;if(!pm&&h===12)hr=0;return hr*60+(m||0)}const[h,m]=s0.split(':').map(Number);return h*60+(m||0)}
function getKuwaitNowMinutes(){
  try{
    const parts = new Intl.DateTimeFormat('en-GB',{timeZone:KUWAIT_TZ,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date());
    const out={};

    return h*60+m;
  }catch{
    const d=new Date();
    return d.getHours()*60+d.getMinutes();
  }
}

const FREE_TIME={
  0:[{t:'6:00 م',d:'وقت حر'}],
  1:[{t:'6:00 م',d:'وقت حر'}],
  2:[{t:'6:00 م',d:'وقت حر'}],
  3:[{t:'6:00 م',d:'وقت حر'}],
  4:[{t:'6:00 م',d:'وقت حر'}],
  5:[{t:'6:00 م',d:'وقت حر'}],
  6:[{t:'6:00 م',d:'وقت حر'}]
};

function buildPTasks(jd){
  const k=DKEYS[jd];
  return Object.entries(PMETA).filter(([pk])=>!(jd===5 && pk==='Dhuhr')).map(([pk,pm])=>{
    const t24=PRYT[pk]||FALLBK[pk];
    const desc=pk==='Fajr'?`${fmt24(t24)} · ارجع نام بعدها ✓`:`وقت الصلاة: ${fmt24(t24)}`;
    return [`pr-${k}-${pk}`,fmt24(t24),'prayer',pm.ic,pm.ar,desc,pm.pts,null,null,false,t24];
  });
}

function getAllTasks(jd){
  const d=SCHED[jd];
  if(!d) return [];
  const frees=(FREE_TIME[jd]||[]).map((f,i)=>[`fr-${jd}-${i}`,f.t,'free','🎮','وقت حر',f.d,0,null,null,false]);
  return[...buildPTasks(jd),...d.ts,...frees].sort((a,b)=>toMin(a[10]||a[1])-toMin(b[10]||b[1]));
}

function getReqTasks(jd){
  // points tasks only
  return [...buildPTasks(jd),...(SCHED[jd]?.ts||[])].filter(t=>!t[9] && t[6]>0);
}

async function sGet(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}}
async function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

let FIREBASE_UNSUBS=[];
let STATS={cur:0,best:0,pts:0,lc:null,lf:null};
let DONE={};
let SELECTED_ALTS={};
let WEEKLY_REPORT=[];

function resetRuntimeState(){
  STATS={cur:0,best:0,pts:0,lc:STATS.lc,lf:STATS.lf};
  DONE={};
  SELECTED_ALTS={};
  WEEKLY_REPORT=[];
}

async function loadSignedOut(){
  STATS=(await sGet(LS.stats))||{cur:0,best:0,pts:0,lc:null,lf:null};
  DONE=(await sGet(LS.done(TODAY)))||{};
  SELECTED_ALTS=(await sGet(LS.alts(TODAY)))||{};
  WEEKLY_REPORT=(await sGet(LS.weekly(TODAY)))||[];
}

async function cloudLoadForUser(user){
  const uid=user.uid;
  const userRef=doc(fbDb,'users',uid);
  const snap=await getDoc(userRef);
  if(snap.exists()){
    const data=snap.data()||{};
    if(data.stats && typeof data.stats==='object'){
      STATS={...STATS,...data.stats};
    }
    if(data.weekly && typeof data.weekly==='object'){
      // store weekly array on meta key 'weekly[TODAY]'
      WEEKLY_REPORT=Array.isArray(data.weekly[TODAY])?data.weekly[TODAY]:[];
    }
  }

  // DONE + alts for each day are in subcollections
  // We'll restore only TODAY here; historical weekly can be rebuilt from qada events later.
  const dayDoneRef=doc(fbDb,'users',uid,'days',TODAY);
  const daySnap=await getDoc(dayDoneRef);
  if(daySnap.exists()){
    const d=daySnap.data()||{};
    DONE=d.done||{};
    SELECTED_ALTS=d.alts||{};
  }
}

async function cloudSaveStats(){
  const user=fbAuth.currentUser;
  if(!user) return;
  await setDoc(doc(fbDb,'users',user.uid),{stats:STATS},{merge:true});
}

async function cloudSaveDay(){
  const user=fbAuth.currentUser;
  if(!user) return;
  await setDoc(doc(fbDb,'users',user.uid,'days',TODAY),{done:DONE,alts:SELECTED_ALTS},{merge:true});
}

async function cloudSaveWeeklyArrayAppend(entry){
  const user=fbAuth.currentUser;
  if(!user) return;
  WEEKLY_REPORT.push(entry);
  const weeklyObj={};
  weeklyObj[TODAY]=WEEKLY_REPORT;
  await setDoc(doc(fbDb,'users',user.uid),{weekly:weeklyObj},{merge:true});
}

async function localSave(){
  await sSet(LS.stats,STATS);
  await sSet(LS.done(TODAY),DONE);
  await sSet(LS.alts(TODAY),SELECTED_ALTS);
  await sSet(LS.weekly(TODAY),WEEKLY_REPORT);
}

function setupRealtimeListeners(user){
  clearFirebaseListeners();
  const uid=user.uid;

  FIREBASE_UNSUBS.push(unsubDay);

  const metaRef=doc(fbDb,'users',uid);

    const data=snap.data()||{};
    if(data.stats && typeof data.stats==='object') STATS={...STATS,...data.stats};
    if(data.weekly && typeof data.weekly==='object'){
      WEEKLY_REPORT=Array.isArray(data.weekly[TODAY])?data.weekly[TODAY]:[];

// ===== UX: punctuality time-lock =====
function taskIsPassed(task){
  const t24=task[10]||task[1];
  const target=toMin(t24);
  return getKuwaitNowMinutes()>target;
}

function isPrayerTask(task){return task[2]==='prayer'}

// ===== Task completion =====
async function checkNewDay(){
  if(STATS.lc===TODAY) return;
  // streak reset if previously last completion day was not yesterday
  if(STATS.lf && STATS.lf!==TODAY){
    // if last full day wasn't yesterday, reset cur
    const yesterday=dateOff(-1);
    if(STATS.lf!==yesterday) STATS.cur=0;
  }
  STATS.lc=TODAY;
  await saveAll();
}

function dateOff(n){const d=new Date();d.setDate(d.getDate()+n);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}

async function saveAll(){
  if(fbAuth?.currentUser){
    await Promise.all([cloudSaveStats(),cloudSaveDay()]);
  }else{
    await localSave();
  }
}

async function onCompleteTask(task){
  const [id,arTime,cat,ico,name,desc,pts,alts,hw,isEx,t24]=task;
  if(DONE[id]) return;
  if(taskIsPassed(task)){
    // time-lock for scored tasks: disable points if passed
    // qada handled only for prayer when pressed (qada button)
    return;
  }

  DONE[id]=true;
  STATS.pts+=pts;

  // streak only when all req tasks for that day done
  const req=getReqTasks(todayJD());
  const isAllDone=req.every(t=>DONE[t[0]]);

  if(isAllDone){
    if(STATS.lf!==TODAY){
      const yesterday=dateOff(-1);
      STATS.cur = (STATS.lf===yesterday)?STATS.cur+1:1;
      STATS.lf=TODAY;
      STATS.best=Math.max(STATS.best,STATS.cur);
      showToast(`🎉 يوم كامل!\nاستريك: ${STATS.cur} يوم 🔥\nنقاطك: ${STATS.pts} ⭐`,4000);
    }
  }

  await saveAll();
  updateUI();
}

async function onCompleteQadaPrayer(task){
  const [id,arTime,cat,ico,name,desc,pts]=task;
  if(DONE[id]) return;

  // allow qada if prayer is passed
  if(!taskIsPassed(task)) return;

  const qadaPts=Math.floor(pts/2);
  // avoid awarding full points
  DONE[id]=true;
  STATS.pts+=qadaPts;

  const qadaEntry={t: new Date().toISOString(), taskId:id, day:TODAY, points:qadaPts, label:name};
  WEEKLY_REPORT.push(qadaEntry);

  if(fbAuth?.currentUser){
    await cloudSaveStats();
    await cloudSaveDay();
    await cloudSaveWeeklyArrayAppend(qadaEntry);
  }else{
    await localSave();
  }

  // streak alive if day eventually complete
  const req=getReqTasks(todayJD());
  const isAllDone=req.every(t=>DONE[t[0]]);
  if(isAllDone){
    if(STATS.lf!==TODAY){
      const yesterday=dateOff(-1);
      STATS.cur = (STATS.lf===yesterday)?STATS.cur+1:1;
      STATS.lf=TODAY;
      STATS.best=Math.max(STATS.best,STATS.cur);
      showToast(`🎉 يوم كامل!\nاستريك: ${STATS.cur} يوم 🔥\nنقاطك: ${STATS.pts} ⭐`,4000);
    }
  }

  updateUI();
  updateUI();
}

// ===== UI rendering =====
function updateUI(){
  const req=getReqTasks(todayJD());
  const done=req.filter(t=>DONE[t[0]]);
  const ptsT=done.reduce((s,t)=>s+t[6],0);
  const pct=req.length?Math.round(done.length/req.length*100):0;
  document.getElementById('sv1').textContent=STATS.cur;
  document.getElementById('sv2').textContent=STATS.pts;
  document.getElementById('sv3').textContent=STATS.best;
  document.getElementById('ptxt').textContent=`${done.length}/${req.length} مهمة (${pct}%)`;
  document.getElementById('ppts').textContent=`${STATS.pts} نقطة اليوم`;
  document.getElementById('pfill').style.width=pct+'%';

  // Re-render buttons to reflect time-lock
  renderPanelsForToday();
}

function toggleAlts(id){
  document.getElementById('al-'+id)?.classList.toggle('open');
}

function getTaskDisplayDesc(task){
  const [id,arTime,cat,ico,name,desc,pts,alts,hw,isEx,t24]=task;
  const chosen=SELECTED_ALTS[id];
  if(alts && chosen && alts.includes(chosen)){
    // Use chosen alternative as desc override
    return chosen;
  }
  return desc;
}

function renderCard(task,isToday){
  const [id,arTime,cat,ico,name,desc,pts,alts,hw,isEx]=task;
  const done=DONE[id]||false;
  const passed=taskIsPassed(task);
  const selectedDesc=getTaskDisplayDesc(task);

  if(cat==='free'){
    return `<div class="tc" data-c="free"><div class="tctime">${arTime}</div><div class="tcico">${ico}</div><div class="tcbody"><div class="tcname" style="color:#6366f1">${name}</div><div class="tcdesc">${selectedDesc}</div></div></div>`;
  }

  let act='';
  if(isEx){
    act=`<div class="excbadge">🔓 استثناء</div>`;
  } else if(isToday){
    if(done){
      act=`<div class="cbtn done">✅</div>`;
    } else {
      // qada button only for passed prayers
      if(isPrayerTask(task) && passed){
        act=`<button class="cbtn qada" data-action="qada" data-id="${id}" data-pts="${pts}">قضاء (50%)<span class="ptslbl">+${Math.floor(pts/2)}⭐</span></button>`;
      } else if(pts>0 && passed){
        act=`<div class="cbtn exp">فات الوقت</div>`;
      } else {
        // normal confirm
        act=`<button class="cbtn" data-action="confirm" data-id="${id}" data-pts="${pts}">تأكيد ✓<span class="ptslbl">+${pts}⭐</span></button>`;
      }
    }
  }

  // if not done and no action, show points badge
  if(!act){
    act=done?`<div class="cbtn done">✅</div>`:`<div class="ptsbdg">${pts}⭐</div>`;
  }

  const altH = alts && alts.length
    ? `<button class="altbtn" data-action="alts" data-id="${id}">🔄 بدائل (${alts.length})</button>`+
      `<div class="altlist" id="al-${id}">
        ${alts.map(a=>{
          const selected = SELECTED_ALTS[id]===a;
          const style = selected?' style="color:var(--gr)"':'';
          return `<div class="altitem" role="button" tabindex="0" data-action="pickalt" data-id="${id}" data-alt="${String(a).replace(/"/g,'"')}"${style}>${a}</div>`;
        }).join('')}
      </div>`
    : '';

  const hwH = hw ? `<div class="hwtag">⏰ ${hw}</div>` : '';
  return `<div class="tc${done?' done':''}${isEx?' excx':''}" data-c="${cat}" id="c-${id}">
    <div class="tctime">${arTime}</div><div class="tcico">${ico}</div>
    <div class="tcbody"><div class="tcname">${name}</div><div class="tcdesc">${selectedDesc}</div>${hwH}${altH}</div>
    ${act}
  </div>`;
}

function renderPanel(jd){
  const d=SCHED[jd];
  if(!d) return '';
  const k=DKEYS[jd];
  const isToday=jd===todayJD();

  const gbLabel=d.gm
    ? `<div class="gbx ${d.gm==='upper'?'gbu':'gbl'}">${d.gm==='upper'?'Upper Body 💪':'Lower Body 🦵'}</div>`
    : `<div class="gbx gbr">يوم راحة 💤</div>`;

  // prayer pills (keep existing Friday Jum'ah override)
  const prayerOrder=['Fajr','Dhuhr','Asr','Maghrib','Isha'];
  const pillsArr=[];
  const schedList=d.ts||[];
  const jumahTask=schedList.find(t=>t[2]==='prayer' && (t[4]?.includes('جمعة')||t[0].includes('fri-jm')));

  for(const pk of prayerOrder){
    if(pk==='Dhuhr' && jd===5){
      if(jumahTask){
        const pid=jumahTask[0];
        const done=DONE[pid]&&isToday;
        pillsArr.push(`<div class="ppill${done?' done':''}" id="pp-${pid}"><div class="pnam">${jumahTask[4]}</div><div class="ptim">${fmt24(jumahTask[1])}</div></div>`);
      }
      continue;
    }
    const pm=PMETA[pk];
    if(!pm) continue;
    const pid=`pr-${k}-${pk}`;
    const done=DONE[pid]&&isToday;
    pillsArr.push(`<div class="ppill${done?' done':''}" id="pp-${pid}"><div class="pnam">${pm.ar}</div><div class="ptim">${fmt24(PRYT[pk]||FALLBK[pk])}</div></div>`);
  }

  const pills=pillsArr.join('');
  const tasks=getAllTasks(jd);
  return `<div class="pan" id="pan-${k}">
    <div class="dh"><div><div class="dhn">${d.n}</div><div class="dhm">فجر ${fmt24(PRYT.Fajr||FALLBK.Fajr)} ← صحيان ${d.wk} · نوم ${d.bd}</div></div>${gbLabel}</div>
    <div class="prow">${pills}</div>
    <div class="tl">${tasks.map(t=>renderCard(t,isToday)).join('')}</div>
  </div>`;
}

function renderTabs(){
  const c=document.getElementById('tabrow');
  c.innerHTML='';
  [0,1,2,3,4,5,6].forEach(j=>{
    const isT=j===todayJD();

function renderPanelsForToday(){

function switchDay(jd){

  document.getElementById(`pan-${DKEYS[jd]}`)?.classList.add('act');
  updateUICountersOnly();
}

function startNextPrayerCountdown(timings){
  if(window.prayerInterval) clearInterval(window.prayerInterval);
  window.prayerInterval=setInterval(()=>{
    const now=new Date();
    const currentMinutes=now.getHours()*60+now.getMinutes();
    const parseToMinutes=(t)=>{const[h,m]=t.split(':').map(Number);return h*60+m};
    const prayerKeys=[
      {name:'الفجر',time:timings.Fajr},
      {name:'الشروق',time:timings.Sunrise},
      {name:'الظهر',time:timings.Dhuhr},
      {name:'العصر',time:timings.Asr},
      {name:'المغرب',time:timings.Maghrib},
      {name:'العشاء',time:timings.Isha}
    ];

    let nextPrayerName='الفجر';
    let nextPrayerTime=timings.Fajr;
    let found=false;

    for(const p of prayerKeys){
      if(currentMinutes<parseToMinutes(p.time)){nextPrayerName=p.name;nextPrayerTime=p.time;found=true;break}
    }
    if(!found){nextPrayerName='الفجر';nextPrayerTime=timings.Fajr}

    let targetMinutes=parseToMinutes(nextPrayerTime);
    let diffMinutes=targetMinutes-currentMinutes;
    if(diffMinutes<0) diffMinutes+=24*60;

    const hoursLeft=Math.floor(diffMinutes/60);
    const minsLeft=diffMinutes%60;
    const secsLeft=59-now.getSeconds();
    const countdownStr=`${hoursLeft}:${String(minsLeft).padStart(2,'0')}:${String(secsLeft).padStart(2,'0')}`;

    const setIf=(id,val)=>{const el=document.getElementById(id);if(el) el.innerText=val||''};
    setIf('next-prayer-title',`المتبقي لأذان ${nextPrayerName}`);
    setIf('next-prayer-countdown',countdownStr);
  },1000);
}

  try{

    PRYT={Fajr:timings.Fajr,Dhuhr:timings.Dhuhr,Asr:timings.Asr,Maghrib:timings.Maghrib,Isha:timings.Isha};

async function init(){
  const ld=document.getElementById('ld');
  const app=document.getElementById('app');

  checkStorageAvailable();
  // Render base immediately
  renderTabs();
  document.getElementById('panels').innerHTML=[0,1,2,3,4,5,6].map(renderPanel).join('');
  switchDay(todayJD());

  // Auth load (wipe/reset ordering)
  onAuthStateChanged(fbAuth, async (user)=>{
    resetRuntimeState();
    clearFirebaseListeners();
    if(user){
      await cloudLoadForUser(user);
      setupRealtimeListeners(user);
      setAuthUI(user);
      renderPanelsForToday();
      updateUICountersOnly();
    }else{
      await loadSignedOut();
      setAuthUI(null);
      renderPanelsForToday();
      updateUICountersOnly();
    }
    if(ld) ld.style.display='none';
    if(app) app.style.display='block';
  });

  // sign in button
  const btn=document.getElementById('btn-signin');
  btn.onclick=async ()=>{
    try{
      const provider=new GoogleAuthProvider();
      await signInWithPopup(fbAuth,provider);
    }catch(e){showToast(e?.message||'فشل تسجيل الدخول')}
  };

  // delegated clicks for confirm/qada/alternatives
  document.getElementById('panels').addEventListener('click',async (ev)=>{
    const el=ev.target.closest('[data-action]');
    if(!el) return;

    const action=el.dataset.action;
    const id=el.dataset.id;
    const pts=parseInt(el.dataset.pts||'0',10);

    const taskId=id;
    const jd=todayJD();
    const tasks=getReqTasks(jd);
    const all=getAllTasks(jd);
    const task=all.find(t=>t[0]===taskId);

    if(action==='confirm'){
      if(!task) return;
      if(taskIsPassed(task)){
        showToast('Expired / فات الوقت');
        return;
      }
      if(DONE[taskId]) return;
      await onCompleteTask(task);
      const rect=ev&&ev.currentTarget?ev.currentTarget.getBoundingClientRect():null;
      floatPts(rect?rect.left+rect.width/2-20:window.innerWidth/2, rect?rect.top-10:200, pts);
    }

    if(action==='qada'){
      if(!task) return;
      if(!taskIsPassed(task)) return;
      if(DONE[taskId]) return;
      await onCompleteQadaPrayer(task);
      const rect=ev&&ev.currentTarget?ev.currentTarget.getBoundingClientRect():null;
      floatPts(rect?rect.left+rect.width/2-20:window.innerWidth/2, rect?rect.top-10:200, Math.floor(pts/2));
      showToast('تم قضاء (50%)');
    }

    if(action==='alts'){
      toggleAlts(id);
    }

    if(action==='pickalt'){
      const alt=el.dataset.alt;
      if(!alt) return;
      SELECTED_ALTS[id]=alt;
      if(fbAuth.currentUser){
        await cloudSaveDay();
      }else{
        await localSave();
      }
      renderPanelsForToday();
    }
  });

  // update prayers in background
  fetchPrayers().then(()=>{
    renderPanelsForToday();
  });

  // safety reveal
  setTimeout(()=>{
    if(ld && ld.style.display!== 'none'){
      ld.style.display='none';
      if(app) app.style.display='block';
      showToast('تم فتح التطبيق — بعض البيانات قد تتأخر');
    }
  },7000);
}

function checkStorageAvailable(){
  try{const k='__sc_test__';localStorage.setItem(k,'1');localStorage.removeItem(k);return true}catch{showToast('تحذير: تخزين المتصفح غير متاح');return false}
}

window.addEventListener('DOMContentLoaded',init);
