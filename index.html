// ===== AI Assistant: local intent parser + action execution =====
// No live LLM call (per explicit instruction — "live calls are not important at all").
// This is a deliberately constrained natural-language parser: it recognizes a fixed set
// of actions (mark done, move, delete, edit points, add custom task) against your real
// task catalog, then executes them through the SAME data functions your buttons already
// use (DONE, USER_EDITS, saveAll/saveUserEdits). It cannot do anything your UI can't
// already do — it just lets you say it instead of clicking it. This constraint is
// intentional: an assistant that can only call known-safe actions can't corrupt your
// schedule no matter how it misreads a sentence, unlike an unconstrained "rewrite
// anything" model would.

const AI_DAY_WORDS={
  'اليوم':0,'today':0,
  'بكرة':1,'بكره':1,'غدا':1,'غداً':1,'tomorrow':1,
  'بعد بكرة':2,'بعد بكره':2,
  'الأحد':'sun','الاحد':'sun','sunday':'sun',
  'الاثنين':'mon','الإثنين':'mon','monday':'mon',
  'الثلاثاء':'tue','tuesday':'tue',
  'الأربعاء':'wed','الاربعاء':'wed','wednesday':'wed',
  'الخميس':'thu','thursday':'thu',
  'الجمعة':'fri','friday':'fri',
  'السبت':'sat','saturday':'sat'
};
const AI_DKEY_TO_JD={sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6};

function aiResolveDate(phrase){
  const p=phrase.trim().toLowerCase();
  for(const [word,val] of Object.entries(AI_DAY_WORDS)){
    if(p.includes(word)){
      if(typeof val==='number') return dateOff(val,TODAY);
      const jd=AI_DKEY_TO_JD[val];
      return dateForWeekday(jd,TODAY);
    }
  }
  return null;
}

// Returns true if the phrase explicitly says "keep the same time" — e.g. "نفس الوقت",
// "نفس الساعة", "same time" — so a move command can preserve the original task time
// instead of silently returning null and leaving the caller to guess.
function aiWantsSameTime(phrase){
  return /نفس\s*(ال)?وقت|نفس\s*(ال)?ساعة|same\s*time/.test(phrase.toLowerCase());
}

// Parses "8:00 م" / "8 مساءً" / "20:00" / "8pm" / "8 صباحا" / "الساعة 8" style
// fragments into the app's internal "H:MM ص/م" display format. The bare-digit fallback
// now REQUIRES a time-context word (الساعة/عند/at) directly before the number, since
// previously it matched any stray digit anywhere in the sentence (e.g. a "3" in an
// unrelated word) and silently produced a wrong time.
function aiResolveTime(phrase){
  const p=phrase.trim();
  let m=p.match(/(\d{1,2}):?(\d{2})?\s*(ص|صباح|am|AM)/);
  if(m){const h=parseInt(m[1],10)%12||12;const mm=m[2]||'00';return`${h}:${mm} ص`;}
  m=p.match(/(\d{1,2}):?(\d{2})?\s*(م|مساء|pm|PM)/);
  if(m){const h=parseInt(m[1],10)%12||12;const mm=m[2]||'00';return`${h}:${mm} م`;}
  m=p.match(/(\d{1,2}):(\d{2})/);
  if(m){const h24=parseInt(m[1],10);const mm=m[2];const pm=h24>=12;const h12=h24%12||12;return`${h12}:${mm} ${pm?'م':'ص'}`;}
  // Bare hour only counts if introduced by an explicit time-context word, e.g.
  // "الساعة 8" / "عند 8" / "at 8" — prevents false positives from unrelated digits.
  m=p.match(/(?:الساعة|عند|at)\s*(\d{1,2})(?!:)/i);
  if(m){const h=parseInt(m[1],10)%12||12;return`${h}:00 م`;} // assume PM (most tasks are afternoon/evening)
  return null;
}

// Fuzzy-match a spoken task description against every task across the whole week
// (base SCHED tasks + already-added custom tasks), searching by Arabic name first
// since that's what's actually displayed to the user.
// Normalizes Arabic/English text for matching: strips the "ال" definite article
// prefix from words, drops punctuation/dashes/diacritics, collapses whitespace, and
// lowercases. This is what lets "الجيم" match a task literally named "جيم — Upper
// Body" — previously only a raw substring check was used, which silently failed on
// anything with a definite article, a category prefix, or extra words mixed in.
function aiNormalize(s){
  if(!s) return'';
  return s
    .replace(/[\u064B-\u0652]/g,'')          // strip Arabic diacritics
    .replace(/[—\-–,،.:؛;!؟?()]/g,' ')       // punctuation/dashes -> space
    .split(/\s+/)
    .filter(Boolean)
    .map(w=>w.replace(/^ال/,''))              // drop leading "ال" per word
    .join(' ')
    .trim()
    .toLowerCase();
}

// Fuzzy-matches a spoken task description against every task across the whole week
// (base SCHED tasks + already-added custom tasks). Scores by normalized token
// overlap instead of raw substring checks, so partial/definite-article/reordered
// phrasing ("الجيم", "gym today", "جيم لور بودي") all resolve correctly instead of
// requiring the exact on-screen string.
function aiFindTask(phrase,preferIso){
  const p=aiNormalize(phrase);
  if(!p) return null;
  const pTokens=new Set(p.split(' ').filter(w=>w.length>=2));
  if(!pTokens.size) return null;

  const candidates=[];
  for(let jd=0;jd<7;jd++){
    const iso=dateForWeekday(jd,TODAY);
    const tasks=getAllTasks(jd,iso);
    for(const t of tasks){
      if(t[2]==='free') continue;
      candidates.push({task:t,iso,jd});
    }
  }

  let best=null,bestScore=0;
  for(const c of candidates){
    const name=aiNormalize(c.task[4]);
    if(!name) continue;
    const nameTokens=name.split(' ').filter(w=>w.length>=2);
    if(!nameTokens.length) continue;
    let overlap=0;
    for(const tok of nameTokens) if(pTokens.has(tok)) overlap++;
    if(overlap===0) continue;
    // Score = fraction of the TASK NAME's own words that were mentioned — a short,
    // specific task name ("جيم") fully covered by the phrase scores higher than a
    // long task name partially covered by a stray shared word.
    let score=overlap/nameTokens.length;
    // Slight boost for matching today's/the currently-viewed date's task when the
    // phrase itself didn't specify a day, so "امسح الجيم" today prefers today's gym
    // entry over some other day's, all else equal.
    if(preferIso && c.iso===preferIso) score+=0.05;
    if(score>bestScore){bestScore=score;best=c;}
  }
  // Confidence floor: a single generic shared word against a long task name (e.g.
  // one word overlapping out of 5+) is too weak to commit to silently — better to
  // report "not found" and let the caller ask for a clearer phrase than guess wrong.
  const AI_MATCH_MIN_SCORE=0.28;
  return bestScore>=AI_MATCH_MIN_SCORE?best:null;
}

function aiGenId(prefix){return`${prefix}-${Date.now()}-${Math.floor(Math.random()*9999)}`;}

// The parser: returns {action, ...params, reply} or null if nothing recognized.
// Order matters — more specific patterns are checked before generic ones.
// Maps spoken prayer names (Arabic + English, with common misspellings/transliterations)
// to the PMETA key used internally. "الجمعة"/"jumaa" is intentionally excluded here —
// Friday prayer has its own separate id/flow (fri-jm) matched via aiFindTask instead,
// since it isn't one of the 5 daily prayers in PMETA and has no sunnah step.
const AI_PRAYER_NAME_MAP={
  'الفجر':'Fajr','فجر':'Fajr','fajr':'Fajr',
  'الظهر':'Dhuhr','ظهر':'Dhuhr','dhuhr':'Dhuhr','duhr':'Dhuhr','zuhr':'Dhuhr',
  'العصر':'Asr','عصر':'Asr','asr':'Asr',
  'المغرب':'Maghrib','مغرب':'Maghrib','maghrib':'Maghrib','maghreb':'Maghrib',
  'العشاء':'Isha','العشا':'Isha','عشاء':'Isha','عشا':'Isha','isha':'Isha','ishaa':'Isha'
};

// Detects whether a message is about completing a specific daily prayer at all —
// used to gate the more expensive detail-parsing below, and to distinguish "صليت
// المغرب" (prayer completion) from unrelated messages that happen to contain a
// prayer-adjacent word.
function aiDetectPrayerKey(low){
  for(const[word,pk] of Object.entries(AI_PRAYER_NAME_MAP)){
    if(low.includes(word)) return pk;
  }
  return null;
}

// Parses completion-detail language into the SAME {key,choice,pts} log entries the
// modal buttons produce, reusing the modal's own option tables so points always match
// what tapping through the modal would give — one source of truth for point values,
// never a second hardcoded copy that could drift out of sync.
const AI_PRAYER_STEP_OPTS={
  location:[{label:'المسجد 🕌',pts:5,gold:true},{label:'البيت 🏠',pts:3,gold:false},{label:'الجيم 🏋️',pts:2,gold:false},{label:'أخرى 📍',pts:1,gold:false}],
  style:[{label:'جماعة 👥',pts:4,gold:true},{label:'منفرد 🧍',pts:2,gold:false}],
  dhikr:[{label:'نعم ✅',pts:3,gold:true},{label:'لا ❌',pts:1,gold:false}],
  sunnah:[{label:'نعم ✅',pts:3,gold:true},{label:'لا ❌',pts:1,gold:false}]
};

function aiParsePrayerDetailLog(low,wantsMax){
  const log=[];
  // location: مسجد mentioned -> المسجد; بيت/البيت -> البيت; جيم -> الجيم
  if(/مسجد|جامع|mosque/.test(low)) log.push({key:'location',...AI_PRAYER_STEP_OPTS.location[0]});
  else if(/بيت|home|house/.test(low)) log.push({key:'location',...AI_PRAYER_STEP_OPTS.location[1]});
  else if(/جيم|gym/.test(low)) log.push({key:'location',...AI_PRAYER_STEP_OPTS.location[2]});

  // style: جماعة -> جماعة; منفرد/لوحدي -> منفرد
  if(/جماعة|جماعه|congregation/.test(low)) log.push({key:'style',...AI_PRAYER_STEP_OPTS.style[0]});
  else if(/منفرد|لوحدي|alone|individually/.test(low)) log.push({key:'style',...AI_PRAYER_STEP_OPTS.style[1]});

  // dhikr: أذكار mentioned as done
  if(/أذكار|اذكار|dhikr|athkar/.test(low)) log.push({key:'dhikr',...AI_PRAYER_STEP_OPTS.dhikr[0]});

  // sunnah: سنة mentioned as done
  if(/سنة|سنه|sunnah/.test(low)) log.push({key:'sunnah',...AI_PRAYER_STEP_OPTS.sunnah[0]});

  // "max points" / "أقصى نقاط" without other detail = fill every remaining step gold.
  if(wantsMax){
    for(const stepKey of['location','style','dhikr','sunnah']){
      if(!log.some(l=>l.key===stepKey)){
        const gold=AI_PRAYER_STEP_OPTS[stepKey].find(o=>o.gold);
        log.push({key:stepKey,...gold});
      }
    }
  }
  return log;
}

// Opens the real prayer modal (same one the card-tap flow uses) pre-seeded with the
// parsed log entries, landing on the first step NOT already answered by the parsed
// text. Nothing is silently applied — the modal still requires a tap to advance/
// confirm each remaining step, per Abdullah's explicit choice for this behavior.
function aiOpenPrayerFlowPrefilled(task,iso,parsedLog){
  const id=task[0];
  const parts=id.split('-');
  const pk=parts[2]||'';
  const pts=task[6];
  let bonus=0;
  for(const l of parsedLog) bonus+=l.pts;
  activePrayer={id,name:task[4],pk,basePts:parseInt(pts,10),bonus,x:window.innerWidth/2,y:window.innerHeight/2,
    step:parsedLog.length,log:[...parsedLog],late:false};
  // If the parsed log already answered every applicable step (incl. sunnah where it
  // exists), finishPrayerFlow's own step>=totalSteps check in showPrayerStep will fire
  // and complete it — but only once the modal has been shown/advanced, never skipping
  // the UI outright when opened from chat.
  SELECTED_DATE=iso; // ensure the flow writes to the right day's historyData
  showPrayerStep();
}

// Top-level check: is this message about completing one of the 5 daily prayers, with
// enough context (a completion verb OR explicit detail language) to treat it as a
// completion attempt rather than an unrelated mention of a prayer's name? Returns an
// intent object (action:'openPrayerModal') or null to fall through to other branches.
function aiParsePrayerDetail(raw,low){
  const pk=aiDetectPrayerKey(low);
  if(!pk) return null;

  const hasCompletionVerb=/صليت|صليتها|صلّيت|prayed|pray$|i prayed|mark.*(done|complete)|خلصت|عملت/.test(low);
  const hasDetailWord=/مسجد|جامع|mosque|بيت|home|house|جيم|gym|جماعة|جماعه|congregation|منفرد|لوحدي|alone|أذكار|اذكار|dhikr|athkar|سنة|سنه|sunnah|max|أقصى|اقصى|كامل|كل النقاط/.test(low);
  if(!hasCompletionVerb && !hasDetailWord) return null; // just mentions a prayer name, not a completion

  // Resolve which date this prayer instance is on — same day-word resolution the rest
  // of the assistant uses, defaulting to whatever day is currently selected/viewed.
  const targetIso=aiResolveDate(raw)||SELECTED_DATE;
  const targetJd=getJDfromISO(targetIso);
  const dKey=DKEYS[targetJd];
  const taskId=`pr-${dKey}-${pk}`;
  const task=aiFindTaskByIdOnDate(taskId,targetIso);
  if(!task){
    return{action:'unrecognizedTask',reply:`مش لاقي صلاة ${PMETA[pk]?.ar||pk} في جدول يوم ${targetIso}.`};
  }

  const existingDone=(historyData[targetIso]||{}).done?.[taskId];
  if(existingDone!==undefined && existingDone!==false){
    return{action:'alreadyDone',reply:`صلاة ${PMETA[pk]?.ar||task[4]} يوم ${targetIso} مسجلة كمُنجزة بالفعل. لو عايز تعدّلها، لازم تشيلها الأول من الجدول.`};
  }

  const wantsMax=/max|أقصى|اقصى|كامل النقاط|كل النقاط|maximum/.test(low);
  const parsedLog=aiParsePrayerDetailLog(low,wantsMax);

  return{action:'openPrayerModal',task,iso:targetIso,parsedLog,
    reply:parsedLog.length
      ?`فتحت لك نافذة تأكيد ${PMETA[pk]?.ar||task[4]} ومعبّي اللي قلته — كمّل باقي الأسئلة وأكّد 🕌`
      :`فتحت لك نافذة تأكيد ${PMETA[pk]?.ar||task[4]} — جاوب على الأسئلة عشان تاخد النقاط الصح 🕌`};
}

function aiParseIntent(msg){
  const raw=msg.trim();
  const low=raw.toLowerCase();

  // 0. Explicit memory command — "افتكر إني..." / "سجل عني إني..." / "remember that I..."
  // Handled deterministically here rather than relying on the LLM to infer it every
  // time, so an explicit ask always reliably lands in USER_MEMORY.
  const rememberMatch=raw.match(/^(?:افتكر|اتذكر|سجل عني|تذكر)\s*(?:إن|ان|أن)?\s*(.+)$/i) || raw.match(/^remember\s+that\s+(.+)$/i);
  if(rememberMatch && rememberMatch[1] && rememberMatch[1].trim().length>2){
    return{action:'rememberFact',fact:rememberMatch[1].trim(),
      reply:`تمام، هفتكر إن ${rememberMatch[1].trim()} ✅`};
  }

  // 1. Prayer completion with detail — "صليت المغرب جماعة في المسجد وقريت الأذكار
  // والسنة" / "mark maghrib as done with max points". This is checked BEFORE the
  // generic mark-done branch because prayers have a richer completion model (location/
  // congregation/dhikr/sunnah, each worth bonus points) that flat markDone can't
  // represent — that's the actual bug behind "AI doesn't understand I prayed in
  // congregation": there was no code path reading that language at all, it fell to
  // markDone (flat base points) or was refused outright ("I can't execute commands").
  // Per Abdullah's explicit choice: this NEVER silently applies points — it always
  // opens the real prayer modal, pre-filled from whatever detail was parsed, landed on
  // the first still-unanswered question. He taps through to confirm/adjust, same modal
  // he'd get from clicking the card directly, just fast-forwarded past what he already
  // stated in words.
  const prayerDetailIntent=aiParsePrayerDetail(raw,low);
  if(prayerDetailIntent) return prayerDetailIntent;

  // 1b. Mark as done (retroactively) — "عملت الجيم" / "خلصت الغدا" / "i did the gym"
  if(/عملت|خلصت|سويت|انجزت|أنجزت|i did|done|completed|finished/.test(low)){
    const found=aiFindTask(raw,SELECTED_DATE);
    if(found){
      return{action:'markDone',task:found.task,iso:found.iso,jd:found.jd,
        reply:`تمام، سجلت "${found.task[4]}" بتاريخ ${found.iso} كمُنجزة ✅`};
    }
    return{action:'unrecognizedTask',reply:'مش لاقي المهمة دي في الجدول. ممكن تقولي اسمها بالظبط زي ما هي ظاهرة؟'};
  }

  // 2. Move a task — "انقل الجيم لبكرة الساعة ٨" / "move gym to tomorrow 8pm"
  if(/انقل|حرك|غير وقت|move|reschedule/.test(low)){
    const found=aiFindTask(raw,SELECTED_DATE);
    if(!found) return{action:'unrecognizedTask',reply:'مش لاقي المهمة دي. جرب تكتب اسمها زي ما هو ظاهر في الجدول.'};
    const newDate=aiResolveDate(raw);
    const newTime=aiResolveTime(raw);
    if(!newDate) return{action:'needMoreInfo',reply:`لأي يوم عايز تنقل "${found.task[4]}"؟ (مثلاً: بكرة، الأربعاء...)`};
    // "same time" is now explicitly recognized instead of silently falling through to
    // null and leaving the caller to guess whether that meant "unspecified" or "keep it".
    const keepSameTime=aiWantsSameTime(raw);
    const resolvedTime=keepSameTime?found.task[1]:newTime;
    return{action:'moveTask',task:found.task,fromIso:found.iso,toDate:newDate,toTime:resolvedTime,
      reply:`تم نقل "${found.task[4]}" من ${found.iso} إلى ${newDate}${resolvedTime?' الساعة '+resolvedTime:' (بنفس وقتها الأصلي)'} ✅`};
  }

  // 3. Delete a task — "احذف السباحة النهاردة" / "delete swimming"
  if(/احذف|امسح|شيل|delete|remove/.test(low)){
    const found=aiFindTask(raw,SELECTED_DATE);
    if(!found) return{action:'unrecognizedTask',reply:'مش لاقي المهمة دي. جرب تكتب اسمها زي ما هو ظاهر في الجدول.'};
    return{action:'deleteTask',task:found.task,iso:found.iso,
      reply:`تم حذف "${found.task[4]}" من ${found.iso} (لسه ظاهرة بس متعلّم عليها كمحذوفة) 🗑️`};
  }

  // 4. Edit points — "خلي الجيم بـ 30 نقطة" / "set gym points to 30"
  if(/(نقطة|نقاط|points?)/.test(low) && /(\d+)/.test(low)){
    const found=aiFindTask(raw,SELECTED_DATE);
    const numMatch=raw.match(/(\d+)/);
    if(found && numMatch){
      return{action:'editPoints',task:found.task,pts:parseInt(numMatch[1],10),
        reply:`تم تغيير نقاط "${found.task[4]}" إلى ${numMatch[1]}⭐ ✅`};
    }
  }

  // 5. Add a custom task — "ضيف مهمة قراءة الساعة ٩ بكرة بـ 10 نقاط"
  if(/ضيف|اضف|أضف|add task|new task/.test(low)){
    const newDate=aiResolveDate(raw)||TODAY;
    const newTime=aiResolveTime(raw)||'9:00 م';
    const numMatch=raw.match(/(\d+)\s*(نقطة|نقاط|points?)/);
    const pts=numMatch?parseInt(numMatch[1],10):5;
    // strip command words + date/time/points fragments to guess a name — imperfect on
    // purpose; we always show the parsed result before committing (see confirm flow).
    let name=raw.replace(/ضيف|اضف|أضف|add task|new task/gi,'')
                .replace(/(\d+)\s*(نقطة|نقاط|points?)/gi,'')
                .trim();
    if(!name) name='مهمة جديدة';
    return{action:'addCustomTask',date:newDate,time:newTime,pts,name,
      reply:`تم إضافة "${name}" يوم ${newDate} الساعة ${newTime} بـ ${pts}⭐ ✅`};
  }

  return{action:'llmFallback',reply:null};
}

// Looks up a full task tuple by id + the date it currently sits on (accounting for
// any prior moves already in USER_EDITS), used by the relative-move resolver which
// only has a taskId, not a full tuple.
function aiFindTaskByIdOnDate(taskId,iso){
  const jd=getJDfromISO(iso);
  return getAllTasks(jd,iso).find(t=>t[0]===taskId)||null;
}

// Shared move executor — moves a task (by full tuple) to a new date/time. Used by
// both the fast local parser's moveTask action and the LLM-resolved relative-position
// path, so there's exactly one code path that actually writes to USER_EDITS.moves.
async function aiMoveTaskExec(task,fromIso,toDate,toTime){
  USER_EDITS.moves[task[0]]={toDate,toTime:toTime||task[1],fromDate:fromIso,_origTask:[...task]};
  await saveUserEdits();
}

async function aiExecuteAction(intent){
  const{action}=intent;
  if(action==='openPrayerModal'){
    // Deliberately does NOT write to DONE/historyData/STATS.pts here — it only opens
    // the modal (pre-filled). All actual data mutation happens inside the modal's own
    // finishPrayerFlow(), exactly like a manual card tap, so there is exactly one code
    // path that writes prayer completions no matter how the modal was opened.
    const{task,iso,parsedLog}=intent;
    // Switch the visible day/panel to match the prayer being confirmed, so what's
    // behind the modal lines up with what's being edited.
    if(iso!==SELECTED_DATE){
      saveDay();
      SELECTED_DATE=iso;
      loadDay();
      renderTabs();renderPanels();switchDay(getJDfromISO(iso));updateUI();
    }
    aiOpenPrayerFlowPrefilled(task,iso,parsedLog);
    return true;
  }
  if(action==='rememberFact'){
    aiMemoryAdd(intent.fact);
    await saveUserMemory();
    return true;
  }
  if(action==='markDone'){
    const{task,iso}=intent;
    if(!historyData[iso]) historyData[iso]={};
    if(!historyData[iso].done) historyData[iso].done={};
    if(historyData[iso].done[task[0]]===undefined || historyData[iso].done[task[0]]===false){
      historyData[iso].done[task[0]]=task[6]||true;
      if(iso===SELECTED_DATE) DONE[task[0]]=task[6]||true;
      if(iso===TODAY) STATS.pts=(STATS.pts||0)+(typeof task[6]==='number'?task[6]:0);
      try{ checkStreak(); }catch(e){ console.error(e); }
    }
    await saveAll();
    return true;
  }
  if(action==='moveTask'){
    const{task,fromIso,toDate,toTime}=intent;
    await aiMoveTaskExec(task,fromIso,toDate,toTime);
    return true;
  }
  if(action==='deleteTask'){
    const{task}=intent;
    USER_EDITS.deletes[task[0]]=true;
    await saveUserEdits();
    return true;
  }
  if(action==='editPoints'){
    const{task,pts}=intent;
    USER_EDITS.pointOverrides[task[0]]=pts;
    await saveUserEdits();
    return true;
  }
  if(action==='addCustomTask'){
    const{date,time,pts,name}=intent;
    USER_EDITS.customTasks.push({id:aiGenId('custom'),date,time,cat:'free',ico:'✨',name,desc:'أُضيفت بواسطة المساعد',pts,createdAt:Date.now()});
    await saveUserEdits();
    return true;
  }
  return false; // unrecognized / needMoreInfo / unknown — nothing to execute
}

// ===== AI Assistant: persistent cross-session memory =====
// This is DIFFERENT from AI_SESSIONS: session messages are scoped to one conversation
// and start fresh in a new chat. USER_MEMORY is a small list of durable facts about
// Abdullah personally (preferences, recurring context, things he's told the assistant
// to remember) that gets injected into EVERY call regardless of which session is
// active — this is what makes "answer me based on what you know about me personally"
// actually work across brand-new chats, not just within one thread.
//
// Kept as a flat array of short strings rather than a single freeform blob so entries
// can be listed and deleted individually from the UI, same spirit as memory_user_edits.
// Synced to Firestore like USER_EDITS — local always, cloud only when signed in.
let USER_MEMORY=[]; // string[]
const AI_MEMORY_MAX=60; // hard cap so the system prompt injection never grows unbounded

async function saveUserMemory(){
  await sSet(LS.userMemory,USER_MEMORY);
  const user=fbAuth.currentUser;
  if(!user)return;
  try{
    await setDoc(doc(fbDb,'users',user.uid),{userMemory:USER_MEMORY},{merge:true});
  }catch(e){console.warn('userMemory cloud save failed',e);}
}

function aiMemoryAdd(fact){
  const f=fact.trim();
  if(!f) return;
  if(USER_MEMORY.some(x=>x.toLowerCase()===f.toLowerCase())) return; // no exact dupes
  USER_MEMORY.push(f);
  if(USER_MEMORY.length>AI_MEMORY_MAX) USER_MEMORY.shift(); // drop oldest on overflow
}

// Builds the block of remembered facts to prepend to the system prompt. Empty string
// if nothing is stored yet, so a brand-new user gets the plain persona prompt.
function aiMemoryBlock(){
  if(!USER_MEMORY.length) return'';
  return`\n\nTHINGS YOU KNOW ABOUT ABDULLAH FROM PAST CONVERSATIONS (treat as established fact, apply naturally, don't recite this list back to him unless he asks what you remember):\n${USER_MEMORY.map(f=>'- '+f).join('\n')}`;
}

// Detects "move X before/after Y" style relative-position phrasing — these need real
// reasoning (what time does "before the gym" actually resolve to? which day?) rather
// than a regex, so they're routed to the live model with structured task data and a
// strict JSON-only response format, then executed deterministically once resolved.
const AI_RELATIVE_MOVE_RE=/(قبل|بعد|before|after)/i;
function aiLooksLikeRelativeMove(msg){
  const low=msg.toLowerCase();
  return/انقل|حرك|move|reschedule/.test(low) && AI_RELATIVE_MOVE_RE.test(low);
}

// Builds a compact JSON task list for the whole week — id, name, date, time — so the
// model has exact ground truth to reason against instead of guessing task names/times.
function aiBuildWeekTaskContext(){
  const days=[];
  for(let jd=0;jd<7;jd++){
    const iso=dateForWeekday(jd,TODAY);
    const tasks=getAllTasks(jd,iso).filter(t=>t[2]!=='free');
    days.push({date:iso,day:DSHORT[jd],tasks:tasks.map(t=>({id:t[0],name:t[4],time:t[1]}))});
  }
  return days;
}

// Asks the live model to resolve a relative-position move command into an exact
// {taskId, toDate, toTime} decision, given real task data. The model is instructed to
// respond with ONLY a JSON object — no prose — which is parsed and validated against
// the real task list before anything is executed, so a malformed or hallucinated
// response can never silently corrupt the schedule.
async function aiResolveRelativeMove(msg){
  if(!AI_WORKER_URL || AI_WORKER_URL==='REPLACE_WITH_YOUR_WORKER_URL'){
    return{ok:false,reply:'⚠️ المساعد الذكي لسه مش متوصل بالسيرفر.'};
  }
  const context=aiBuildWeekTaskContext();
  const sys=`You resolve a scheduling instruction into an exact move decision. You will receive the user's instruction and the full week's task list (id, name, time, date) in JSON. Respond with ONLY a raw JSON object, nothing else — no markdown fences, no explanation:
{"taskId":"<id of the task to move>","toDate":"YYYY-MM-DD","toTime":"H:MM ص" or "H:MM م","reasoning":"<one short sentence in Arabic explaining the placement>"}
If you cannot confidently identify the task or the reference task, respond with:
{"error":"<short Arabic explanation of what's missing>"}
Rules: "before X" means schedule at least 15 minutes earlier than X's time, same date as X unless the user said otherwise. "after X" means at least 15 minutes later than X's time, same date as X unless the user said otherwise. Never invent a task id that isn't in the provided list.`;
  try{
    const res=await fetch(AI_WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system:sys,
        messages:[{role:'user',content:`Week tasks:\n${JSON.stringify(context)}\n\nInstruction: ${msg}`}]
      })
    });
    const data=await res.json();
    if(!res.ok || data.error) return{ok:false,reply:'⚠️ حصل خطأ من السيرفر — جرب تاني.'};
    let raw=(data.text||'').trim().replace(/^```json\s*|```$/g,'').trim();
    let parsed;
    try{ parsed=JSON.parse(raw); }catch{ return{ok:false,reply:'⚠️ مش فاهم الطلب ده كويس — جرب تصيغه بشكل أوضح.'}; }
    if(parsed.error) return{ok:false,reply:parsed.error};
    // Validate the model's answer against the REAL task list — never trust a
    // taskId/date blindly, since a hallucinated id would otherwise silently no-op
    // or create a broken move record.
    const allTasks=context.flatMap(d=>d.tasks.map(t=>({...t,date:d.date})));
    const match=allTasks.find(t=>t.id===parsed.taskId);
    if(!match) return{ok:false,reply:'⚠️ مش لاقي المهمة اللي حددها الذكاء الاصطناعي في الجدول الحقيقي — جرب تاني بصياغة أوضح.'};
    if(!parsed.toDate || !parsed.toTime) return{ok:false,reply:'⚠️ مش قادر أحدد الوقت المناسب — قول لي الوقت أو اليوم بالظبط.'};
    return{ok:true,taskId:parsed.taskId,taskName:match.name,fromIso:match.date,toDate:parsed.toDate,toTime:parsed.toTime,reasoning:parsed.reasoning||''};
  }catch(e){
    console.error('relative move resolve failed',e);
    return{ok:false,reply:'⚠️ مش قادر أوصل للسيرفر دلوقتي.'};
  }
}

async function aiCallLiveModel(){
  if(!AI_WORKER_URL || AI_WORKER_URL==='REPLACE_WITH_YOUR_WORKER_URL'){
    return{ok:false,text:'⚠️ المساعد الذكي لسه مش متوصل بالسيرفر (Cloudflare Worker). لازم تركّب الـ Worker وتحط رابطه في الكود الأول.'};
  }
  // Send recent history from the ACTIVE SESSION as conversational context — memory of
  // the CONVERSATION is scoped per-session (a new chat starts with a clean thread), but
  // memory of ABDULLAH HIMSELF (USER_MEMORY) is injected into the system prompt below
  // regardless of session, so personal facts persist across every chat, old and new.
  const session=aiGetActiveSession();
  const recentMsgs=session.messages.slice(-20).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}));
  const systemWithMemory=AI_SYSTEM_PROMPT+aiMemoryBlock();
  try{
    const res=await fetch(AI_WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:systemWithMemory,messages:recentMsgs})
    });
    const data=await res.json();
    if(!res.ok || data.error){
      console.error('AI worker error:',data.error||res.status);
      return{ok:false,text:'⚠️ حصل خطأ من السيرفر — جرب تاني بعد شوية.'};
    }
    let text=data.text||'(رد فارغ)';
    // Parse out the [REMEMBER: ...] tag the model may have appended, store it in
    // USER_MEMORY, and strip it from what's actually shown in the chat bubble.
    const memMatch=text.match(/\[REMEMBER:\s*([^\]]+)\]\s*$/i);
    if(memMatch){
      aiMemoryAdd(memMatch[1]);
      await saveUserMemory();
      text=text.slice(0,memMatch.index).trim();
    }
    return{ok:true,text};
  }catch(e){
    console.error('AI worker call failed:',e);
    return{ok:false,text:'⚠️ مش قادر أوصل للسيرفر دلوقتي — تأكد من الاتصال بالإنترنت وجرب تاني.'};
  }
}

// Splits one message into multiple command clauses so "انقل الجيم لبكرة واحذف
// السباحة النهاردة" (move gym to tomorrow AND delete swimming today) executes BOTH
// instead of only whichever pattern happened to match first across the whole string.
// Splits on Arabic/English conjunctions and commas that sit between two clauses.
// A piece counts as a real command if it CONTAINS a recognized action verb anywhere
// (not just at the very start) — real messages often have filler/preamble text before
// the actual instruction ("أنا مشغول النهاردة و شيل كذا"), so requiring the verb to be
// the first word was too strict and caused the entire split to be discarded whenever
// any natural preamble was present, silently falling back to single-command parsing.
const AI_ACTION_VERBS_ANY=/(انقل|حرك|غير وقت|move|reschedule|احذف|امسح|شيل|delete|remove|عملت|خلصت|سويت|انجزت|أنجزت|i did|done|completed|finished|ضيف|اضف|أضف|add task|new task|افتكر|اتذكر|سجل عني|تذكر|remember|صليت|صلّيت|prayed)/i;

function aiSplitCommands(msg){
  // Split on " و " / " and " / "، " / "," — commas and conjunctions between clauses.
  const rough=msg.split(/\s*(?:،|,)\s*|\s+و\s+(?=\S)|\s+and\s+(?=\S)/i);
  if(rough.length<=1) return[msg.trim()];

  // Keep only pieces that actually contain a command verb somewhere — pure filler
  // pieces ("أنا مشغول جدًا فقولنا مش مهم النهاردة") are dropped rather than merged
  // into the next piece or used to invalidate the whole split.
  const commandPieces=rough.map(p=>p.trim()).filter(p=>p && AI_ACTION_VERBS_ANY.test(p));

  // Need at least 2 genuine command pieces to treat this as multi-command; a single
  // command piece plus filler should just be handled as one command via the normal
  // single-message path (which still works fine on the full original text).
  return commandPieces.length>=2?commandPieces:[msg.trim()];
}

// Processes a single command clause (already split out of a possibly multi-command
// message) and returns {tone, reply, handled}. Does NOT push to chat or save — the
// caller (aiHandleSend) batches all clause results from one message into one flow.
async function aiProcessClause(clauseText){
  // Relative-position moves ("انقل الجيم قبل الغدا") need real reasoning about what
  // time "before/after X" resolves to — routed to the live model with structured task
  // data, then executed deterministically once validated against the real schedule.
  if(aiLooksLikeRelativeMove(clauseText)){
    const resolved=await aiResolveRelativeMove(clauseText);
    if(!resolved.ok) return{tone:'err',reply:resolved.reply,handled:true};
    const task=aiFindTaskByIdOnDate(resolved.taskId,resolved.fromIso);
    if(!task) return{tone:'err',reply:'⚠️ المهمة مش موجودة على التاريخ المتوقع — جرب تاني.',handled:true};
    try{
      await aiMoveTaskExec(task,resolved.fromIso,resolved.toDate,resolved.toTime);
      const why=resolved.reasoning?` (${resolved.reasoning})`:'';
      return{tone:'ok',reply:`تم نقل "${resolved.taskName}" إلى ${resolved.toDate} الساعة ${resolved.toTime}${why} ✅`,handled:true};
    }catch(e){
      console.error('relative move exec failed',e);
      return{tone:'err',reply:'⚠️ حصل خطأ أثناء تنفيذ النقل — جرب تاني.',handled:true};
    }
  }

  const intent=aiParseIntent(clauseText);

  // Known, safe, structured commands (move/delete/mark-done/etc.) always execute
  // locally and deterministically through the real data functions — never through
  // the LLM. This is intentional: correctness and safety for actual data mutations
  // matter more than routing everything through one code path.
  if(['markDone','moveTask','deleteTask','editPoints','addCustomTask','rememberFact','openPrayerModal','alreadyDone','unrecognizedTask','needMoreInfo'].includes(intent.action)){
    let tone='ok';
    try{
      if(['markDone','moveTask','deleteTask','editPoints','addCustomTask','rememberFact','openPrayerModal'].includes(intent.action)){
        await aiExecuteAction(intent);
      }else{
        tone='err';
      }
    }catch(e){
      console.error('AI action execution failed:',e);
      intent.reply='⚠️ حصل خطأ أثناء تنفيذ التغيير — جرب تاني.';
      tone='err';
    }
    return{tone,reply:intent.reply,handled:true,_opensModal:intent.action==='openPrayerModal'&&tone==='ok'};
  }

  return{handled:false}; // not a recognized structured command
}

async function aiHandleSend(){
  const input=document.getElementById('aiInput');
  if(!input) return;
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  input.style.height='auto';

  const user=fbAuth.currentUser;
  const session=aiGetActiveSession();
  session.messages.push({role:'user',text,ts:Date.now()});
  session.lastMsgAt=Date.now();
  aiRenderMessages();

  if(!user){
    session.messages.push({role:'bot',text:'لازم تسجل دخول الأول عشان أقدر أعمل تغييرات في جدولك وأحفظها ليك 🔒',ts:Date.now(),tone:'err'});
    session.lastMsgAt=Date.now();
    aiRenderMessages();
    await saveAiChat();
    return;
  }

  // Split into individual command clauses so a single message with multiple
  // instructions ("انقل الجيم لبكرة واحذف السباحة النهاردة") executes ALL of them,
  // not just whichever pattern matched first.
  const clauses=aiSplitCommands(text);
  const results=[];
  let anyHandled=false;
  let anyMutated=false;

  for(const clause of clauses){
    const r=await aiProcessClause(clause);
    if(r.handled){
      anyHandled=true;
      if(r.tone!=='err') anyMutated=true;
      results.push(r);
      // A prayer modal is now open and needs a tap before anything else can happen —
      // don't silently process further clauses behind it, and don't re-render panels
      // over an open modal (that's what caused the mobile zoom/scroll glitch: a
      // re-render firing while the modal transition was still animating).
      if(r._opensModal) break;
    }
  }

  const modalJustOpened=results.some(r=>r._opensModal);
  if(anyHandled){
    if(anyMutated && !modalJustOpened){
      try{ renderPanels();switchDay(getJDfromISO(SELECTED_DATE));updateUI(); }catch(e){ console.error('re-render after AI action(s) failed:',e); }
    }
    // Combine every clause's reply into one message, numbered if there was more than
    // one command, so a multi-instruction message gets one clear combined confirmation
    // instead of several separate bubbles.
    const combinedText=results.length>1
      ?results.map((r,i)=>`${i+1}. ${r.reply}`).join('\n')
      :results[0].reply;
    const overallTone=results.some(r=>r.tone==='err')?(results.every(r=>r.tone==='err')?'err':null):'ok';
    session.messages.push({role:'bot',text:combinedText,ts:Date.now(),tone:overallTone});
    session.lastMsgAt=Date.now();
    aiRenderMessages();
    await saveAiChat();
    return;
  }

  // Nothing in the message matched a known command pattern — treat the whole
  // original message as general conversation and send it to the live model.
  session.messages.push({role:'bot',text:'...',ts:Date.now(),tone:'typing'});
  aiRenderMessages();

  const result=await aiCallLiveModel();
  session.messages.pop(); // remove the typing placeholder
  session.messages.push({role:'bot',text:result.text,ts:Date.now(),tone:result.ok?null:'err'});
  session.lastMsgAt=Date.now();
  aiRenderMessages();
  await saveAiChat();
}

document.body.addEventListener('click',async e=>{
  const tgt=e.target;
  const closest=sel=>tgt.closest(sel);

  // closest(), not tgt.id — buttons containing emoji/text can report the click's
  // target as an inner text node rather than the button itself on some mobile
  // browsers, which is why tgt.id==='aiHistoryBtn' silently never matched and the
  // history button appeared completely dead despite its listener being correct.
  if(closest('#aiFab')){await aiOpenPanel();return;}
  if(closest('#aiCloseBtn')){aiClosePanel();return;}
  if(closest('#aiSendBtn')){await aiHandleSend();return;}
  if(closest('#aiNewChatBtn')){await aiStartNewChat();return;}
  if(closest('#aiHistoryBtn')){aiToggleSidebar();return;}
  if(closest('#aiMemoryBtn')){aiToggleMemoryView();return;}
  if(closest('#aiFullToggleBtn')){aiToggleFullScreen();return;}
  if(closest('#aiSidebarClose')){aiCloseSidebar();return;}
  if(closest('#aiSidebarNewChat')){await aiStartNewChat();aiCloseSidebar();return;}
  if(closest('#aiSidebarOverlay')){aiCloseSidebar();return;}

  const memDel=closest('[data-memory-del]');
  if(memDel){
    const idx=parseInt(memDel.getAttribute('data-memory-del'),10);
    await aiDeleteMemory(idx);
    return;
  }
  const sessDel=closest('[data-session-del]');
  if(sessDel){
    const sid=sessDel.getAttribute('data-session-del');
    await aiDeleteSession(sid);
    return;
  }
  const sessItem=closest('[data-session-id]');
  if(sessItem){
    const sid=sessItem.getAttribute('data-session-id');
    await aiOpenSession(sid);
    return;
  }

  if(tgt.id==='btn-notif-toggle'){
    if(!NOTIF_ENABLED){
      const granted=await requestNotifPermission();
      if(!granted)return;
      NOTIF_ENABLED=true;
      await saveNotifPref();
      scheduleTodayNotifications();
      showToast('🔔 التذكيرات اشتغلت — هتوصلك إشعارات للمهام النهاردة',3000);
    }else{
      NOTIF_ENABLED=false;
      await saveNotifPref();
      clearScheduledNotifs();
      showToast('🔕 التذكيرات اتقفلت',2200);
    }
    updateAuthUI(fbAuth.currentUser);
    return;
  }

  if(tgt.id==='btn-signin'){
    try{await signInWithPopup(fbAuth,new GoogleAuthProvider());}catch{showToast('فشل تسجيل الدخول',3500,'warn');}
    return;
  }

  if(tgt.id==='btn-signout'){
    // Important: only clear localStorage AFTER Firebase finishes signing out,
    // otherwise Firebase can crash ("Pending promise was never set").
    if(typeof fbAuth!=='undefined'){
      try{ await fbAuth.signOut(); }catch(e){ console.warn('signOut failed',e); }
    }

    try{
      // Clear app-local state so next anonymous visit looks brand-new.
      localStorage.removeItem(LS.stats);
      localStorage.removeItem(LS.history);
      localStorage.removeItem(LS.reports);
      localStorage.removeItem(LS.penalized);
      localStorage.removeItem(LS.firstSeen);
      localStorage.removeItem(LS.userEdits);
      localStorage.removeItem(LS.aiChat);
      localStorage.removeItem(LS.userMemory);

      // Clear any in-memory state
      STATS={cur:0,best:0,pts:0,lc:null,lf:null};
      DONE={};
      SELECTED_ALTS={};
      historyData={};
      savedReports=[];
      penalizedDates={};
      FIRST_SEEN=null;
      USER_EDITS=emptyUserEdits();
      USER_MEMORY=[];
      AI_SESSIONS=[];
      AI_ACTIVE_SESSION_ID=null;
      AI_VIEW_MODE='chat';
      IS_BRAND_NEW_SESSION=false;
      SELECTED_DATE=TODAY;
    }catch(e){console.warn('local reset failed',e);}

    window.location.reload();
    return;
  }

  if(tgt.id==='btn-report'){
    if(todayJD()!==6){showToast('التقرير متاح يوم السبت فقط 📅');return;}
    await showWeeklyReport();return;
  }

  if(tgt.id==='btn-report-history'){showReportHistoryList();return;}
  if(tgt.id==='btn-back-to-history-list'){showReportHistoryList();return;}

  const delBtn=closest('[data-action="delreport"]');
  if(delBtn){
    const idx=parseInt(delBtn.getAttribute('data-hist-idx'),10);
    await deleteSavedReport(idx);
    return;
  }

  const histItem=closest('.report-history-item');
  if(histItem){
    const idx=parseInt(histItem.getAttribute('data-hist-idx'),10);
    showReportHistoryDetail(idx);
    return;
  }

  if(tgt.id==='closeReport'){document.getElementById('reportModal')?.classList.remove('open');return;}

  if(tgt.id==='btn-prayer-back'){
    if(!activePrayer) return;
    if(activePrayer.step<=0){document.getElementById('prayerModal')?.classList.remove('open');activePrayer=null;return;}
    activePrayer.step--;
    const last=activePrayer.log.pop();
    if(last) activePrayer.bonus-=last.pts;
    showPrayerStep();
    return;
  }

  if(tgt.id==='btn-hist-prev'){
    saveDay();SELECTED_DATE=dateOff(-1,SELECTED_DATE);loadDay();
    renderTabs();renderPanels();switchDay(getJDfromISO(SELECTED_DATE));updateUI();return;
  }
  if(tgt.id==='btn-hist-next'){
    const next=dateOff(1,SELECTED_DATE);
    if(next>TODAY){showToast('لا يمكن عرض أيام مستقبلية');return;}
    saveDay();SELECTED_DATE=next;loadDay();
    renderTabs();renderPanels();switchDay(getJDfromISO(SELECTED_DATE));updateUI();return;
  }

  const actionEl=closest('[data-action]');
  if(!actionEl) return;
  const action=actionEl.getAttribute('data-action');
  const id=actionEl.getAttribute('data-id');
  const ptsAttr=actionEl.getAttribute('data-pts');

  if(action==='alts'){toggleAlts(id);return;}
  if(action==='pickalt'){
    const alt=actionEl.getAttribute('data-alt');if(!alt)return;
    SELECTED_ALTS[id]=alt;await saveAll();renderPanels();switchDay(getJDfromISO(SELECTED_DATE));
    showToast('🔄 تم اختيار البديل',2200);
    return;
  }

  if(action==='confirm'){
    if(DONE[id]!==undefined)return;
    const pts=parseInt(ptsAttr||'0',10);
    const isPr=id.startsWith('pr-')||id.includes('-jm');
    const jd=getJDfromISO(SELECTED_DATE);
    const taskObj=getAllTasks(jd).find(t=>t[0]===id);
    if(isPr){
      const cardName=tgt.closest('.tc')?.querySelector('.tcname')?.textContent||'';
      const late=taskObj?isLatePrayer(taskObj):false;
      startPrayerFlow(id,cardName,pts,e.clientX,e.clientY,late);return;
    }
    const late=taskObj?isLateNonPrayer(taskObj):false;
    DONE[id]=pts;STATS.pts+=pts;
    floatPts(e.clientX,e.clientY,pts);
    if(late){showToast('⏰ متأخر شوي بس تم — استمر كذا 💪',3000,'late');cardEffect(id,'late');}
    else{showToast('✅ في الوقت المثالي، أحسنت',2200);cardEffect(id,'ontime');}
    // checkStreak() and the re-render below must never be able to swallow the save.
    // Previously, if checkStreak() (or anything after it) threw, saveAll() was never
    // reached — the user saw the success animation but the completion was silently
    // never persisted. That's what caused tasks to vanish from historyData while
    // looking completed in the moment.
    try{ checkStreak(); }catch(err){ console.error('checkStreak failed, saving anyway:',err); }
    try{
      await saveAll();
    }catch(err){
      console.error('saveAll failed after confirm:',err);
      showToast('⚠️ حصل خطأ أثناء الحفظ — جرب تاني أو أعد تحميل الصفحة',4000,'warn');
    }
    try{ renderPanels();switchDay(getJDfromISO(SELECTED_DATE));updateUI(); }catch(err){ console.error('re-render failed:',err); }
    return;
  }

  if(action==='qada'){
    if(DONE[id]!==undefined)return;
    const pts=parseInt(ptsAttr||'0',10);
    const half=Math.floor(pts/2);
    DONE[id]='qada';STATS.pts+=half;
    floatPts(e.clientX,e.clientY,half);
    cardEffect(id,'qada');
    try{ checkStreak(); }catch(err){ console.error('checkStreak failed, saving anyway:',err); }
    try{
      await saveAll();
    }catch(err){
      console.error('saveAll failed after qada:',err);
      showToast('⚠️ حصل خطأ أثناء الحفظ — جرب تاني أو أعد تحميل الصفحة',4000,'warn');
    }
    try{ renderPanels();switchDay(getJDfromISO(SELECTED_DATE));updateUI(); }catch(err){ console.error('re-render failed:',err); }
    showToast('تم تسجيل القضاء — حاول تصلي بدري بكرة 🌙',3500,'qada');return;
  }
});

// Re-arms notification timers whenever the tab/PWA regains visibility. This does NOT
// make notifications fire while the phone is locked or the tab is backgrounded — that
// requires server-sent Web Push, which is out of scope for a static GitHub Pages site
// with no backend (documented limit, not a bug). What this DOES fix: setTimeout timers
// scheduled hours in advance are frequently throttled/dropped by mobile browsers during
// backgrounding, so a reminder whose time already passed while the tab was backgrounded
// silently never fires and is never rescheduled. Re-checking on every foreground-return
// means the very next time the app is actually open, still-relevant reminders (those
// whose time hasn't passed yet) get correctly re-armed instead of staying orphaned.
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible' && NOTIF_ENABLED && SELECTED_DATE===TODAY){
    try{ scheduleTodayNotifications(); }catch(e){ console.warn('notif re-arm on visibility failed',e); }
  }
});

// ===== Init =====
// Single shared "app is ready" reveal — used by both the success and error paths of
// initAppFlow so the AI fab button can NEVER become visible/clickable before this
// fires. Previously #aiFab had no gating tied to load state at all and was tappable
// during the loading spinner.
function revealApp(){
  const ldEl=document.getElementById('ld'); if(ldEl) ldEl.style.display='none';
  const appEl=document.getElementById('app'); if(appEl) appEl.style.display='block';
  const fabEl=document.getElementById('aiFab'); if(fabEl) fabEl.classList.remove('hidden');
}

function initAppFlow(user){
  updateAuthUI(user);
  fetchPrayers().then(()=>applyPunishmentOnce()).then(async ()=>{
    const ptsBefore=STATS.pts;
    resetWeeklyPointsIfNewWeek();
    if(STATS.pts!==ptsBefore){ try{ await saveAll(); }catch(e){ console.warn('weekly reset save failed',e); } }
    checkStreak();
    renderTabs();renderPanels();switchDay(todayJD());updateUI();
    revealApp();
    if(PENALTY_FLASH_PENDING){flashPenalty();PENALTY_FLASH_PENDING=false;}
    await loadNotifPref();
    updateAuthUI(user);
    if(NOTIF_ENABLED && typeof Notification!=='undefined' && Notification.permission==='granted'){
      scheduleTodayNotifications();
    }
  }).catch(e=>{
    console.warn('Init error bypass:',e);
    revealApp();
  });
}

if (typeof onAuthStateChanged !== 'undefined' && typeof fbAuth !== 'undefined') {
  onAuthStateChanged(fbAuth, async user => {
    await loadAll();

    if(user && typeof getDoc !== 'undefined' && typeof doc !== 'undefined' && typeof fbDb !== 'undefined'){
      try{
        const ud=await getDoc(doc(fbDb,'users',user.uid));
        if(ud.exists()){
          const d=ud.data();
          // STATS used to be a flat overwrite (STATS=d.stats), which is what actually
          // caused points/streak to reset to 0: if THIS tab/PWA still held a stale
          // in-memory STATS from before another device did a task (e.g. this tab was
          // already open in the background while the phone's PWA racked up points),
          // then interacting with the AI chat or history in THIS tab triggers a
          // saveAll()/saveUserEdits() call that pushes the stale STATS right back up
          // to Firestore, clobbering the real progress. historyData below already gets
          // a proper merge for exactly this reason — STATS needs the same protection.
          // There's no per-field timestamp to know which side is "newer", so the merge
          // policy is: never let a sync REDUCE pts/cur/best (take the max of both
          // sides), and for the date-stamped fields (lc/lf/lastPtsWeekStart) take
          // whichever side has the later date. This can't recover a genuine loss that
          // already happened before this fix, but it makes the loss structurally
          // impossible going forward — a stale local 0 can never beat a real cloud 25.
          if(d.stats){
            const cloudStats=d.stats;
            const localStats=STATS;
            const laterDate=(a,b)=>{if(!a)return b;if(!b)return a;return a>b?a:b;};
            STATS={
              pts:Math.max(cloudStats.pts||0,localStats.pts||0),
              cur:Math.max(cloudStats.cur||0,localStats.cur||0),
              best:Math.max(cloudStats.best||0,localStats.best||0),
              lc:laterDate(cloudStats.lc,localStats.lc),
              lf:laterDate(cloudStats.lf,localStats.lf),
              lastPtsWeekStart:laterDate(cloudStats.lastPtsWeekStart,localStats.lastPtsWeekStart),
              bestFixed:cloudStats.bestFixed||localStats.bestFixed||false
            };
          }
          // ONE-TIME manual recovery for the points lost to the STATS-overwrite bug
          // above (fixed in this same update). Abdullah reported 468 points before two
          // separate corruption incidents zeroed it out; Firestore has no point-in-time
          // recovery on the Spark plan, so there's no way to pull the real prior value
          // back programmatically — this restores the number he confirmed.
          // This app is single-user (Abdullah's personal schedule, not multi-tenant),
          // so gating on "any signed-in user" is safe here — but the check is written
          // explicitly rather than implicitly, and guarded so it can never re-fire
          // after the first successful save, and never re-lower an already-higher
          // value (strict no-op if run twice, or if pts are already above 468 by the
          // time this loads). Safe to delete this whole block once confirmed working.
          if(!STATS._recovery468Applied && (STATS.pts||0)<468){
            STATS.pts=468;
            STATS._recovery468Applied=true;
          }
          if(d.reports) savedReports=d.reports;
          // Cloud historyData/penalizedDates now genuinely merge in — this is what
          // makes a second browser/device actually see your past days.
          if(d.historyData){
            for(const dateKey of Object.keys(d.historyData)){
              const cloudDay=d.historyData[dateKey]||{};
              const localDay=historyData[dateKey]||{};
              historyData[dateKey]={
                done:{...(localDay.done||{}),...(cloudDay.done||{})},
                alts:{...(localDay.alts||{}),...(cloudDay.alts||{})},
                prayerLogs:{...(localDay.prayerLogs||{}),...(cloudDay.prayerLogs||{})},
                // Critical fix: Ensure penalty is explicitly null if it doesn't exist,
                // preventing 'undefined' from being sent to Firestore.
                penalty:cloudDay.penalty||localDay.penalty||null
              };
            }
          }
          if(d.penalizedDates) penalizedDates={...penalizedDates,...d.penalizedDates};
          // Cloud userEdits is authoritative once it exists — this is what makes an
          // edit made on your phone show up on your laptop. If the cloud doc has no
          // userEdits yet (brand-new account), keep whatever local value we have.
          if(d.userEdits) USER_EDITS={...emptyUserEdits(),...d.userEdits};
          if(d.userMemory) USER_MEMORY=d.userMemory;
          if(d.aiChat) aiLoadSessionsFromRaw({sessions:d.aiChat,activeId:d.aiActiveSessionId});
          // firstSeen from the cloud is authoritative once it exists — this is what makes
          // "sign in on a fresh browser" not reset the account's age. If the cloud has no
          // firstSeen yet, this is genuinely the first time this account has ever been used
          // anywhere, so today becomes the anchor and this session must not be punished.
          if(d.firstSeen){
            FIRST_SEEN=d.firstSeen;
            IS_BRAND_NEW_SESSION=false;
          }else{
            FIRST_SEEN=FIRST_SEEN||TODAY;
            IS_BRAND_NEW_SESSION=true;
          }
          // Rescue any cloud entries that landed on wrong future dates due to tab-offset bug.
          rescueFutureDatedEntries();
          migrateSavedReports();
          loadDay();
        }
      }catch(e){console.warn('cloud load failed',e);}
    }

    await sanitizeStats();
    initAppFlow(user);
  });
} else {
  setTimeout(async ()=>{await loadAll();await sanitizeStats();initAppFlow(null);},100);
}
</script>
